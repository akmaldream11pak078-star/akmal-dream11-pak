  setTimeout(() => { const el = document.getElementById('d11-md-paste-box'); if (el) el.focus(); }, 50);
}
function d11CloseMdPaste() { d11MdPasteOpen = false; d11StatsPasteText = null; render(); }
function d11UpdateMdPasteText(val) { d11StatsPasteText = val; }

// Strips markdown bold (**x**) and surrounding whitespace from a cell.
function _d11CleanCell(c) { return (c||'').replace(/\*\*/g, '').trim(); }

function _d11ParseMdTable(text) {
  const lines = text.split('\n').map(l => l.trim());
  const battingRows = [];
  const bowlingRows = [];
  const fieldingRows = []; // {name, catches, stumpings, runOuts} — derived from the dismissal text column
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    // A header row: starts with | and contains at least 3 cells, next line is a --- separator
    if (line.startsWith('|') && lines[i+1] && /^\|?[\s:|-]+\|?$/.test(lines[i+1]) && lines[i+1].includes('-')) {
      const headerCells = line.split('|').map(_d11CleanCell).filter((c,idx,arr) => !(idx===0 && c==='') && !(idx===arr.length-1 && c===''));
      const headerLower = headerCells.map(h => h.toLowerCase());
      const isBatting = headerLower.some(h => h.includes('batter') || h.includes('batsman')) || (headerLower.includes('sr') && headerLower.some(h=>h==='r'));
      const isBowling = headerLower.some(h => h.includes('bowler')) || (headerLower.includes('o') && headerLower.includes('w'));
      const colIdx = (...names) => {
        for (const n of names) { const idx = headerLower.findIndex(h => h === n); if (idx > -1) return idx; }
        for (const n of names) { const idx = headerLower.findIndex(h => h.includes(n)); if (idx > -1) return idx; }
        return -1;
      };
      if (isBatting || isBowling) {
        const nameIdx = colIdx('batter','batsman','bowler','name','player');
        // The dismissal/"how out" column is usually labeled "Dismissal", but scorecards
        // copy-pasted from elsewhere often leave that header blank — in that case it's
        // reliably the column right after the batter name (e.g. "| Batter |  | R | B | ... |").
        let dismissIdx = colIdx('dismissal','how out','wicket');
        if (isBatting && dismissIdx === -1 && nameIdx > -1 && headerLower[nameIdx+1] === '') dismissIdx = nameIdx + 1;
        i += 2; // skip header + separator
        while (i < lines.length && lines[i].startsWith('|')) {
          // Stop if this line is actually the START of the NEXT table (a header row
          // immediately followed by a |---|---| separator) — without this check, a
          // table with no blank-line gap before the next one (e.g. batting table
          // directly followed by "| Bowler | O | M | R | W | ... |") gets its header
          // swallowed as a bogus extra player row.
          if (lines[i+1] && /^\|?[\s:|-]+\|?$/.test(lines[i+1]) && lines[i+1].includes('-')) break;
          const rawCells = lines[i].split('|').map(_d11CleanCell);
          const cells = rawCells.filter((c,idx,arr) => !(idx===0 && c==='') && !(idx===arr.length-1 && c===''));
          if (cells.length < 2) { i++; continue; }
          const rawName = nameIdx > -1 ? cells[nameIdx] : cells[0];
          const name = (rawName||'').replace(/\((c|wk)\)/gi, '').trim();
          const num = (v) => { const n = parseInt((v||'').replace(/[^\d]/g,''), 10); return isNaN(n) ? 0 : n; };
          if (name) {
            if (isBatting) {
              const rIdx = colIdx('r'); const bIdx = colIdx('b');
              const f4Idx = colIdx('4s'); const f6Idx = colIdx('6s');
              const dismissal = dismissIdx > -1 ? (cells[dismissIdx]||'') : '';
              const notOut = /not\s*out/i.test(dismissal);
              battingRows.push({
                name,
                runs: rIdx>-1 ? num(cells[rIdx]) : 0,
                ballsFaced: bIdx>-1 ? num(cells[bIdx]) : 0,
                fours: f4Idx>-1 ? num(cells[f4Idx]) : 0,
                sixes: f6Idx>-1 ? num(cells[f6Idx]) : 0,
                isOut: !notOut
              });
              // Pull fielding credit out of the dismissal text:
              //   "c Mitchell Marsh b Spencer Johnson" / "c & b Rishad Hossain" → catch
              //   "st Smith b Jones" → stumping
              //   "run out (Spencer Johnson)" / "run out (Smith/Jones)" → run-out, possibly 2 fielders
              if (dismissal) {
                const stMatch = dismissal.match(/^st\s+(.+?)\s+b\s+/i);
                const runOutMatch = dismissal.match(/run\s*out\s*\(([^)]+)\)/i);
                const catchAndBowlMatch = /^c\s*&\s*b\s+(.+)$/i.test(dismissal.trim());
                const catchMatch = !catchAndBowlMatch && dismissal.match(/^c\s+(.+?)\s+b\s+/i);
                if (stMatch) {
                  fieldingRows.push({ name: stMatch[1].trim(), catches: 0, stumpings: 1, runOuts: 0 });
                } else if (runOutMatch) {
                  runOutMatch[1].split('/').map(n => n.trim()).filter(Boolean).forEach(fielderName => {
                    fieldingRows.push({ name: fielderName, catches: 0, stumpings: 0, runOuts: 1 });
                  });
                } else if (catchAndBowlMatch) {
                  // "c & b X" — the bowler caught their own delivery; bowling row (parsed separately) already gets the wicket
                  const bowlerName = dismissal.trim().replace(/^c\s*&\s*b\s+/i, '').trim();
                  if (bowlerName) fieldingRows.push({ name: bowlerName, catches: 1, stumpings: 0, runOuts: 0 });
                } else if (catchMatch) {
                  fieldingRows.push({ name: catchMatch[1].trim(), catches: 1, stumpings: 0, runOuts: 0 });
                }
              }
            } else {
              const oIdx = colIdx('o'); const mIdx = colIdx('m'); const wIdx = colIdx('w');
              const rIdx = headerLower.findIndex((h,idx) => h === 'r' && idx !== wIdx);
              const flt = (v) => { const n = parseFloat((v||'').replace(/[^\d.]/g,'')); return isNaN(n) ? 0 : n; };
              bowlingRows.push({
                name,
                maidens: mIdx>-1 ? num(cells[mIdx]) : 0,
                wickets: wIdx>-1 ? num(cells[wIdx]) : 0,
                oversBowled: oIdx>-1 ? flt(cells[oIdx]) : 0,
                runsGiven: rIdx>-1 ? num(cells[rIdx]) : 0
              });
            }
          }
          i++;
        }
        continue;
      }
    }
    i++;
  }
  // Merge multiple fielding credits for the same name (e.g. 2 separate catches across 2 lines)
  const mergedFielding = {};
  fieldingRows.forEach(r => {
    const key = r.name.toLowerCase();
    if (!mergedFielding[key]) mergedFielding[key] = { name: r.name, catches: 0, stumpings: 0, runOuts: 0 };
    mergedFielding[key].catches += r.catches;
    mergedFielding[key].stumpings += r.stumpings;
    mergedFielding[key].runOuts += r.runOuts;
  });
  return { battingRows, bowlingRows, fieldingRows: Object.values(mergedFielding) };
}

// Shared application logic: takes already-parsed { battingRows, bowlingRows }
// (each row = {name, ...stats}) and writes them onto matching players, merging
// batting + bowling contributions for all-rounders. Used by both the
// markdown-paste flow and the screenshot-scan flow so matching behavior
// stays identical between them.
function _d11ApplyParsedRows(battingRows, bowlingRows, fieldingRows) {
  const d11m = dream11Matches[d11ActiveMatchId];
  if (!d11m) return { matched: 0, unmatched: [] };

  const findPlayer = (name) => {
    const lowName = (name||'').toLowerCase().trim();
    if (!lowName) return null;
    let p = d11m.players.find(x => x.name.toLowerCase() === lowName);
    if (!p) p = d11m.players.find(x => x.name.toLowerCase().includes(lowName) || lowName.includes(x.name.toLowerCase()));
    return p;
  };

  const matchedPlayerIds = new Set();
  const unmatched = [];

  (battingRows||[]).forEach(row => {
    const p = findPlayer(row.name);
    if (!p) { unmatched.push(row.name); return; }
    const prev = p.stats || {};
    p.stats = { ...prev, runs: row.runs||0, ballsFaced: row.ballsFaced||0, fours: row.fours||0, sixes: row.sixes||0, isOut: !!row.isOut };
    matchedPlayerIds.add(p.id);
  });
  (bowlingRows||[]).forEach(row => {
    const p = findPlayer(row.name);
    if (!p) { unmatched.push(row.name); return; }
    const prev = p.stats || {};
    p.stats = { ...prev, wickets: row.wickets||0, maidens: row.maidens||0, oversBowled: row.oversBowled||0, runsGiven: row.runsGiven||0 };
    matchedPlayerIds.add(p.id);
  });
  // Fielding (catches/stumpings/run-outs) comes from this same scan/source as a fresh,
  // complete read of the scorecard's "how out" column — so it REPLACES rather than adds
  // to any previous value, same as runs/wickets above. This avoids double-counting if the
  // same scorecard is scanned twice, while still being a full update each time.
  (fieldingRows||[]).forEach(row => {
    const p = findPlayer(row.name);
    if (!p) { if (!unmatched.includes(row.name)) unmatched.push(row.name); return; }
    const prev = p.stats || {};
    p.stats = { ...prev, catches: row.catches||0, stumpings: row.stumpings||0, runOuts: row.runOuts||0 };
    matchedPlayerIds.add(p.id);
  });
  const matched = matchedPlayerIds.size;


  // Fill any untouched fields to 0 so calc doesn't break, then compute points instantly.
  d11m.players.forEach(p => {
    if (!p.stats) return;
    const s = p.stats;
    p.stats = {
      runs: s.runs||0, ballsFaced: s.ballsFaced||0, fours: s.fours||0, sixes: s.sixes||0,
      isOut: !!s.isOut, wickets: s.wickets||0, maidens: s.maidens||0,
      catches: s.catches||0, stumpings: s.stumpings||0, runOuts: s.runOuts||0,
      oversBowled: s.oversBowled||0, runsGiven: s.runsGiven||0
    };
    p.points = calcDream11PlayerPoints(p.stats, d11ActiveMatchId);
  });
  recalcDream11MatchPoints(d11m);
  _saveDream11MatchToFirestore(d11ActiveMatchId, d11m);
  d11RefreshLiveTeamPoints(d11ActiveMatchId);
  return { matched, unmatched: [...new Set(unmatched)] };
}

// Shared helper for all AI-powered screenshot scans (squad scan, scorecard scan).
// Calls our own Netlify serverless function (/.netlify/functions/scan-image),
// which forwards the request to Gemini server-side — the API key never
// touches the browser. Images are an array of {dataUrl, mediaType}.
// Returns the model's raw text reply (still needs JSON-fence stripping + parsing by the caller).
async function d11CallScanFunction(promptText, images) {
  const payload = {
    prompt: promptText,
    images: images.map(img => ({
      data: img.dataUrl.split(',')[1],
      mediaType: img.mediaType || 'image/jpeg'
    }))
  };
  const response = await fetch('/.netlify/functions/scan-image', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  const data = await response.json();
  if (!response.ok) throw new Error((data && data.error) || `Scan function error ${response.status}`);
  if (!data.text) throw new Error('No text in scan response');
  return data.text;
}

async function d11SearchLiveScore() {
  const d11m = dream11Matches[d11ActiveMatchId];
  if (!d11m) return;
  const query = (d11LiveScoreQuery || '').trim();
  if (!query) { showNotif('Type what to search for first', 'error'); return; }

  d11LiveSearchBusy = true;
  render();

  try {
    const response = await fetch('/.netlify/functions/search-score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });
    const data = await response.json();
    if (!response.ok) throw new Error((data && data.error) || `Search function error ${response.status}`);
    if (!data.text) throw new Error('No text in search response');

    let cleaned = data.text.trim().replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '');
    const parsed = JSON.parse(cleaned);

    if (parsed.matchStatus === 'not_found') {
      showNotif('Could not find this match online yet — try rephrasing the search, or use Paste/Scan instead', 'error');
      d11LiveSearchBusy = false;
      render();
      return;
    }

    const battingRows = (parsed.batting || []).map(b => ({
      name: b.name, runs: Number(b.runs)||0, ballsFaced: Number(b.balls)||0,
      fours: Number(b.fours)||0, sixes: Number(b.sixes)||0, isOut: b.isOut !== false
    }));
    const bowlingRows = (parsed.bowling || []).map(b => ({
      name: b.name, oversBowled: Number(b.overs)||0, maidens: Number(b.maidens)||0,
      runsGiven: Number(b.runsGiven)||0, wickets: Number(b.wickets)||0
    }));
    const fieldingRows = (parsed.fielding || []).map(f => ({
      name: f.name, catches: Number(f.catches)||0, stumpings: Number(f.stumpings)||0, runOuts: Number(f.runOuts)||0
    }));

    if (battingRows.length === 0 && bowlingRows.length === 0) {
      showNotif('No player figures found online yet for this match — try rephrasing the search, or use Paste/Scan instead', 'error');
      d11LiveSearchBusy = false;
      render();
      return;
    }

    const reviewRows = _d11BuildReviewRows(battingRows, bowlingRows, fieldingRows);
    const statusTag = parsed.matchStatus === 'live' ? '🔴 LIVE' : parsed.matchStatus === 'completed' ? '🏁 Completed' : '';
    const summaryTag = parsed.summary ? ` (${parsed.summary})` : '';
    d11ScanReview = { rows: reviewRows, source: 'search', noteTag: `${statusTag}${summaryTag}` };

    d11LiveSearchBusy = false;
    d11LiveScorePanelOpen = false;
    render();
    showNotif(`📋 Found ${reviewRows.length} player${reviewRows.length===1?'':'s'} online${summaryTag} — check the numbers below, then tap Apply`);
  } catch (err) {
    d11LiveSearchBusy = false;
    render();
    showNotif('Live score search failed: ' + (err && err.message ? err.message : String(err)), 'error');
  }
}

const D11_SCREENSHOT_PROMPT = `You are reading a cricket scorecard from one or more screenshots. Extract every player's batting and bowling figures, PLUS every fielding dismissal (catch, stumping, run-out) credited to a fielder/wicketkeeper, and return ONLY a JSON object — no markdown, no code fences, no explanation, nothing before or after the JSON.

Return exactly this shape:
{
  "batting": [
    { "name": "Player Name", "runs": 0, "balls": 0, "fours": 0, "sixes": 0, "isOut": true }
  ],
  "bowling": [
    { "name": "Player Name", "overs": 0, "maidens": 0, "runsGiven": 0, "wickets": 0 }
  ],
  "fielding": [
    { "name": "Player Name", "catches": 0, "stumpings": 0, "runOuts": 0 }
  ]
}

How to read the numbers (read carefully, digit by digit — these numbers directly decide a money-prize fantasy contest, so accuracy matters more than speed):
- Zoom into each row mentally before deciding a digit. Do not guess from a blurry or low-contrast number — re-check it against the column header to make sure you're reading the right stat in the right column (e.g. don't confuse "4s" with "6s", or "Balls" with "Runs").
- "runs" and "balls" are usually shown as "runs (balls)", e.g. "45 (32)" → runs=45, balls=32. Don't swap them.
- "fours" and "sixes" are small counts (usually 0-15) shown separately from runs/balls — don't confuse them with the runs total.
- "overs" can be a decimal like 3.4 — read it exactly as shown (the digit after the decimal point is balls within the over, 0-5, not a fraction).
- If the same player's row appears in more than one screenshot (e.g. a partial/refreshed screenshot of the same innings), use the most complete/final-looking figures for that player, don't add the two together.

Dismissal / fielding rules:
- The "how out" column tells you the dismissal type and who gets fielding credit, e.g. "c Smith b Jones" → catch credited to Smith; "st Smith b Jones" or "stumped Smith" → stumping credited to Smith (the keeper); "run out (Smith)" or "run out (Smith/Jones)" → run-out credited to every fielder named in the brackets (can be more than one player, e.g. via a relay throw).
- Add up fielding credit across every dismissal in the scorecard — if one player has 2 catches in the innings, "catches" for that player should be 2, not 1.
- Only include a player in "fielding" if they have at least one catch, stumping, or run-out; otherwise omit them from that array entirely.
- A bowler being credited with a wicket (in "bowling") is separate from fielding credit — do not add fielding entries for bowlers unless they are also named as the catcher/stumper/run-out fielder for a dismissal.

General rules:
- Include every batter shown (both teams, all innings visible across all images), and every bowler shown.
- "isOut": false ONLY if the scorecard explicitly says "not out" / "retired not out" / "*" next to the score. Otherwise true.
- Use the player's name as printed (don't add team names or roles).
- If a number is not visible/unclear for a field, use 0 rather than guessing.
- If the image contains no scorecard at all, return {"batting": [], "bowling": [], "fielding": []}.
- Do not invent players or numbers that are not visibly present in the image.`;

// Builds one editable row per player name seen across batting/bowling/fielding
// arrays (merging an all-rounder's batting + bowling lines into a single row),
// resolved against the actual player pool so the admin sees the real name and
// can catch a bad fuzzy-match before anything is saved.
function _d11BuildReviewRows(battingRows, bowlingRows, fieldingRows) {
  const d11m = dream11Matches[d11ActiveMatchId];
  const findPlayer = (name) => {
    if (!d11m) return null;
    const lowName = (name||'').toLowerCase().trim();
    if (!lowName) return null;
    let p = d11m.players.find(x => x.name.toLowerCase() === lowName);
    if (!p) p = d11m.players.find(x => x.name.toLowerCase().includes(lowName) || lowName.includes(x.name.toLowerCase()));
    return p;
  };

  const rowsByKey = {}; // keyed by matched player id, or by raw scanned name if unmatched
  const order = [];

  const touch = (scannedName) => {
    const p = findPlayer(scannedName);
    const key = p ? ('p_' + p.id) : ('u_' + scannedName.toLowerCase());
    if (!rowsByKey[key]) {
      rowsByKey[key] = {
        playerId: p ? p.id : null,
        scannedName,
        displayName: p ? p.name : scannedName,
        matched: !!p,
        runs: 0, ballsFaced: 0, fours: 0, sixes: 0, isOut: false,
        wickets: 0, maidens: 0, oversBowled: 0, runsGiven: 0,
        catches: 0, stumpings: 0, runOuts: 0
      };
      order.push(key);
    }
    return rowsByKey[key];
  };

  (battingRows||[]).forEach(row => {
    const r = touch(row.name);
    r.runs = row.runs||0; r.ballsFaced = row.ballsFaced||0; r.fours = row.fours||0; r.sixes = row.sixes||0; r.isOut = !!row.isOut;
  });
  (bowlingRows||[]).forEach(row => {
    const r = touch(row.name);
    r.wickets = row.wickets||0; r.maidens = row.maidens||0; r.oversBowled = row.oversBowled||0; r.runsGiven = row.runsGiven||0;
  });
  (fieldingRows||[]).forEach(row => {
    const r = touch(row.name);
    r.catches = row.catches||0; r.stumpings = row.stumpings||0; r.runOuts = row.runOuts||0;
  });

  return order.map(k => rowsByKey[k]);
}

// ── Review screen: admin checks/edits scanned numbers before anything is
// applied or saved. Catches AI misreads (swapped runs/balls, wrong player
// match, etc.) before they hit the leaderboard. ──
function d11ReviewUpdateField(idx, field, value) {
  if (!d11ScanReview || !d11ScanReview.rows[idx]) return;
  const row = d11ScanReview.rows[idx];
  if (field === 'isOut') {
    row.isOut = !!value;
  } else if (field === 'displayName') {
    row.displayName = value;
  } else {
    const n = parseFloat(value);
    row[field] = isNaN(n) ? 0 : n;
  }
}
function d11ReviewRemoveRow(idx) {
  if (!d11ScanReview) return;
  d11ScanReview.rows.splice(idx, 1);
  render();
}
function d11ReviewCancel() {
  d11ScanReview = null;

}
function d11ReviewConfirmApply() {

  const d11m = dream11Matches[d11ActiveMatchId];

  // Re-resolve each row against the current player pool by its (possibly admin-edited)
  // displayName, since the admin may have retyped a name to fix a bad match.
  const battingRows = [], bowlingRows = [], fieldingRows = [];
  d11ScanReview.rows.forEach(row => {
    const name = row.displayName;
    battingRows.push({ name, runs: row.runs||0, ballsFaced: row.ballsFaced||0, fours: row.fours||0, sixes: row.sixes||0, isOut: !!row.isOut });
    bowlingRows.push({ name, wickets: row.wickets||0, maidens: row.maidens||0, oversBowled: row.oversBowled||0, runsGiven: row.runsGiven||0 });
    fieldingRows.push({ name, catches: row.catches||0, stumpings: row.stumpings||0, runOuts: row.runOuts||0 });
  });

  const { matched, unmatched } = _d11ApplyParsedRows(battingRows, bowlingRows, fieldingRows);
  const liveTag = !d11m.scored ? ' — live scores updated for users 🔴' : '';
  d11ScanReview = null;

}

// ── Admin: bulk paste match stats from a scoreboard ──
// Format, one player per line, pipe-separated:
//   Player Name | runs | balls | 4s | 6s | wickets | maidens | catches | stumpings | runouts | out(y/n)
// Trailing fields can be omitted (treated as 0 / not out). Lines that don't match an
// existing player in the pool (by name, fuzzy-ish via case-insensitive contains) are
// reported back to the admin instead of silently dropped.
function d11StartPasteStats() {
  const d11m = dream11Matches[d11ActiveMatchId];
  if (!d11m) return;
  d11MdPasteOpen = false;
  d11ScreenshotOpen = false;
  d11GridEntryOpen = false;
  const header = '# One player per line:\n# Name | Runs | Balls | 4s | 6s | Wickets | Maidens | Catches | Stumpings | RunOuts | Out(y/n)\n\n';
  d11StatsPasteText = header + d11m.players.map(p => `${p.name} | | | | | | | | | | `).join('\n');
  render();
  setTimeout(() => { const el = document.getElementById('d11-stats-paste-box'); if (el) el.focus(); }, 50);
}
function d11CancelPasteStats() { d11StatsPasteText = null; render(); }
function d11UpdatePasteStatsText(val) { d11StatsPasteText = val; }

function d11ParseStatsText(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0 && !l.startsWith('#'));
  const rows = [];
  lines.forEach(line => {
    // ── Format 0: detailed scorecard copy-paste (checked first because it also
    //    contains '|' and ':' characters, which would otherwise be misread by
    //    Formats 1/2 below) ──
    //    Batting: "Tanzid Hasan: 5 (2b, 1x4, 0x6) SR: 250.00 | run out (Johnson)"
    //    Bowling: "Spencer Johnson: 4 Ov - 0 M - 6 R - 2 W (Econ: 1.50, WD: 1, NB: 1)"
    {
      const colonIdx0 = line.indexOf(':');
      if (colonIdx0 > -1) {
        const name0 = line.substring(0, colonIdx0).replace(/\(c\)|\(wk\)/gi, '').trim();
        const stats0 = line.substring(colonIdx0 + 1).trim();
        const num0 = (v) => { const n = parseInt((v||'').replace(/[^\d]/g,''), 10); return isNaN(n) ? 0 : n; };

        // Bowling: "4 Ov - 0 M - 27 R - 1 W ..."
        const bowlOv = stats0.match(/^(\d+\.?\d*)\s*Ov\s*-\s*(\d+)\s*M\s*-\s*(\d+)\s*R\s*-\s*(\d+)\s*W/i);
        if (bowlOv && name0) {
          rows.push({
            name: name0,
            runs: 0, ballsFaced: 0, fours: 0, sixes: 0, isOut: false,
            wickets: num0(bowlOv[4]), maidens: num0(bowlOv[2]),
            catches: 0, stumpings: 0, runOuts: 0
          });
          return;
        }

        // Batting: "5 (2b, 1x4, 0x6) SR: 250.00 | run out (Johnson)" or "61 (51b, 3x4, 3x6) SR: 119.60 | not out"
        const bat0 = stats0.match(/^(\d+)\s*\((\d+)\s*b[,)]/i);
        if (bat0 && name0) {
          const four0 = stats0.match(/(\d+)\s*x\s*4/i);
          const six0 = stats0.match(/(\d+)\s*x\s*6/i);
          const notOut0 = /not\s*out/i.test(stats0);
          rows.push({
            name: name0,
            runs: num0(bat0[1]), ballsFaced: num0(bat0[2]),
            fours: four0 ? num0(four0[1]) : 0,
            sixes: six0 ? num0(six0[1]) : 0,
            isOut: !notOut0,
            wickets: 0, maidens: 0, catches: 0, stumpings: 0, runOuts: 0
          });
          return;
        }
      }
    }

    // ── Format 1: pipe-separated (existing format) ──
    // Name | Runs | Balls | 4s | 6s | Wickets | Maidens | Catches | Stumpings | RunOuts | Out(y/n)
    if (line.includes('|')) {
      const parts = line.split('|').map(p => p.trim());
      const name = parts[0];
      if (!name) return;
      const num = (v) => { const n = parseInt((v||'').replace(/[^\d]/g,''), 10); return isNaN(n) ? 0 : n; };
      const outFlag = (parts[10]||'').toLowerCase();
      rows.push({
        name,
        runs: num(parts[1]), ballsFaced: num(parts[2]), fours: num(parts[3]), sixes: num(parts[4]),
        wickets: num(parts[5]), maidens: num(parts[6]), catches: num(parts[7]),
        stumpings: num(parts[8]), runOuts: num(parts[9]),
        isOut: outFlag === 'y' || outFlag === 'yes' || outFlag === 'out' || outFlag === '1' || outFlag === 'true'
      });
      return;
    }

    // ── Format 2: colon-separated scoreboard copy-paste ──
    // Bowling: "Prasidh Krishna: 8.2-2-23-5"  → overs-maidens-runs-wickets
    // Batting: "Virat Kohli: 45(32) 4s:3 6s:1" or "Virat Kohli: 45-32-3-1" → runs-balls-4s-6s
    if (line.includes(':')) {
      const colonIdx = line.indexOf(':');
      const name = line.substring(0, colonIdx).trim();
      const stats = line.substring(colonIdx + 1).trim();
      if (!name || !stats) return;

      const num = (v) => { const n = parseInt((v||'').replace(/[^\d]/g,''), 10); return isNaN(n) ? 0 : n; };
      const flt = (v) => { const n = parseFloat((v||'').replace(/[^\d.]/g,'')); return isNaN(n) ? 0 : n; };

      // Check if bowling format: contains dash and overs (e.g. 8.2-2-23-5 or 8-0-49-1)
      // Bowling: overs-maidens-runs-wickets
      const bowlingMatch = stats.match(/^(\d+\.?\d*)-(\d+)-(\d+)-(\d+)/);
      if (bowlingMatch) {
        rows.push({
          name,
          runs: 0, ballsFaced: 0, fours: 0, sixes: 0, isOut: false,
          wickets: num(bowlingMatch[4]),
          maidens: num(bowlingMatch[2]),
          catches: 0, stumpings: 0, runOuts: 0
        });
        return;
      }

      // Batting format: "45(32)" or "45-32-3-1" (runs-balls-4s-6s)
      // Try "runs(balls)" format first
      const battingParen = stats.match(/^(\d+)\((\d+)\)/);
      if (battingParen) {
        const fourMatch = stats.match(/4s?[:\s]*(\d+)/i);
        const sixMatch = stats.match(/6s?[:\s]*(\d+)/i);
        const outFlag = /\*/.test(stats) ? false : true; // * means not out in cricket
        rows.push({
          name,
          runs: num(battingParen[1]), ballsFaced: num(battingParen[2]),
          fours: fourMatch ? num(fourMatch[1]) : 0,
          sixes: sixMatch ? num(sixMatch[1]) : 0,
          isOut: outFlag,
          wickets: 0, maidens: 0, catches: 0, stumpings: 0, runOuts: 0
        });
        return;
      }

      // Batting dash format: runs-balls-4s-6s
      const battingDash = stats.match(/^(\d+)-(\d+)-(\d+)-(\d+)/);
      if (battingDash) {
        rows.push({
          name,
          runs: num(battingDash[1]), ballsFaced: num(battingDash[2]),
          fours: num(battingDash[3]), sixes: num(battingDash[4]),
          isOut: true,
          wickets: 0, maidens: 0, catches: 0, stumpings: 0, runOuts: 0
        });
        return;
      }

      // Fallback: just a number after colon = runs
      const justRuns = stats.match(/^(\d+)/);
      if (justRuns) {
        rows.push({
          name,
          runs: num(justRuns[1]), ballsFaced: 0, fours: 0, sixes: 0, isOut: false,
          wickets: 0, maidens: 0, catches: 0, stumpings: 0, runOuts: 0
        });
      }
    }
  });
  return rows;
}

function d11ConfirmPasteStats() {
  const d11m = dream11Matches[d11ActiveMatchId];
  if (!d11m || !d11StatsPasteText) return;
  const rows = d11ParseStatsText(d11StatsPasteText);
  if (rows.length === 0) { showNotif('No player rows detected — check the format', 'error'); return; }

  let matched = 0;
  const unmatched = [];
  rows.forEach(row => {
    const lowName = row.name.toLowerCase();
    let p = d11m.players.find(x => x.name.toLowerCase() === lowName);
    if (!p) p = d11m.players.find(x => x.name.toLowerCase().includes(lowName) || lowName.includes(x.name.toLowerCase()));
    if (!p) { unmatched.push(row.name); return; }
    // Merge with any existing stats on this player rather than overwriting —
    // an all-rounder can appear as two separate lines (one batting, one bowling)
    // in the pasted scorecard, and both contributions must be kept.
    const prev = p.stats || {};
    p.stats = {
      runs: row.runs || prev.runs || 0,
      ballsFaced: row.ballsFaced || prev.ballsFaced || 0,
      fours: row.fours || prev.fours || 0,
      sixes: row.sixes || prev.sixes || 0,
      isOut: row.ballsFaced > 0 ? row.isOut : (prev.isOut || false),
      wickets: row.wickets || prev.wickets || 0,
      maidens: row.maidens || prev.maidens || 0,
      catches: row.catches || prev.catches || 0,
      stumpings: row.stumpings || prev.stumpings || 0,
      runOuts: row.runOuts || prev.runOuts || 0
    };
    p.points = calcDream11PlayerPoints(p.stats, d11ActiveMatchId);
    matched++;
  });

  recalcDream11MatchPoints(d11m);
  _saveDream11MatchToFirestore(d11ActiveMatchId, d11m);
  d11RefreshLiveTeamPoints(d11ActiveMatchId);
  d11StatsPasteText = null;
  render();
  const liveTag = !d11m.scored ? ' — live scores updated for users 🔴' : '';
  showNotif(`✅ Stats applied for ${matched} player${matched===1?'':'s'}${liveTag}${unmatched.length ? `, ${unmatched.length} not matched: ${unmatched.slice(0,3).join(', ')}${unmatched.length>3?'…':''}` : ''} — review points below before finalizing`);
}

async function d11FinalizeScoring() {
  const d11m = dream11Matches[d11ActiveMatchId];
  const m = matches[d11ActiveMatchId];
  if (!d11m) return;
  if (!confirm(`Finalize scoring for "${m?.teamA||'Team A'} vs ${m?.teamB||'Team B'}"?\n\nThis locks the contest, freezes the leaderboard, and pays out Mega/H2H/Custom contests. This cannot be undone — only do this once the match has fully ended.`)) return;
  recalcDream11MatchPoints(d11m);
  d11m.scored = true;
  d11m.locked = true;
  await _saveDream11MatchToFirestore(d11ActiveMatchId, d11m);

  // Recompute every user's team total for this match
  const teams = Object.values(dream11Teams).filter(t => t.matchId === d11ActiveMatchId);
  for (const team of teams) {
    team.totalPoints = calcDream11TeamPoints(team, d11m);
    await _saveDream11TeamToFirestore(team.id, team);
  }

  // Auto-settle all Dream11 contests now that team totals are final
  await distributeD11MegaPrizes(d11ActiveMatchId);
  await finalizeD11H2HContests(d11ActiveMatchId);
  await finalizeD11CustomContests(d11ActiveMatchId);
  await d11CheckTournamentsForMatch(d11ActiveMatchId);

  render();
  showNotif('✅ Scoring finalized — match closed, leaderboard updated & contests paid out 🏆');
}

// ── User: team building ──
// Returns the credit value to use for budget math — the player's own set
// credit if present, otherwise the fallback default (admin should set real
// values via the Player Pool, but this keeps the budget math from breaking
// for any player that doesn't have one yet).
function d11PlayerCredit(p) {
  return (p && p.credit != null && p.credit > 0) ? p.credit : D11_DEFAULT_CREDIT;
}
function d11TeamDraftCreditsUsed(d11m) {
  if (!d11TeamDraft) return 0;
  return d11TeamDraft.picks.reduce((sum, pid) => {
    const p = d11m.players.find(x => x.id === pid);
    return sum + (p ? d11PlayerCredit(p) : 0);
  }, 0);
}
// ── AI Auto-Select Best Team ────────────────────────────────────────────────
// Scores every player in the match, then greedily picks the best valid 11
// satisfying all Dream11 constraints (roles, side limit, credit budget).
// Each user gets a DIFFERENT team: their email is used as a seed so the
// small perturbation among similarly-rated players produces unique combos.
// Auto-assigns Captain (top scorer) and Vice-Captain (second).

// Simple deterministic hash → float [0,1] from any two strings.
function _aiSeedRandom(seed1, seed2) {
  let h = 0;
  const str = seed1 + '|' + seed2;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  }
  return ((h >>> 0) % 10000) / 10000; // 0.0000 – 0.9999
}

function d11AiAutoSelect() {
  if (!d11TeamDraft) return;
  const d11m = dream11Matches[d11TeamDraft.matchId];
  if (!d11m || !d11m.players || d11m.players.length === 0) {
    showNotif('No players found in this match yet.', 'error'); return;
  }

  const userSeed = (currentUser && currentUser.email) || 'guest';
  const players = d11m.players;

  // Upfront feasibility check — is a valid 11 even theoretically possible
  // with this pool? (enough total players + enough players in each
  // mandatory role). If not, fail fast with a clear message instead of
  // running the selection loops at all.
  const mins = { WK: 1, BAT: 3, AR: 1, BOWL: 3 };
  const roleAvail = { WK: 0, BAT: 0, AR: 0, BOWL: 0 };
  players.forEach(p => { if (roleAvail[p.role] !== undefined) roleAvail[p.role]++; });
  const feasible = players.length >= D11_TEAM_SIZE &&
    Object.keys(mins).every(r => roleAvail[r] >= mins[r]);
  if (!feasible) {
    showNotif('Not enough players in the pool to build a valid 11 — add more players (need at least 1 WK, 3 BAT, 1 AR, 3 BOWL).', 'error');
    return;
  }

  // Objective quality score — same for every user (no randomness here).
  const qualityScore = (p) =>
    (Number(p.points) || 0) * 4 + d11PlayerCredit(p) * 2 + (p.isPlayingXI ? 10 : 0);
  const minCredit = Math.min(...players.map(d11PlayerCredit));

  const roleCounts = { WK: 0, BAT: 0, AR: 0, BOWL: 0 };
  const sideCounts = { A: 0, B: 0 };
  const picks = [];
  let creditsUsed = 0;
  let rngCounter = 0;
  // Deterministic per-user, per-turn random draw — same user always gets
  // the same team for this pool, different users get different teams.
  const nextRand = () => _aiSeedRandom(userSeed, 'turn' + (rngCounter++));

  // Budget-safety lookahead: never take a player if doing so would make it
  // impossible to afford the cheapest possible combination for the slots
  // still remaining after this pick. This is what guarantees the loop
  // always reaches 11 picks (when a valid 11 exists at all) instead of
  // greedily painting itself into a corner on credits.
  const isBudgetSafe = (p) => {
    const slotsLeftAfter = D11_TEAM_SIZE - picks.length - 1;
    const creditAfter = creditsUsed + d11PlayerCredit(p);
    return creditAfter + slotsLeftAfter * minCredit <= D11_CREDIT_BUDGET + 1e-9;
  };
  const canAdd = (p, relaxRoleMax) => {
    if (picks.includes(p.id)) return false;
    if (picks.length >= D11_TEAM_SIZE) return false;
    if (!relaxRoleMax) {
      const [, max] = D11_ROLE_LIMITS[p.role];
      if ((roleCounts[p.role] || 0) >= max) return false;
    }
    if ((sideCounts[p.side] || 0) >= D11_MAX_PER_SIDE) return false;
    if (creditsUsed + d11PlayerCredit(p) > D11_CREDIT_BUDGET + 1e-9) return false;
    if (!isBudgetSafe(p)) return false;
    return true;
  };
  const addPlayer = (p) => {
    picks.push(p.id);
    roleCounts[p.role] = (roleCounts[p.role] || 0) + 1;
    sideCounts[p.side] = (sideCounts[p.side] || 0) + 1;
    creditsUsed += d11PlayerCredit(p);
  };

  // Weighted-random pick among the top-K eligible candidates (ranked by
  // quality) — this is what makes every user's team genuinely different
  // while still staying among the strongest available options, rather
  // than every user converging on the identical single "best" 11.
  function pickWeightedRandom(eligible, k) {
    if (eligible.length === 0) return null;
    const topK = eligible.slice(0, Math.min(k, eligible.length));
    const weights = topK.map((_, idx) => topK.length - idx); // better ranked → higher weight
    const total = weights.reduce((a, b) => a + b, 0);
    let r = nextRand() * total;
    for (let i = 0; i < topK.length; i++) {
      r -= weights[i];
      if (r <= 0) return topK[i];
    }
    return topK[topK.length - 1];
  }

  // Phase 1: lock in role minimums first (1 WK, 3 BAT, 1 AR, 3 BOWL) so a
  // later fallback phase can never end up with a team missing a mandatory role.
  for (const role of ['WK', 'BOWL', 'BAT', 'AR']) {
    while ((roleCounts[role] || 0) < mins[role]) {
      const eligible = players.filter(p => p.role === role && canAdd(p)).sort((a, b) => qualityScore(b) - qualityScore(a));
      const chosen = pickWeightedRandom(eligible, 4);
      if (!chosen) break;
      addPlayer(chosen);
    }
  }

  // Phase 2: fill remaining slots (role max + budget-safety still enforced)
  let guard = 0;
  while (picks.length < D11_TEAM_SIZE && guard++ < 200) {
    const eligible = players.filter(p => canAdd(p)).sort((a, b) => qualityScore(b) - qualityScore(a));
    const chosen = pickWeightedRandom(eligible, 5);
    if (!chosen) break;
    addPlayer(chosen);
  }

  // Phase 3 (fallback): relax per-role MAX caps only — role minimums were
  // already locked in during Phase 1, so this can't produce an invalid team.
  if (picks.length < D11_TEAM_SIZE) {
    let guard2 = 0;
    while (picks.length < D11_TEAM_SIZE && guard2++ < 200) {
      const eligible = players.filter(p => canAdd(p, true)).sort((a, b) => qualityScore(b) - qualityScore(a));
      const chosen = pickWeightedRandom(eligible, 5);
      if (!chosen) break;
      addPlayer(chosen);
    }
  }

  // Phase 4 (last resort): relax role max + drop the budget-safety lookahead
  // (hard credit cap and side limit are still respected) — fills with the
  // cheapest remaining players first. Only reachable on extremely tight
  // pools; role minimums are still intact from Phase 1.
  if (picks.length < D11_TEAM_SIZE) {
    const byCheapest = [...players].sort((a, b) => d11PlayerCredit(a) - d11PlayerCredit(b));
    for (const p of byCheapest) {
      if (picks.length >= D11_TEAM_SIZE) break;
      if (picks.includes(p.id)) continue;
      if ((sideCounts[p.side] || 0) >= D11_MAX_PER_SIDE) continue;
      if (creditsUsed + d11PlayerCredit(p) > D11_CREDIT_BUDGET + 1e-9) continue;
      addPlayer(p);
    }
  }

  if (picks.length < D11_TEAM_SIZE) {
    showNotif(`AI could only select ${picks.length} valid players — add more players or adjust credits`, 'error');
    return;
  }

  // Auto C & VC — top 2 by quality among selected
  const pickedPlayers = picks
    .map(pid => d11m.players.find(x => x.id === pid))
    .filter(Boolean)
    .sort((a, b) => qualityScore(b) - qualityScore(a));

  d11TeamDraft.picks = picks;
  d11TeamDraft.captain = pickedPlayers[0]?.id || null;
  d11TeamDraft.viceCaptain = pickedPlayers[1]?.id || null;

  render();
  const capName = pickedPlayers[0]?.name || '';
  const vcName = pickedPlayers[1]?.name || '';
  showNotif(`🤖 AI selected your best team! Captain: ${capName} · Vice-Captain: ${vcName}`);
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(`AI has selected your best Dream 11 team! Captain is ${capName}, Vice Captain is ${vcName}. Review and submit!`);
    msg.lang = 'en-US'; msg.rate = 0.9; msg.pitch = 1.05;
    const v = window.speechSynthesis.getVoices();
    const preferred = v.find(x => x.name.toLowerCase().includes('google') && x.lang==='en-US') || v.find(x => x.lang.startsWith('en'));
    if (preferred) msg.voice = preferred;
    window.speechSynthesis.speak(msg);
  }
}

function d11TogglePick(playerId) {
  if (!d11TeamDraft) return;
  const d11m = dream11Matches[d11TeamDraft.matchId];
  const idx = d11TeamDraft.picks.indexOf(playerId);
  if (idx >= 0) {
    d11TeamDraft.picks.splice(idx, 1);
    if (d11TeamDraft.captain === playerId) d11TeamDraft.captain = null;
    if (d11TeamDraft.viceCaptain === playerId) d11TeamDraft.viceCaptain = null;
  } else {
    if (d11TeamDraft.picks.length >= D11_TEAM_SIZE) { showNotif(`Only ${D11_TEAM_SIZE} players can be selected`, 'error'); return; }
    const p = d11m.players.find(x => x.id === playerId);
    const { counts, sideCounts } = dream11TeamComposition(d11TeamDraft.picks, d11m);
    const [min, max] = D11_ROLE_LIMITS[p.role];
    if ((counts[p.role]||0) >= max) { showNotif(`${D11_ROLE_LABELS[p.role]} max limit (${max}) reached`, 'error'); return; }
    if ((sideCounts[p.side]||0) >= D11_MAX_PER_SIDE) { showNotif(`Max ${D11_MAX_PER_SIDE} players allowed from team ${p.side}`, 'error'); return; }
    const creditsUsed = d11TeamDraftCreditsUsed(d11m);
    const thisCredit = d11PlayerCredit(p);
    if (creditsUsed + thisCredit > D11_CREDIT_BUDGET + 1e-9) {
      showNotif(`Not enough credits left — ${(D11_CREDIT_BUDGET - creditsUsed).toFixed(1)} Cr remaining, this player costs ${thisCredit} Cr`, 'error');
      return;
    }
    d11TeamDraft.picks.push(playerId);
    // When team is now complete (11 players), speak Cap & Vc instruction
    if (d11TeamDraft.picks.length === D11_TEAM_SIZE && window.speakWelcome) {
      if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
        var cvMsg = new SpeechSynthesisUtterance('Select Your Captain and Vice Captain, and Submit Them!');
        cvMsg.lang = 'en-US';
        cvMsg.rate = 0.92;
        cvMsg.pitch = 1.05;
        cvMsg.volume = 1.0;
        var voices = window.speechSynthesis.getVoices();
        var preferred = voices.find(function(v){ return v.name.toLowerCase().includes('google') && v.lang==='en-US'; })
          || voices.find(function(v){ return v.lang==='en-US' && !v.localService; })
          || voices.find(function(v){ return v.lang.startsWith('en'); });
        if (preferred) cvMsg.voice = preferred;
        window.speechSynthesis.speak(cvMsg);
      }
    }
  }
  render();
}
function d11SetCaptain(playerId) {
  if (!d11TeamDraft.picks.includes(playerId)) return;
  d11TeamDraft.captain = d11TeamDraft.captain === playerId ? null : playerId;
  if (d11TeamDraft.viceCaptain === playerId) d11TeamDraft.viceCaptain = null;
  render();
}
function d11SetViceCaptain(playerId) {
  if (!d11TeamDraft.picks.includes(playerId)) return;
  d11TeamDraft.viceCaptain = d11TeamDraft.viceCaptain === playerId ? null : playerId;
  if (d11TeamDraft.captain === playerId) d11TeamDraft.captain = null;
  render();
}
async function d11SubmitTeam() {
  const d11m = dream11Matches[d11TeamDraft.matchId];
  const errors = dream11ValidateTeam(d11TeamDraft.picks, d11m);
  if (!d11TeamDraft.captain) errors.push('Please select a Captain');
  if (!d11TeamDraft.viceCaptain) errors.push('Please select a Vice-Captain');
  if (errors.length) { showNotif(errors[0], 'error'); return; }
  if (isD11Locked(d11TeamDraft.matchId)) { showNotif('This contest is now locked — deadline has passed', 'error'); return; }

  d11TeamDraft.totalPoints = calcDream11TeamPoints(d11TeamDraft, d11m);
  dream11Teams[d11TeamDraft.id] = { ...d11TeamDraft };
  try {
    await _saveDream11TeamToFirestore(d11TeamDraft.id, dream11Teams[d11TeamDraft.id]);
    try { localStorage.setItem('pp_dream11_teams_cache', JSON.stringify(dream11Teams)); } catch(e) {}
    showNotif('✅ Team submitted! Now join a contest 👇');
    d11ContestMatchId = d11TeamDraft.matchId;
    tab = 'dream11JoinContest';
    render();
    window.scrollTo(0,0);
  } catch(e) {
    delete dream11Teams[d11TeamDraft.id];
    const errCode = e.code || e.message || 'unknown';
    if (errCode.includes('permission') || errCode.includes('PERMISSION')) {
      showNotif('❌ Save failed: Permission denied — please log out and log in again', 'error');
    } else if (errCode.includes('unavailable') || errCode.includes('network') || errCode.includes('Firebase not ready')) {
      showNotif('❌ Save failed: No internet connection — please check your network', 'error');
    } else {
      showNotif('❌ Team save failed (' + errCode + ') — try again', 'error');
    }
  }
}

function d11HasUserSubmittedTeam(matchId, email) {
  return Object.values(dream11Teams).some(t => t.matchId === matchId && t.userEmail === email);
}
function d11GetUserTeam(matchId, email) {
  return Object.values(dream11Teams).find(t => t.matchId === matchId && t.userEmail === email);
}

// ─── Dream11 Mega Contest: paid entry, pool split by Admin ───
async function joinD11MegaContest(matchId) {
  const m = matches[matchId];
  const d11m = dream11Matches[matchId];
  if (!m || !d11m) return;
  if (isD11Locked(matchId)) return showNotif('This Dream11 contest is locked', 'error');

  const u = users[currentUser.email];
  if (!u) return;

  if (!d11HasUserSubmittedTeam(matchId, currentUser.email)) {
    return showNotif('Please submit your Dream11 team first!', 'error');
  }
  if ((d11m.megaParticipants||[]).includes(currentUser.email)) {
    return showNotif('You have already joined the Dream11 Mega Contest!', 'error');
  }
  if ((u.balance || 0) < D11_MEGA_ENTRY_FEE) {
    return showNotif(`Minimum Rs ${D11_MEGA_ENTRY_FEE} balance is required to join the Dream11 Mega Contest. Please deposit first.`, 'error');
  }

  // Deduct fee server-side first
  const result = await _walletCall({ action: 'join_mega_contest', matchId, contestType: 'd11', entryFee: D11_MEGA_ENTRY_FEE });
  if (!result) return;

  // Update local state from server response
  u.balance = result.balance;
  u.transactions = result.transactions;
  currentUser.balance = result.balance;
  currentUser.transactions = result.transactions;

  d11m.megaParticipants = d11m.megaParticipants || [];
  d11m.megaParticipants.push(currentUser.email);
  d11m.megaPool = (d11m.megaPool || 0) + D11_MEGA_ENTRY_FEE;

  await _saveDream11MatchToFirestore(matchId, d11m);
  try {
    localStorage.setItem('pp_dream11_matches_cache', JSON.stringify(dream11Matches));
    localStorage.setItem('pp_users_cache', JSON.stringify(users));
  } catch(e){}

  showNotif(`Dream11 Mega Contest joined! Rs ${D11_MEGA_ENTRY_FEE} deducted 🏆`);
  render();
}

// Called by admin when finalizing Dream11 scoring — auto-splits the Mega pool
// 90% across the top finishers by Dream11 team points (50/30/20 of distributable,
// re-normalized for fewer participants), 10% retained by the company.
async function distributeD11MegaPrizes(matchId) {
  const d11m = dream11Matches[matchId];
  if (!d11m) return;
  const parts = d11m.megaParticipants || [];
  if (parts.length === 0) return;
  if (d11m.megaDistributed) return;

  const pool = d11m.megaPool || 0;
  const distributable = Math.round(pool * (1 - D11_MEGA_COMPANY_SHARE));

  const ranked = parts
    .map(email => ({ email, team: d11GetUserTeam(matchId, email) }))
    .filter(x => x.team)
    .map(x => ({ email: x.email, points: x.team.totalPoints || 0 }))
    .sort((a,b) => b.points - a.points);

  const payCount = Math.min(3, ranked.length);
  const splitSlice = D11_CUSTOM_CONTEST_SPLIT.slice(0, payCount);
  const splitSum = splitSlice.reduce((a,b)=>a+b, 0);

  const prizes = {};
  const savePromises = [];
  for (let i = 0; i < payCount; i++) {
    const share = splitSlice[i] / splitSum;
    const amount = Math.round(distributable * share);
    if (amount <= 0) continue;
    prizes[ranked[i].email] = amount;
    // Credit prize server-side (admin token verified in wallet.js)
    savePromises.push(_adminWalletPrize(ranked[i].email, amount, 'd11_mega_prize', matchId, 'D11 Mega'));
  }
  await Promise.all(savePromises);

  d11m.megaPrizes = prizes;
  d11m.megaDistributed = true;
  await _saveDream11MatchToFirestore(matchId, d11m);
  try {
    localStorage.setItem('pp_users_cache', JSON.stringify(users));
    localStorage.setItem('pp_dream11_matches_cache', JSON.stringify(dream11Matches));
  } catch(e){}
}

// ─── Dream11 Free Contest: free entry, admin rewards manually ─
async function joinD11FreeContest(matchId) {
  const m = matches[matchId];
  const d11m = dream11Matches[matchId];
  if (!m || !d11m) return;
  if (isD11Locked(matchId)) return showNotif('This Dream11 contest is locked', 'error');

  if (!d11HasUserSubmittedTeam(matchId, currentUser.email)) {
    return showNotif('Please submit your Dream11 team first!', 'error');

async function joinD11H2HContest(matchId) {
  const d11m = dream11Matches[matchId];
  if (!d11m) return;
  if (isD11Locked(matchId)) return showNotif('This Dream11 contest is locked', 'error');

  if ((u.balance || 0) < D11_H2H_ENTRY_FEE) {
    return showNotif(`Minimum Rs ${D11_H2H_ENTRY_FEE} balance is required to join Dream11 H2H. Please deposit first.`, 'error');
  }
  if (hasUserJoinedD11H2H(matchId, currentUser.email)) {

  }
  if (!d11HasUserSubmittedTeam(matchId, currentUser.email)) {
    return showNotif('Please submit your Dream11 team first!', 'error');
  }

  let openContest = Object.values(d11h2hContests).find(c => c.matchId === matchId && c.status === 'open' && !c.player2);

  // Deduct entry fee server-side first
  const result = await _walletCall({ action: 'join_h2h', matchId, entryFee: D11_H2H_ENTRY_FEE });
  if (!result) return;

  u.balance = result.balance;
  u.transactions = result.transactions;
  currentUser.balance = result.balance;
  currentUser.transactions = result.transactions;

    d11h2hContests[nextContest.id] = nextContest;

    ? `Dream11 H2H joined! Rs ${D11_H2H_ENTRY_FEE} deducted. Winner gets Rs ${openContest.winnerPrize} 🥊`

}

// Called when admin finalizes Dream11 scoring — resolves all 'full' H2H
// contests for this match, pays the winner 90% of the pool, refunds on a tie,
// and refunds/cancels any unmatched lone-player slots.
async function finalizeD11H2HContests(matchId) {
  const d11m = dream11Matches[matchId];
  if (!d11m || !d11m.scored) return;

  const contested = Object.values(d11h2hContests).filter(c => c.matchId === matchId && c.status === 'full');
  for (const contest of contested) {
    const p1 = users[contest.player1?.email];
    const p2 = users[contest.player2?.email];
    if (!p1 || !p2) continue;

    const p1Team = d11GetUserTeam(matchId, contest.player1.email);
    const p2Team = d11GetUserTeam(matchId, contest.player2.email);
    const p1Score = p1Team?.totalPoints || 0;
    const p2Score = p2Team?.totalPoints || 0;

    let winnerId = null;
    if (p1Score > p2Score) winnerId = contest.player1.email;
    else if (p2Score > p1Score) winnerId = contest.player2.email;
    else winnerId = 'draw';

    contest.status = 'completed';
    contest.winnerId = winnerId;
    contest.p1Score = p1Score;
    contest.p2Score = p2Score;

    if (winnerId !== 'draw') {
      const winner = users[winnerId];
      if (winner) winner.d11h2hWins = (winner.d11h2hWins || 0) + 1;
      await _adminWalletPrize(winnerId, contest.winnerPrize, 'd11_h2h_prize', matchId, 'D11 H2H win');
      if (winner) await _saveUserToFirestore(winnerId, winner); // persist d11h2hWins only
    } else {
      await _adminWalletRefund(contest.player1.email, D11_H2H_ENTRY_FEE, matchId, 'D11 H2H draw refund');
      await _adminWalletRefund(contest.player2.email, D11_H2H_ENTRY_FEE, matchId, 'D11 H2H draw refund');
    }

    await _saveD11H2HToFirestore(contest.id, contest);
    d11h2hContests[contest.id] = contest;
  }

  // Clean up unmatched open slots for this match now that it's scored
  for (const [id, c] of Object.entries(d11h2hContests)) {
    if (c.matchId === matchId && c.status === 'open') {
      if (!c.player1 && !c.player2) {
        c.status = 'cancelled';
        await _saveD11H2HToFirestore(id, c);
        d11h2hContests[id] = c;
      } else if (c.player1 && !c.player2) {
        await _adminWalletRefund(c.player1.email, D11_H2H_ENTRY_FEE, c.matchId, 'D11 H2H no opponent refund');
        c.status = 'cancelled';
        await _saveD11H2HToFirestore(id, c);
        d11h2hContests[id] = c;
      }
    }
  }

  try {
    localStorage.setItem('pp_dream11_h2h_cache', JSON.stringify(d11h2hContests));
    localStorage.setItem('pp_users_cache', JSON.stringify(users));
  } catch(e){}
}

// Called automatically when admin finalizes Dream11 scoring.
async function finalizeD11CustomContests(matchId) {
  const contests = Object.values(d11CustomContests).filter(c => c.matchId === matchId && c.status === 'open');
  if (contests.length === 0) return;

  const savePromises = [];
  for (const cc of contests) {
    const ranked = cc.participants
      .map(email => {
        const team = d11GetUserTeam(matchId, email);
        return { email, points: team?.totalPoints || 0 };
      })
      .sort((a,b) => b.points - a.points);

    const distributable = Math.round(cc.pool * (1 - D11_CUSTOM_CONTEST_COMPANY_SHARE));
    const prizes = {};
    const payCount = Math.min(3, ranked.length);
    const splitSlice = D11_CUSTOM_CONTEST_SPLIT.slice(0, payCount);
    const splitSum = splitSlice.reduce((a,b)=>a+b, 0);

    for (let i = 0; i < payCount; i++) {
      const share = splitSlice[i] / splitSum;
      const amount = Math.round(distributable * share);
      if (amount <= 0) continue;
      prizes[ranked[i].email] = amount;
      // Credit prize server-side
      savePromises.push(_adminWalletPrize(ranked[i].email, amount, 'd11_custom_prize', matchId, cc.code));
    }

    cc.prizes = prizes;
    cc.status = 'completed';
    savePromises.push(_saveD11CustomContestToFirestore(cc.id, cc));
  }

  await Promise.all(savePromises);
  try {
    localStorage.setItem('pp_dream11_custom_contests_cache', JSON.stringify(d11CustomContests));
    localStorage.setItem('pp_users_cache', JSON.stringify(users));
  } catch(e){}
}

// ════════════════════════════════════════════════════════════
// DREAM11 TOURNAMENTS — multi-match user-created contests
// A user picks several already-existing upcoming Dream11 matches, pays a
// Rs 200 creation fee, sets their own entry fee (or free) for friends to
// join, and gets a shareable code. Each participant builds a separate
// Dream11 team for every match in the tournament (same as normal Dream11);
// the tournament leaderboard simply sums each participant's totalPoints
// across all of the tournament's matches. The tournament auto-completes
// (and pays out any entry-fee pool) once every one of its matches has been
// scored by the admin.
// ════════════════════════════════════════════════════════════

function newD11TournamentTemplate(name, matchIds, entryFee, creatorEmail) {
  return {
    id: uid(), code: genD11TournamentCode(), name: (name||'').trim() || 'My Tournament',
    matchIds, entryFee: entryFee || 0, creatorEmail,
    participants: [], pool: 0, status: 'open', prizes: {}, createdAt: getDateTime(),
    activeUsers: [], // creator explicitly activates users; empty = all participants active
    activeMatches: [], // creator can disable specific matches; empty = all matches active
    autoAddLiveMatches: true // auto-add live matches to this tournament
  };
}

// Sum of a user's Dream11 totalPoints across every match in the tournament.
// Matches the user never built a team for simply contribute 0.
function d11TournamentUserPoints(t, email) {
  const activeMatches = t.activeMatches || [];
  return t.matchIds.reduce((sum, mid) => {
    if (activeMatches.length > 0 && !activeMatches.includes(mid)) return sum;
    const team = d11GetUserTeam(mid, email);
    return sum + (team?.totalPoints || 0);
  }, 0);
}
// How many of a tournament's matches have been fully scored so far.
function d11TournamentScoredCount(t) {
  return t.matchIds.filter(mid => dream11Matches[mid]?.scored).length;
}

async function d11CreateTournament() {
  const draft = d11TournamentDraft;
  if (!draft) return;
  const name = (draft.name || '').trim();
  if (!name) return showNotif('Please enter a tournament name', 'error');
  const matchIds = draft.matchIds || [];
  const entryFee = Math.max(0, parseInt(draft.entryFee) || 0);

  const u = users[currentUser.email];
  if (!u) return;
  const totalCost = D11_TOURNAMENT_CREATION_FEE + entryFee; // creation fee + creator's own entry (if any)
  if ((u.balance || 0) < totalCost) {
    return showNotif(`Rs ${totalCost} balance is required (Rs ${D11_TOURNAMENT_CREATION_FEE} creation fee${entryFee>0?` + Rs ${entryFee} entry fee`:''}) — you have Rs ${u.balance||0}`, 'error');
  }

  const t = newD11TournamentTemplate(name, matchIds, entryFee, currentUser.email);

  // Deduct creation fee (and entry fee if any) server-side
  const creationResult = await _walletCall({ action: 'create_custom_contest', matchId: 'tournament', entryFee: D11_TOURNAMENT_CREATION_FEE, contestCode: t.code });
  if (!creationResult) return;

  u.balance = creationResult.balance;
  u.transactions = creationResult.transactions;
  currentUser.balance = creationResult.balance;
  currentUser.transactions = creationResult.transactions;

  // Creator is auto-joined as the first participant (pays entry fee too, if any)
  if (entryFee > 0) {
    const entryResult = await _walletCall({ action: 'join_custom_contest', matchId: 'tournament', entryFee, contestCode: t.code });
    if (!entryResult) return;
    u.balance = entryResult.balance;
    u.transactions = entryResult.transactions;
    currentUser.balance = entryResult.balance;
    currentUser.transactions = entryResult.transactions;
    t.pool += entryFee;
  }
  t.participants.push(currentUser.email);

  d11Tournaments[t.id] = t;
  await _saveD11TournamentToFirestore(t.id, t);
  try {
    localStorage.setItem('pp_dream11_tournaments_cache', JSON.stringify(d11Tournaments));
    localStorage.setItem('pp_users_cache', JSON.stringify(users));
  } catch(e){}

  d11TournamentDraft = null;
  showNotif(`🏆 Tournament created! Code: ${t.code} — share it with friends`);
  openD11TournamentDetail(t.id);
}

async function d11JoinTournament(tId) {
  const t = d11Tournaments[tId];
  if (!t) return showNotif('Tournament not found', 'error');
  if (t.status !== 'open') return showNotif('This tournament has already ended', 'error');
  if (t.participants.includes(currentUser.email)) return showNotif('You are already in this tournament!', 'error');
  if (t.participants.length >= D11_TOURNAMENT_MAX_PARTICIPANTS) {
    return showNotif(`This tournament is full (max ${D11_TOURNAMENT_MAX_PARTICIPANTS} players)`, 'error');
  }
  // Can't join once any match in the tournament has already started/locked —
  // keeps it fair, same spirit as single-match contests closing at deadline.
  const anyLocked = t.matchIds.some(mid => isD11Locked(mid));
  if (anyLocked) return showNotif('This tournament has already started — joining is closed', 'error');

  const u = users[currentUser.email];
  if (!u) return;
  if (t.entryFee > 0 && (u.balance || 0) < t.entryFee) {
    return showNotif(`Rs ${t.entryFee} balance is required to join this tournament`, 'error');
  }

  if (t.entryFee > 0) {
    const result = await _walletCall({ action: 'join_custom_contest', matchId: 'tournament', entryFee: t.entryFee, contestCode: t.code });
    if (!result) return;
    u.balance = result.balance;
    u.transactions = result.transactions;
    currentUser.balance = result.balance;
    currentUser.transactions = result.transactions;
    t.pool += t.entryFee;
  }
  t.participants.push(currentUser.email);

  await _saveD11TournamentToFirestore(t.id, t);
  try {
    localStorage.setItem('pp_dream11_tournaments_cache', JSON.stringify(d11Tournaments));
    localStorage.setItem('pp_users_cache', JSON.stringify(users));
  } catch(e){}

  showNotif(`✅ Joined tournament "${t.name}"! 🏆`);
  openD11TournamentDetail(t.id);
}

// Called automatically every time admin finalizes scoring for a single
// Dream11 match. Checks every open tournament that includes this match —
// once ALL of a tournament's matches are scored, the tournament is marked
// completed and its entry-fee pool (if any) is paid out top-3.
async function d11CheckTournamentsForMatch(matchId) {
  const affected = Object.values(d11Tournaments).filter(t => t.status === 'open' && t.matchIds.includes(matchId));
  if (affected.length === 0) return;

  const savePromises = [];
  for (const t of affected) {
    const allScored = t.matchIds.every(mid => dream11Matches[mid]?.scored);
    if (!allScored) continue; // still waiting on other matches in this tournament

    const ranked = t.participants
      .map(email => ({ email, points: d11TournamentUserPoints(t, email) }))
      .sort((a,b) => b.points - a.points);

    if (t.pool > 0) {
      const distributable = Math.round(t.pool * (1 - D11_TOURNAMENT_COMPANY_SHARE));
      const prizes = {};
      const payCount = Math.min(3, ranked.length);
      const splitSlice = D11_TOURNAMENT_SPLIT.slice(0, payCount);
      const splitSum = splitSlice.reduce((a,b)=>a+b, 0);
      for (let i = 0; i < payCount; i++) {
        const share = splitSlice[i] / splitSum;
        const amount = Math.round(distributable * share);
        if (amount <= 0) continue;
        prizes[ranked[i].email] = amount;
        // Credit prize server-side
        savePromises.push(_adminWalletPrize(ranked[i].email, amount, 'd11_tournament_prize', null, t.code));
      }
      t.prizes = prizes;
    }

    t.status = 'completed';
    savePromises.push(_saveD11TournamentToFirestore(t.id, t));
  }

  await Promise.all(savePromises);
  try {
    localStorage.setItem('pp_dream11_tournaments_cache', JSON.stringify(d11Tournaments));
    localStorage.setItem('pp_users_cache', JSON.stringify(users));
  } catch(e){}
}

async function d11ConfirmAddMatches() {
  const t = d11Tournaments[d11ViewTournamentId];
  if (!t) return;
  if (t.creatorEmail !== currentUser.email) return showNotif('Only the tournament creator can add matches', 'error');
  if (t.status !== 'open') return showNotif('This tournament has already ended', 'error');

  d11CloseAddMatches();

}

// Toggle a user active/inactive in a tournament (creator only)
async function d11ToggleUserActive(tId, email) {
  const t = d11Tournaments[tId];
  if (!t || t.creatorEmail !== currentUser.email) return;
  t.activeUsers = t.activeUsers || [];
  if (t.activeUsers.length === 0) {
    // Everyone was active — seed with all except this user (deactivating them)
    t.activeUsers = t.participants.filter(e => e !== email);
  } else {
    const idx = t.activeUsers.indexOf(email);
    if (idx === -1) t.activeUsers.push(email); // activate
    else t.activeUsers.splice(idx, 1);           // deactivate
  }
  await _saveD11TournamentToFirestore(t.id, t);
  try { localStorage.setItem('pp_dream11_tournaments_cache', JSON.stringify(d11Tournaments)); } catch(e){}
  render();
}

// Toggle auto-add live matches for this tournament (creator only)
async function d11ToggleTournamentAutoAdd(tId) {
  const t = d11Tournaments[tId];
  if (!t || t.creatorEmail !== currentUser.email) return;
  t.autoAddLiveMatches = t.autoAddLiveMatches === false ? true : false;
  await _saveD11TournamentToFirestore(t.id, t);
  try { localStorage.setItem('pp_dream11_tournaments_cache', JSON.stringify(d11Tournaments)); } catch(e){}
  render();
}

// Delete a tournament (creator only, only if status is open)
async function d11DeleteTournament(tId) {
  const t = d11Tournaments[tId];
  if (!t || t.creatorEmail !== currentUser.email) return;
  if (!confirm(`"${t.name}" tournament? This cannot be undone.`)) return;

  // Refund entry fees to all participants if paid
  const savePromises = [];
  if (t.entryFee > 0) {
    for (const email of t.participants) {
      // Refund server-side (admin token used since creator initiated delete)
      savePromises.push(_adminWalletRefund(email, t.entryFee, null, `Tournament ${t.code} deleted`));
    }
  }

  // Delete from Firestore
  try {
    const { deleteDoc, doc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    await deleteDoc(doc(window._fbDb, 'pp_dream11_tournaments', tId));
  } catch(e) { console.error('Delete tournament error:', e); }

  delete d11Tournaments[tId];
  await Promise.all(savePromises);
  try { localStorage.setItem('pp_dream11_tournaments_cache', JSON.stringify(d11Tournaments)); } catch(e) {}

  showNotif('🗑️ Tournament deleted' + (t.entryFee > 0 ? ' — fees have been refunded' : ''));
  goD11Tournaments();
}
async function d11ToggleMatchActive(tId, mid) {
  const t = d11Tournaments[tId];
  if (!t || t.creatorEmail !== currentUser.email) return;
  t.activeMatches = t.activeMatches || [];
  if (t.activeMatches.length === 0) {
    // All were active — seed with all except this one (deactivating it)
    t.activeMatches = t.matchIds.filter(m => m !== mid);
  } else {
    const idx = t.activeMatches.indexOf(mid);
    if (idx === -1) t.activeMatches.push(mid); // activate
    else t.activeMatches.splice(idx, 1);        // deactivate
  }
  await _saveD11TournamentToFirestore(t.id, t);
  try { localStorage.setItem('pp_dream11_tournaments_cache', JSON.stringify(d11Tournaments)); } catch(e){}
  render();
}

  </details>
  ${(() => {

      const d11m = dream11Matches[m.id];
      return d11m && d11m.published && d11m.players.length >= D11_TEAM_SIZE;

    return visible.map(m => {
    const d11m = dream11Matches[m.id];
    const myTeam = Object.values(dream11Teams).find(t => t.matchId === m.id && t.userEmail === currentUser.email);
    const dLocked = isD11Locked(m.id);
    const isLiveScoring = !d11m.scored && dLocked && !!d11m.lastLiveUpdateAt;
    const deadlineStr = m.deadline ? new Date(m.deadline).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '';

      <div style="font-size:11.5px;color:var(--dim);margin-bottom:4px">👥 ${d11m.players.length} players pool ready ${xiCount > 0 ? `· 🏏 ${xiCount} confirmed Playing XI` : ''}</div>

          <button class="btn-primary btn-block" style="font-size:12px;padding:10px" onclick="openDream11Match('${m.id}')">🎮 Build My Team</button>

      </div>

    </div>`;
  }).join('');
  })()}
  `;
  } catch(e) {
    console.error("Dream11 render error:", e);
    return `<div class="empty-state"><div class="empty-icon">🎮</div>Dream11 load ho raha hai...<br/><button class="btn-secondary" style="margin-top:14px" onclick="_loadAllDream11MatchesFromFirestore().then(()=>render())">🔄 Dobara Try Karo</button></div>`;

// ── ADMIN: Player pool management screen ──
function renderDream11AdminPool() {
  const m = matches[d11ActiveMatchId];
  const d11m = dream11Matches[d11ActiveMatchId];
  if (!m || !d11m) return `<div class="empty-state">Match not found. <button class="btn-secondary" onclick="goDream11Hub()" style="margin-top:10px">← Back</button></div>`;

  if (d11AdminTab === 'scoring') return renderDream11AdminScoring();

  const sideA = d11m.players.filter(p => p.side === 'A');
  const sideB = d11m.players.filter(p => p.side === 'B');
  const dLocked = isD11Locked(d11ActiveMatchId);
  const deadlineStr = m.deadline ? new Date(m.deadline).toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : 'Not set';

      <span class="team-name">${m.teamB||'TBD'}</span>
    </div>

    <div style="text-align:center;font-size:11px;color:var(--orange);font-weight:600;margin-top:6px">⏰ Deadline: ${deadlineStr} ${dLocked && !d11m.locked ? '(passed — auto-locked)' : ''}</div>
    ${!dLocked && m.deadline ? `<div class="d11-countdown" data-deadline="${m.deadline}" style="text-align:center;font-size:12px;font-weight:700;color:var(--orange);margin-top:2px">${d11FormatCountdown(m.deadline - Date.now())}</div>` : ''}
    <div style="text-align:center;margin-top:8px">
      <button class="btn-secondary" style="font-size:11px;padding:6px 12px" onclick="tab='home';editMatch('${d11ActiveMatchId}')">✏️ Edit Deadline (in Matches tab)</button>
    </div>
    <div style="text-align:center;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.08)">
      <div style="margin-bottom:8px">
        ${d11m.published ? `<span class="match-status" style="background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.35)">🟢 PUBLISHED — visible to users</span>` : `<span class="match-status" style="background:rgba(234,179,8,0.15);color:#facc15;border:1px solid rgba(234,179,8,0.35)">🔒 NOT PUBLISHED — hidden from users</span>`}
      </div>
      <button class="btn-primary btn-block" style="font-size:12px;padding:10px;background:${d11m.published ? 'linear-gradient(135deg,#dc2626,#b91c1c)' : 'linear-gradient(135deg,#16a34a,#15803d)'}" onclick="d11TogglePublish('${d11ActiveMatchId}')">${d11m.published ? '🚫 Unpublish (hide from users)' : '🚀 Publish (show to users)'}</button>
    </div>
  </div>

  <div class="admin-tab-row">
    <button class="admin-tab active">Player Pool</button>

    <button class="admin-tab" onclick="d11GoToScoring()">Scoring</button>
  </div>


  ${d11PasteText !== null ? `
  <div class="card mb14" style="border-color:rgba(192,132,252,0.4)">
    <div class="section-title" style="margin-bottom:10px">📋 Paste Full Squad</div>
    <div class="empty-state" style="padding:6px 2px;font-size:11.5px;text-align:left;line-height:1.6">
      Paste both teams' squads together. A line matching the team name switches which side new players go to:
      <br/><b style="color:var(--text)">${(m.teamA||'TEAM A').toUpperCase()}</b> then its players below, then <b style="color:var(--text)">${(m.teamB||'TEAM B').toUpperCase()}</b> then its players below.
      <br/><br/>Works either way: one player per line, OR a whole squad copy-pasted as a single comma-separated line (e.g. straight from a cricket website) — both get split into individual players automatically.
      <br/><br/>You can tag a role too (optional) — e.g. <b style="color:var(--text)">Rizwan - WK</b>, <b style="color:var(--text)">Shaheen Afridi (Bowler)</b>. If no role is given, the app guesses one — tap the role chip below to fix it if it's wrong.
    </div>
    <textarea id="d11-paste-box" class="input" style="min-height:220px;font-family:monospace;font-size:12.5px;line-height:1.6;resize:vertical;white-space:pre" oninput="d11UpdatePasteText(this.value)">${(d11PasteText||'').replace(/</g,'&lt;')}</textarea>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn-secondary" style="flex:1" onclick="d11CancelPasteSquad()">Cancel</button>
      <button class="btn-primary" style="flex:1" onclick="d11ConfirmPasteSquad()">✅ Add All Players</button>
    </div>
  </div>` : d11SquadScreenshotOpen ? renderD11SquadScreenshotScan()
    : d11SquadPickerOpen ? renderD11SquadPicker()
    : d11Draft ? `
  <div class="card mb14" style="border-color:rgba(37,99,235,0.4)">
    <div class="section-title" style="margin-bottom:10px">➕ Add Player</div>
    <div class="mb14">
      <label class="label">Player Name</label>
      <input class="input" id="d11-p-name" placeholder="e.g. Babar Azam" value="${(d11Draft.name||'').replace(/"/g,'&quot;')}" oninput="d11Draft.name=this.value" />
    </div>
    <div class="mb14">
      <label class="label">Role</label>
      <div class="admin-tab-row" style="margin-bottom:0">

      </div>
    </div>
    <div class="mb18">
      <label class="label">Team</label>
      <div class="admin-tab-row" style="margin-bottom:0">
        <button class="admin-tab ${d11Draft.side==='A'?'active':''}" onclick="d11SetDraftField('side','A')">${m.teamA||'Team A'}</button>
        <button class="admin-tab ${d11Draft.side==='B'?'active':''}" onclick="d11SetDraftField('side','B')">${m.teamB||'Team B'}</button>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-secondary" style="flex:1" onclick="d11CancelAddPlayer()">Cancel</button>
      <button class="btn-primary" style="flex:1" onclick="d11SaveDraftPlayer()">Save Player</button>
    </div>
  </div>` : `
  ${(() => {
    const squadA = d11GetTeamSquad(m.teamA);
    const squadB = d11GetTeamSquad(m.teamB);
    if (!squadA && !squadB) return '';
    return `

    ${squadA ? `<button class="btn-secondary" style="flex:1;font-size:12px" onclick="d11OpenSquadPicker('A')">📂 Select from Squad — ${m.teamA} (${squadA.players.length})</button>` : ''}
    ${squadB ? `<button class="btn-secondary" style="flex:1;font-size:12px" onclick="d11OpenSquadPicker('B')">📂 Select from Squad — ${m.teamB} (${squadB.players.length})</button>` : ''}
  </div>`;
  })()}
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button class="btn-primary" style="flex:1" onclick="d11StartPasteSquad()">📋 Paste Squad</button>
    <button class="btn-secondary" style="flex:1" onclick="d11StartAddPlayer()">➕ Add One</button>
  </div>
  <button class="btn-primary btn-block mb14" style="background:linear-gradient(135deg,#9333ea,#7e22ce)" onclick="d11OpenSquadScreenshotScan()">📸 Scan Squad Screenshot (Auto-Fill Players)</button>
  `}

  ${d11PhotoCropQueue.length > 0 ? renderD11PhotoCropModal() : ''}

  <div class="section-title">${m.teamA||'Team A'} (${sideA.length})</div>
  ${sideA.length === 0 ? `<div class="empty-state" style="padding:20px">No players added yet</div>` : `
  <div class="empty-state" style="padding:0 2px 10px;font-size:10.5px;text-align:left">Tap the role chip to change role · tap 🏏 to confirm Playing XI</div>
  <button class="btn-secondary" style="font-size:11px;padding:7px 12px;margin-bottom:10px" onclick="d11MarkAllPlayingXI('A')">🏏 Mark all ${m.teamA||'Team A'} as Playing XI</button>
  ${sideA.map(p => d11AdminPlayerRow(p)).join('')}`}

  <div class="section-title" style="margin-top:18px">${m.teamB||'Team B'} (${sideB.length})</div>
  ${sideB.length === 0 ? `<div class="empty-state" style="padding:20px">No players added yet</div>` : `
  <button class="btn-secondary" style="font-size:11px;padding:7px 12px;margin-bottom:10px" onclick="d11MarkAllPlayingXI('B')">🏏 Mark all ${m.teamB||'Team B'} as Playing XI</button>
  ${sideB.map(p => d11AdminPlayerRow(p)).join('')}`}

  ${d11m.players.some(p=>p.isPlayingXI) ? `<button class="btn-secondary btn-block mb14" style="margin-top:10px;font-size:12px" onclick="d11ClearAllPlayingXI()">↺ Clear all Playing XI confirmations</button>` : ''}

  ${d11m.players.length >= D11_TEAM_SIZE ? `
  <button class="btn-secondary btn-block mb14" style="margin-top:18px" onclick="d11ToggleLock()">${d11m.locked ? '🔓 Unlock Contest (manual lock)' : '🔒 Lock Now (force lock before deadline)'}</button>
  <div class="empty-state" style="padding:0 4px 14px;font-size:10.5px;text-align:left">Contest also auto-locks automatically once the match deadline passes — use this only to lock it earlier than the deadline.</div>
  ` : `<div class="empty-state" style="margin-top:14px;padding:16px;font-size:12px">Add at least ${D11_TEAM_SIZE} players across both teams so users can build a team.</div>`}
  `;
}

function d11SetPlayerCredit(playerId, val) {
  const d11m = dream11Matches[d11ActiveMatchId];
  if (!d11m) return;
  const p = d11m.players.find(x => x.id === playerId);
  if (!p) return;
  p.credit = parseFloat(val) || 0;
  _saveDream11MatchToFirestore(d11ActiveMatchId, d11m);
}
function d11AdminPlayerRow(p) {
  const roles = Object.keys(D11_ROLE_LIMITS);
  const nextRole = roles[(roles.indexOf(p.role) + 1) % roles.length];
  return `
  <div class="d11-player-row">
    <div class="d11-player-left" style="gap:8px">
      <div style="position:relative;flex-shrink:0" onclick="d11TriggerPhotoUpload('${p.id}')" title="Tap to set player photo">
        ${playerAvatarHtml(p.photo, p.name, 34)}
        <div style="position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;border-radius:50%;background:#2563eb;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer">📷</div>
      </div>
      <button class="d11-role-chip d11-role-${p.role}" style="border:none" title="Tap to change role" onclick="d11QuickSetRole('${p.id}','${nextRole}')">${p.role} ↻</button>
      <div class="d11-player-name">${p.name}${p.isPlayingXI ? ' <span style="color:#4ade80;font-size:11px">✅ XI</span>' : ''}</div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <input class="input" style="padding:4px 6px;font-size:11px;width:54px" type="number" step="0.5" placeholder="Cr" value="${p.credit||''}" onchange="d11SetPlayerCredit('${p.id}', this.value)" title="Credit value" />
      <button class="d11-pick-btn ${p.isPlayingXI?'active':''}" style="${p.isPlayingXI?'background:#16a34a;border-color:#16a34a':''}" title="Mark/unmark as confirmed Playing XI" onclick="d11TogglePlayingXI('${p.id}')">🏏</button>
      <button class="d11-pick-btn active" onclick="d11RemovePlayer('${p.id}')">✕</button>
    </div>
  </div>`;
}

    <div class="card mb14">
      <div class="match-teams" style="margin-bottom:4px">
        <span class="team-name">${m.teamA||'TBD'}</span>
        <span class="vs-badge">VS</span>
        <span class="team-name">${m.teamB||'TBD'}</span>

    </div>
    ${renderD11QuickScoreTable()}

  <button class="btn-secondary mb14" style="font-size:12px;padding:8px 14px" onclick="goDream11Hub()">← Back to Dream11</button>

      <span class="team-name">${m.teamA||'TBD'}</span>
      <span class="vs-badge">VS</span>

    <button class="admin-tab" onclick="d11AdminTab='pool';render()">Player Pool</button>

function d11OpenUrlFetch() {

async function d11FetchFromUrl() {
  const url = (d11UrlFetchInput || '').trim();
  if (!url || !url.startsWith('http')) {
    showNotif('Pehle valid URL daalo (https:// se shuru ho)', 'error');
    return;
  }
  const d11m = dream11Matches[d11ActiveMatchId];
  if (!d11m) return;

  d11UrlFetchBusy = true;
  render();

  try {
    const response = await fetch('/.netlify/functions/search-score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        query: `Fetch cricket scorecard from this URL and extract all batting, bowling, and fielding stats: ${url}`
      })
    });
    const data = await response.json();
    if (!response.ok) throw new Error((data && data.error) || 'Fetch error');
    if (!data.text) throw new Error('Koi data nahi mila');

    let cleaned = data.text.trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,'');
    const parsed = JSON.parse(cleaned);

    if (parsed.matchStatus === 'not_found') {
      showNotif('Is URL se data nahi mila — check karo URL sahi hai', 'error');
      d11UrlFetchBusy = false;
      render();
      return;
    }

    const battingRows = (parsed.batting||[]).map(b => ({
      name: b.name, runs: Number(b.runs)||0, ballsFaced: Number(b.balls)||0,
      fours: Number(b.fours)||0, sixes: Number(b.sixes)||0, isOut: b.isOut !== false
    }));
    const bowlingRows = (parsed.bowling||[]).map(b => ({
      name: b.name, oversBowled: Number(b.overs)||0, maidens: Number(b.maidens)||0,
      runsGiven: Number(b.runsGiven)||0, wickets: Number(b.wickets)||0
    }));
    const fieldingRows = (parsed.fielding||[]).map(f => ({
      name: f.name, catches: Number(f.catches)||0, stumpings: Number(f.stumpings)||0, runOuts: Number(f.runOuts)||0
    }));

    if (battingRows.length === 0 && bowlingRows.length === 0) {
      showNotif('URL se koi player data nahi mila — try karo Search feature', 'error');
      d11UrlFetchBusy = false;
      render();
      return;
    }

    const reviewRows = _d11BuildReviewRows(battingRows, bowlingRows, fieldingRows);
    const summary = parsed.summary ? ` (${parsed.summary})` : '';
    d11ScanReview = { rows: reviewRows, source: 'search', noteTag: `🌐 URL Fetch${summary}` };
    d11UrlFetchBusy = false;
    d11UrlFetchOpen = false;
    render();
    showNotif(`✅ ${reviewRows.length} players mile URL se${summary} — check karo phir Apply`);
  } catch (err) {
    d11UrlFetchBusy = false;
    render();
    showNotif('URL fetch failed: ' + (err && err.message ? err.message : String(err)), 'error');
  }
}

    bowlA ? `=== TEAM A BOWLING ===\n${bowlA}` : '',
