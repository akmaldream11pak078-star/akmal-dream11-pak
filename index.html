      body: JSON.stringify({
        prompt: `Extract cricket stats from this scorecard text. Return ONLY valid JSON:\n{\n  "batting": [{"name":"Player","runs":0,"balls":0,"fours":0,"sixes":0,"isOut":true}],\n  "bowling": [{"name":"Player","overs":0,"maidens":0,"runsGiven":0,"wickets":0}],\n  "fielding": [{"name":"Player","catches":0,"stumpings":0,"runOuts":0}]\n}\n\nScorecard:\n${combined}`,
        images: []
      })
    });
    const data = await response.json();
    if (!response.ok) throw new Error((data && data.error) || 'Error');
    if (!data.text) throw new Error('Koi response nahi');

    let cleaned = data.text.trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,'');
    const parsed = JSON.parse(cleaned);

    const battingRows = (parsed.batting||[]).map(b => ({
      name: b.name, runs: Number(b.runs)||0, ballsFaced: Number(b.balls)||0,
      fours: Number(b.fours)||0, sixes: Number(b.sixes)||0, isOut: b.isOut !== false
    }));
    const bowlingRows = (parsed.bowling||[]).map(b => ({
      name: b.name, oversBowled: Number(b.overs)||0, maidens: Number(b.maidens)||0,
      runsGiven: Number(b.runsGiven)||0, wickets: Number(b.wickets)||0
    }));
    const fieldingRows = (parsed.fielding||[]).map(f => ({
      name: f.name, catches: Number(f.catches)||0, stumpings: Number(f.stumpings)||0, runOuts: Number(f.runOuts)||0
    }));

    if (battingRows.length === 0 && bowlingRows.length === 0) {
      showNotif('Koi data nahi mila — check karo paste sahi hai', 'error');
      return;
    }

    const reviewRows = _d11BuildReviewRows(battingRows, bowlingRows, fieldingRows);
    d11ScanReview = { rows: reviewRows, source: 'paste', noteTag: '📋 Simple Paste' };
    d11SimplePasteOpen = false;
    render();
    showNotif(`✅ ${reviewRows.length} players mile — check karo phir Apply dabao`);
  } catch (err) {
    showNotif('Error: ' + (err && err.message ? err.message : String(err)), 'error');
  }
}

          <div><label class="label" style="font-size:9.5px">Runs Given</label><input class="input" style="padding:7px" type="number" value="${r.runsGiven}" oninput="utReviewUpdateField(${idx},'runsGiven',this.value)" /></div>
          <div><label class="label" style="font-size:9.5px">Catches</label><input class="input" style="padding:7px" type="number" value="${r.catches}" oninput="utReviewUpdateField(${idx},'catches',this.value)" /></div>
          <div><label class="label" style="font-size:9.5px">Stumpings</label><input class="input" style="padding:7px" type="number" value="${r.stumpings}" oninput="utReviewUpdateField(${idx},'stumpings',this.value)" /></div>

// ── Admin: Dream11 Free Contest manual rewards panel ───────────
function renderD11FreeRewards(d11m) {
  const parts = d11m.freeParticipants || [];
  if (parts.length === 0) return '';

  const matchId = d11ActiveMatchId;
  const rewards = d11m.freeRewards || {};
  const sorted = parts.map(email => {
    const team = d11GetUserTeam(matchId, email);
    return { email, name: users[email]?.name || email, points: team?.totalPoints || 0 };
  }).sort((a,b) => b.points - a.points);

  return `
  <div class="card mb14" style="background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.3)">
    <div style="font-weight:700;font-size:14px;color:#4ade80;margin-bottom:6px">🎁 Dream11 Free Contest — Give Rewards</div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:8px">Add reward amount (Rs) manually for any player you'd like to reward. Leave blank for no reward.</div>
    ${sorted.map((p,i) => `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
      <div style="flex:1;font-size:12.5px"><b>#${i+1}</b> ${p.name} <span style="color:var(--dim)">(${p.points} pts)</span> ${rewards[p.email] ? `<span style="color:#4ade80">— Rs ${rewards[p.email]} given</span>` : ''}</div>
      <input class="input" id="d11-free-reward-${matchId}-${p.email}" type="number" min="0" placeholder="0" style="width:90px;padding:8px" ${rewards[p.email] ? 'disabled' : ''} />
    </div>`).join('')}
    <button class="btn-primary mb10" style="margin-top:6px;background:linear-gradient(135deg,#16a34a,#15803d)" onclick="giveD11FreeRewards('${matchId}')">🎁 Give Rewards</button>
  </div>`;
}

// ── USER: Build team screen ──
function renderDream11BuildTeam() {
  const m = matches[d11TeamDraft.matchId];
  const d11m = dream11Matches[d11TeamDraft.matchId];
  if (!m || !d11m) return `<div class="empty-state">Match not found. <button class="btn-secondary" onclick="goDream11Hub()" style="margin-top:10px">← Back</button></div>`;

  const { counts } = dream11TeamComposition(d11TeamDraft.picks, d11m);
  const sideA = d11m.players.filter(p => p.side === 'A');
  const sideB = d11m.players.filter(p => p.side === 'B');
  const dLocked = isD11Locked(d11TeamDraft.matchId);
  const deadlineStr = m.deadline ? new Date(m.deadline).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
  const xiCount = d11m.players.filter(p => p.isPlayingXI).length;

  const progressPill = (role) => {
    const [min, max] = D11_ROLE_LIMITS[role];
    const c = counts[role]||0;
    const cls = c > max ? 'over' : (c >= min ? 'ok' : '');
    return `<div class="d11-progress-pill ${cls}"><div class="d11-progress-num">${c}/${max}</div><div class="d11-progress-lbl">${role}</div></div>`;
  };

  return `
  <button class="btn-secondary mb14" style="font-size:12px;padding:8px 14px" onclick="goDream11Hub()">← Back to Dream11</button>

  <div class="card mb14">
    <div class="match-teams" style="margin-bottom:4px">
      <span class="team-name">${m.teamA||'TBD'}</span>
      <span class="vs-badge">VS</span>
      <span class="team-name">${m.teamB||'TBD'}</span>
    </div>
    <div style="text-align:center;font-size:11px;color:var(--dim)">Build your Dream11 — select ${D11_TEAM_SIZE} players</div>
    ${deadlineStr ? `<div class="match-deadline">${dLocked ? '🔒 Deadline passed — team can no longer be submitted' : `⏰ Deadline: ${deadlineStr}`}</div>${!dLocked && m.deadline ? `<div class="d11-countdown" data-deadline="${m.deadline}" style="font-size:12px;font-weight:700;color:var(--orange);text-align:center;margin-top:4px">${d11FormatCountdown(m.deadline - Date.now())}</div>` : ''}` : ''}
    ${xiCount > 0 ? `<div style="text-align:center;font-size:10.5px;color:#4ade80;margin-top:4px">🏏 Playing XI confirmed for ${xiCount} player${xiCount===1?'':'s'} — look for the green tick below</div>` : `<div style="text-align:center;font-size:10.5px;color:var(--dim);margin-top:4px">Playing XI not confirmed yet — pick from the full squad for now</div>`}
  </div>

  <div class="d11-progress-bar">
    ${progressPill('WK')}${progressPill('BAT')}${progressPill('AR')}${progressPill('BOWL')}
  </div>

  ${!dLocked ? `
  <div class="card mb14" style="background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(16,185,129,0.08));border-color:rgba(124,58,237,0.4);padding:12px 14px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <div style="font-size:22px">🤖</div>
      <div>
        <div style="font-weight:700;font-size:13.5px;color:#a78bfa">AI Best Team Selector</div>
        <div style="font-size:11px;color:var(--dim);margin-top:1px">AI picks your unique best 11 based on current performance &amp; credits — Captain &amp; Vice-Captain auto-assigned!</div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-primary" style="flex:1;background:linear-gradient(135deg,#7c3aed,#4f46e5);font-size:13px;padding:10px;font-weight:700" onclick="d11AiAutoSelect()">🤖 Auto Select Best Team</button>
      ${d11TeamDraft.picks.length > 0 ? `<button class="btn-secondary" style="font-size:12px;padding:10px 14px" onclick="d11TeamDraft.picks=[];d11TeamDraft.captain=null;d11TeamDraft.viceCaptain=null;render()">🗑️ Reset</button>` : ''}
    </div>
    <div style="font-size:10px;color:var(--dim);margin-top:6px;text-align:center">Or manually select players from the list below</div>
  </div>` : ''}

  <div class="section-title">${m.teamA||'Team A'}</div>
  ${sideA.map(p => d11PickRow(p)).join('')}

  <div class="section-title" style="margin-top:16px">${m.teamB||'Team B'}</div>
  ${sideB.map(p => d11PickRow(p)).join('')}

  ${d11TeamDraft.picks.length === D11_TEAM_SIZE ? `
  <div class="section-title" style="margin-top:18px">👑 Select Captain & Vice-Captain</div>
  <div class="empty-state" style="padding:8px 4px;font-size:11px;text-align:left">Captain = 2x points · Vice-Captain = 1.5x points</div>
  ${d11TeamDraft.picks.map(pid => {
    const p = d11m.players.find(x => x.id === pid);
    if (!p) return '';
    return `
    <div class="d11-player-row picked">
      <div class="d11-player-left">
        <span class="d11-role-chip d11-role-${p.role}">${p.role}</span>
        <div class="d11-player-name">${p.name}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="d11-cv-btn ${d11TeamDraft.captain===pid?'is-c':''}" onclick="d11SetCaptain('${pid}')">C</button>
        <button class="d11-cv-btn ${d11TeamDraft.viceCaptain===pid?'is-vc':''}" onclick="d11SetViceCaptain('${pid}')">VC</button>
      </div>
    </div>`;
  }).join('')}
  ` : ''}

  <div class="d11-sticky-bar">
    <div>
      <div style="font-size:11px;color:var(--dim)">Selected</div>
      <div class="display" style="font-size:18px">${d11TeamDraft.picks.length}/${D11_TEAM_SIZE}</div>
    </div>
    <div>
      <div style="font-size:11px;color:var(--dim);text-align:center">Credits Left</div>
      <div class="display" style="font-size:18px;color:${(D11_CREDIT_BUDGET - d11TeamDraftCreditsUsed(d11m)) < 0 ? '#f87171' : 'var(--gold)'};text-align:center">${(D11_CREDIT_BUDGET - d11TeamDraftCreditsUsed(d11m)).toFixed(1)}</div>
    </div>
    ${dLocked
      ? `<button class="btn-secondary" style="padding:12px 22px" disabled>🔒 Locked</button>`
      : `<button class="btn-primary" style="padding:12px 22px" onclick="d11SubmitTeam()">✅ Submit Team</button>`}
  </div>
  `;
}

function d11PickRow(p) {
  const picked = d11TeamDraft.picks.includes(p.id);
  return `
  <div class="d11-player-row ${picked?'picked':''}">
    <div class="d11-player-left">
      ${p.photo ? `<img src="${p.photo}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0" />` : ''}
      <span class="d11-role-chip d11-role-${p.role}">${p.role}</span>
      <div class="d11-player-name">${p.name}${p.isPlayingXI ? ' <span style="color:#4ade80;font-size:11px" title="Confirmed Playing XI">✅</span>' : ''}</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:11px;color:var(--dim);font-weight:600">${d11PlayerCredit(p)} Cr</span>
      <button class="d11-pick-btn ${picked?'active':''}" onclick="d11TogglePick('${p.id}')">${picked?'✕':'+'}</button>
    </div>
  </div>`;
}

// ── Leaderboard for a Dream11 match ──
function renderDream11Leaderboard() {
  const m = matches[d11ActiveMatchId];
  const d11m = dream11Matches[d11ActiveMatchId];
  const teams = Object.values(dream11Teams).filter(t => t.matchId === d11ActiveMatchId).sort((a,b) => (b.totalPoints||0) - (a.totalPoints||0));

  <button class="btn-secondary mb14" style="font-size:12px;padding:8px 14px" onclick="goDream11Hub()">← Back to Dream11</button>

  <div class="card mb14">
    <div class="match-teams" style="margin-bottom:4px">
      <span class="team-name">${m?.teamA||'TBD'}</span>
      <span class="vs-badge">VS</span>
      <span class="team-name">${m?.teamB||'TBD'}</span>
    </div>
    <div style="text-align:center;margin-top:4px">
      ${d11m?.scored ? `<span class="match-status status-completed">🏁 FINAL RESULT</span>` : d11m?.lastLiveUpdateAt ? `<span class="match-status status-live">🔴 LIVE</span>` : `<span class="match-status status-upcoming">⏳ Scoring pending</span>`}
    </div>
    ${!d11m?.scored && d11m?.lastLiveUpdateAt ? `<div style="text-align:center;font-size:10.5px;color:var(--dim);margin-top:6px">Last live update: ${d11m.lastLiveUpdateAt}</div>` : ''}
  </div>

  <div class="section-title">🏅 Leaderboard (${teams.length})</div>
  ${teams.length === 0 ? `<div class="empty-state"><div class="empty-icon">🏅</div>No teams submitted yet</div>` : teams.map((t,i) => {
    const u = users[t.userEmail];
    const rankColor = i===0?'#fbbf24':i===1?'#cbd5e1':i===2?'#fb923c':'rgba(255,255,255,0.08)';
    const rankText = i===0?'#1a1300':i===1?'#0f172a':i===2?'#1a0f00':'var(--dim)';
    const dp = u?.dpBase64;
    const av = dp ? '<img src="'+dp+'" style="width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid '+(i===0?'#fbbf24':'rgba(255,255,255,0.12)')+';flex-shrink:0" />' : '<div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--orange));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;font-family:Rajdhani,sans-serif">'+(u?.name||'?').charAt(0).toUpperCase()+'</div>';
    return `
    <div class="d11-team-card" style="display:flex;align-items:center;gap:10px;cursor:pointer" onclick="openDream11ViewTeam('${t.id}')">
      <div class="d11-rank-badge" style="background:${rankColor};color:${rankText}">${i+1}</div>
      ${av}
      <div style="flex:1;min-width:0;margin-left:2px">
        <div style="font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${u?.name||t.userEmail}${t.userEmail===currentUser.email?' (You)':''}</div>
        <div style="font-size:10.5px;color:var(--dim)">C: ${d11m?.players.find(p=>p.id===t.captain)?.name||'—'} · VC: ${d11m?.players.find(p=>p.id===t.viceCaptain)?.name||'—'}</div>
      </div>
      <div style="text-align:right">
        <div class="display" style="font-size:17px;color:var(--gold)">${t.totalPoints||0}</div>
        <div style="font-size:9px;color:var(--dim)">pts</div>
      </div>
    </div>`;
  }).join('')}
  `;
}

// ── View a single submitted team in detail ──
function renderDream11ViewTeam() {
  const t = dream11Teams[d11ViewTeamId];
  if (!t) return `<div class="empty-state">Team not found. <button class="btn-secondary" onclick="goDream11Hub()" style="margin-top:10px">← Back</button></div>`;
  const m = matches[t.matchId];
  const d11m = dream11Matches[t.matchId];
  const u = users[t.userEmail];

  const squadA = m ? d11GetTeamSquad(m.teamA) : null;
  const squadB = m ? d11GetTeamSquad(m.teamB) : null;
  const flagA = squadA?.flag;
  const flagB = squadB?.flag;

  const picked = t.picks.map(pid => d11m?.players.find(x => x.id === pid)).filter(Boolean);
  const roleOrder = ['WK','BAT','AR','BOWL'];
  const roleLabels = { WK: 'WICKET-KEEPERS', BAT: 'BATTERS', AR: 'ALL-ROUNDERS', BOWL: 'BOWLERS' };
  const byRole = {};
  roleOrder.forEach(r => byRole[r] = picked.filter(p => p.role === r));

  const fieldPlayerCard = (p) => {
    const isC = t.captain === p.id, isVC = t.viceCaptain === p.id;
    const mult = isC ? 2 : isVC ? 1.5 : 1;
    const finalPts = Math.round((p.points||0) * mult);
    return `
    <div style="display:flex;flex-direction:column;align-items:center;width:84px">
      <div style="position:relative">
        ${p.photo ? `<img src="${p.photo}" style="width:54px;height:54px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.5)" />` : `<div style="width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;font-size:22px">👤</div>`}
        ${isC ? `<div style="position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--gold);color:#000;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;border:1px solid rgba(0,0,0,0.3)">C</div>` : isVC ? `<div style="position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:#60a5fa;color:#000;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;border:1px solid rgba(0,0,0,0.3)">VC</div>` : ''}
      </div>
      <div style="margin-top:5px;background:rgba(0,0,0,0.55);padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;max-width:84px;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
      <div style="margin-top:2px;font-size:10.5px;font-weight:700;color:${finalPts>0?'#4ade80':'rgba(255,255,255,0.6)'}">${finalPts} pts</div>
    </div>`;
  };

  return `
  <button class="btn-secondary mb14" style="font-size:12px;padding:8px 14px" onclick="goDream11Hub()">← Back to Dream11</button>

  <div class="card mb14">
    <div style="font-size:12px;color:var(--dim);text-align:center">${u?.name||t.userEmail}'s Team</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:14px;margin:8px 0 4px">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        ${flagA ? `<img src="${flagA}" style="width:30px;height:30px;border-radius:8px;object-fit:cover;border:1px solid var(--border)" />` : ''}
        <span class="team-name" style="font-size:13px">${m?.teamA||'TBD'}</span>
      </div>
      <span class="vs-badge" style="font-size:9px;padding:2px 7px">VS</span>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        ${flagB ? `<img src="${flagB}" style="width:30px;height:30px;border-radius:8px;object-fit:cover;border:1px solid var(--border)" />` : ''}
        <span class="team-name" style="font-size:13px">${m?.teamB||'TBD'}</span>
      </div>
    </div>
    <div style="text-align:center;margin-top:8px">
      <div class="display" style="font-size:26px;color:var(--gold)">${t.totalPoints||0} pts</div>
      ${!d11m?.scored && d11m?.lastLiveUpdateAt ? `<span class="match-status status-live" style="margin-top:4px;display:inline-block">🔴 LIVE</span>` : d11m?.scored ? `<span class="match-status status-completed" style="margin-top:4px;display:inline-block">🏁 FINAL</span>` : ''}
    </div>
  </div>

  <div style="background:linear-gradient(180deg,#1d6b3a,#155a2f);border-radius:16px;padding:18px 8px;margin-bottom:18px;position:relative;overflow:hidden">
    <div style="position:absolute;top:50%;left:50%;width:160%;height:55%;border:1.5px solid rgba(255,255,255,0.15);border-radius:50%;transform:translate(-50%,-50%)"></div>
    ${roleOrder.map(r => byRole[r].length ? `
    <div style="position:relative;margin-bottom:18px">
      <div style="text-align:center;font-size:11px;font-weight:800;letter-spacing:0.5px;color:rgba(255,255,255,0.85);margin-bottom:12px">${roleLabels[r]}</div>
      <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap">
        ${byRole[r].map(fieldPlayerCard).join('')}
      </div>
    </div>` : '').join('')}
  </div>

  <div class="section-title">Playing 11</div>
  ${t.picks.map(pid => {
    const p = d11m?.players.find(x => x.id === pid);
    if (!p) return '';
    const isC = t.captain === pid, isVC = t.viceCaptain === pid;
    const mult = isC ? 2 : isVC ? 1.5 : 1;
    const finalPts = Math.round((p.points||0) * mult);
    const s = p.stats || {};
    const sc2 = getD11Scoring(t.matchId);
    const runs = Number(s.runs)||0; const balls = Number(s.ballsFaced)||0;
    const fours = Number(s.fours)||0; const sixes = Number(s.sixes)||0;
    const wkts = Number(s.wickets)||0; const maidens = Number(s.maidens)||0;
    const overs = Number(s.oversBowled)||0; const rg = Number(s.runsGiven)||0;
    const catches = Number(s.catches)||0; const stumpings = Number(s.stumpings)||0; const runOuts = Number(s.runOuts)||0;
    const isOut = s.isOut;
    // Batting pts
    let bPts = runs*sc2.perRun + fours*sc2.boundary4Bonus + sixes*sc2.boundary6Bonus;
    if (runs>=100) bPts+=sc2.century100Bonus; else if(runs>=50) bPts+=sc2.half50Bonus;
    if (runs===0&&isOut&&balls>0) bPts+=sc2.duckPenalty;
    if (balls>=sc2.srMinBalls){const sr=(runs/balls)*100;if(sc2.srBonus.above170&&sr>170)bPts+=sc2.srBonus.above170;else if(sc2.srBonus.above150&&sr>150)bPts+=sc2.srBonus.above150;else if(sc2.srBonus.above130&&sr>130)bPts+=sc2.srBonus.above130;if(sc2.srPenalty.below60&&sr<60)bPts+=sc2.srPenalty.below60;else if(sc2.srPenalty.below70&&sr<70)bPts+=sc2.srPenalty.below70;else if(sc2.srPenalty.below80&&sr<80)bPts+=sc2.srPenalty.below80;}
    // Bowling pts
    let wPts = wkts*sc2.perWicket + (wkts>=5?sc2.fiveWicketBonus:wkts>=3?sc2.threeWicketBonus:0) + maidens*sc2.maidenOverBonus;
    if(overs>=sc2.erMinOvers){const er=rg/overs;if(sc2.erBonus.below5&&er<5)wPts+=sc2.erBonus.below5;else if(sc2.erBonus.below6&&er<6)wPts+=sc2.erBonus.below6;else if(sc2.erBonus.below7&&er<7)wPts+=sc2.erBonus.below7;if(sc2.erPenalty.above10&&er>10)wPts+=sc2.erPenalty.above10;else if(sc2.erPenalty.above11&&er>11)wPts+=sc2.erPenalty.above11;else if(sc2.erPenalty.above12&&er>12)wPts+=sc2.erPenalty.above12;}
    // Fielding pts
    const fPts = catches*sc2.perCatch + stumpings*sc2.perStumping + runOuts*sc2.perRunOut;
    const hasStats = (p.points||0) > 0 || runs>0 || wkts>0 || catches>0 || stumpings>0 || runOuts>0;
    return `
    <div class="d11-player-row">
      <div class="d11-player-left">
        <span class="d11-role-chip d11-role-${p.role}">${p.role}</span>
        <div>
          <div class="d11-player-name">${p.name} ${isC?'<span style="color:var(--gold)">(C)</span>':isVC?'<span style="color:#60a5fa">(VC)</span>':''}</div>
          ${hasStats ? `<div style="font-size:10px;color:var(--dim);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap">
            ${bPts!==0?`<span>🏏 <b style="color:${bPts>0?'#4ade80':'#f87171'}">${bPts>0?'+':''}${Math.round(bPts)}</b></span>`:''}
            ${wPts!==0?`<span>🎳 <b style="color:${wPts>0?'#4ade80':'#f87171'}">${wPts>0?'+':''}${Math.round(wPts)}</b></span>`:''}
            ${fPts>0?`<span>🧤 <b style="color:#60a5fa">+${fPts}</b>${catches>0?` ${catches}ct`:''}${stumpings>0?` ${stumpings}st`:''}${runOuts>0?` ${runOuts}ro`:''}</span>`:''}
          </div>` : ''}
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:700;font-size:13px;color:${finalPts>0?'#4ade80':'var(--dim)'}">${finalPts} pts</div>
        ${mult>1 ? `<div style="font-size:9.5px;color:var(--dim)">${p.points||0} × ${mult}</div>` : ''}
      </div>
    </div>`;
  }).join('')}
  `;
}
</script>

<script>
// ═══════════════════════════════════════════════════════════
// ADMIN PANEL
// ═══════════════════════════════════════════════════════════
function renderAdminPanel() {
  const allMatches = Object.values(matches);
  const pendingDep = getAllPendingDeposits();

  const totalDepAll = getTotalDepositsAll();

  return `
  <div class="card mb18" style="background:linear-gradient(135deg,rgba(249,115,22,0.13),rgba(220,38,38,0.07));border-color:rgba(249,115,22,0.3)">
    <div style="font-weight:700;font-size:15px;color:var(--orange)">👑 Owner Control Panel</div>

  <div class="stat-grid mb18">

let notifySending = false;
let notifyLastResult = '';

function renderAdminNotify() {
  return `
  <div class="card mb18">
    <div style="font-weight:700;font-size:14px;margin-bottom:10px">📢 Send Push Notification</div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:14px">This sends a notification to every user who has allowed notifications. Use it for new match alerts, results, or announcements.</div>

    <label style="font-size:11px;color:var(--dim);display:block;margin-bottom:5px">Title</label>
    <input id="notify-title" type="text" placeholder="e.g. New Match Added!" class="input mb12" maxlength="65">

    <label style="font-size:11px;color:var(--dim);display:block;margin-bottom:5px">Message</label>
    <textarea id="notify-body" placeholder="e.g. Pakistan vs India is live now — make your predictions!" class="input mb12" rows="3" maxlength="180" style="resize:vertical"></textarea>

    <button class="btn-primary btn-block" ${notifySending ? 'disabled' : ''} onclick="sendBroadcastNotification()">
      ${notifySending ? '⏳ Sending...' : '🚀 Send to All Users'}
    </button>

    ${notifyLastResult ? `<div style="margin-top:12px;font-size:12px;color:${notifyLastResult.startsWith('✅')?'#4ade80':'#f87171'}">${notifyLastResult}</div>` : ''}
  </div>
  `;
}

async function sendBroadcastNotification() {
  const title = (document.getElementById('notify-title')?.value || '').trim();
  const body = (document.getElementById('notify-body')?.value || '').trim();
  if (!title || !body) {
    notifyLastResult = '❌ Please enter both a title and a message.';
    render();
    return;
  }

  notifySending = true;
  notifyLastResult = '';
  render();

  try {
    // 1. Fetch all saved push tokens from Firestore
    const { collection, getDocs } = window._fbFns;
    const snap = await getDocs(collection(window._fbDb, 'pp_push_tokens'));
    const tokens = [];
    snap.forEach(d => {
      const data = d.data();
      if (data && data.token) tokens.push(data.token);
    });

    if (tokens.length === 0) {
      notifyLastResult = '⚠️ No registered devices found to notify.';
      notifySending = false;
      render();
      return;
    }

    // 2. Call our own Netlify serverless function — it holds the Firebase
    // service account credentials safely on the server and talks to FCM v1.
    // The private key never reaches this browser-side file.
    const resp = await fetch('/.netlify/functions/send-notification', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, body, tokens })
    });
    const result = await resp.json();

    if (result.error) {
      notifyLastResult = `❌ Error: ${result.error}`;
    } else {
      notifyLastResult = `✅ Sent to ${result.successCount} device(s).` + (result.failCount > 0 ? ` (${result.failCount} failed — may be expired tokens)` : '');
      document.getElementById('notify-title').value = '';
      document.getElementById('notify-body').value = '';
    }
  } catch (err) {
    notifyLastResult = `❌ Error: ${err.message}`;
  }

  notifySending = false;
  render();
}

function renderAdminRecycleBin() {
  const ids = Array.from(new Set([...Object.keys(deletedMatches), ...Object.keys(deletedDream11Matches)]));

  if (ids.length === 0) {
    return `<div class="empty-state">🗑️ Recycle Bin is empty.<br><br>Deleted matches appear here and can be restored anytime.</div>`;

    const label = m ? `${m.teamA} vs ${m.teamB}` : (dm ? 'Dream11 match' : id);
    const deletedAt = m?._deletedAt || dm?._deletedAt || '';

    const useD11Fn = hasBoth || isD11Only;
    return `

      <div style="font-size:11px;color:var(--dim);margin-top:2px">${typeLabel} ${deletedAt ? '· Deleted ' + deletedAt : ''}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">

    </div>`;
  }).join('')}
  `;
}

function renderTeamPickerField(side, currentValue) {
  const inputId = side === 'A' ? 'dm-teamA' : 'dm-teamB';
  const selectId = inputId + '-picker';
  const teams = Object.values(teamSquads).sort((a,b) => a.teamName.localeCompare(b.teamName));
  const matchesKnownTeam = teams.some(t => t.teamName.toLowerCase() === (currentValue||'').trim().toLowerCase());
  const showCustomBox = !matchesKnownTeam || teams.length === 0;

  return `
  <select class="input ${showCustomBox ? 'mb10' : 'mb14'}" id="${selectId}" onchange="teamPickerSelect('${inputId}', this.value)">
    <option value="">— Type a new name below —</option>
    ${teams.map(t => `<option value="${t.teamName.replace(/"/g,'&quot;')}" ${matchesKnownTeam && t.teamName.toLowerCase()===(currentValue||'').trim().toLowerCase() ? 'selected' : ''}>${t.teamName}</option>`).join('')}

  `;
}
function teamPickerSelect(inputId, teamName) {
  const input = document.getElementById(inputId);
  if (!input) return;
  if (teamName) {
    input.value = teamName;
    input.style.display = 'none';
  } else {
    input.value = '';
    input.style.display = '';
    input.focus();
  }
}

// ── QUICK RESULTS — Admin sets answers for ALL pending matches
//    from one single screen, no back-and-forth navigation needed
// ══════════════════════════════════════════════════════════════
function quickResultsInit() {
  // Pre-fill draft from already-saved correctAnswers so nothing is lost on revisit
  quickResultsDraft = {};
  Object.values(matches).forEach(m => {
    if (m.status === 'completed') return;
    quickResultsDraft[m.id] = {};
    (m.questions||[]).forEach(q => {
      quickResultsDraft[m.id][q.id] = q.correctAnswer || '';
    });
  });
}

function quickResultsSelect(matchId, qId, val) {
  if (!quickResultsDraft[matchId]) quickResultsDraft[matchId] = {};
  quickResultsDraft[matchId][qId] = val;
  refreshAdminPanel();
}

async function quickFinalizeMatch(matchId) {
  const m = matches[matchId];
  if (!m) return;
  const draft = quickResultsDraft[matchId] || {};

  // Capture text-type answers from DOM inputs
  (m.questions||[]).forEach(q => {
    if (q.type === 'text') {
      const el = document.getElementById('qr-text-' + matchId + '-' + q.id);
      if (el) draft[q.id] = el.value.trim();
    }
  });

  for (const q of m.questions||[]) {
    if (!draft[q.id]) { showNotif(`"${m.teamA} vs ${m.teamB}" — please set all answers first`, 'error'); return; }
  }

  // Save correct answers
  (m.questions||[]).forEach(q => { q.correctAnswer = draft[q.id]; });
  m.status = 'completed';
  await _saveMatchToFirestore(matchId, m);

  // Score every participant
  const predictorEmails = new Set([
    ...(m.participants||[]),
    ...Object.entries(users).filter(([,u]) => u.predictions && u.predictions[matchId]).map(([e]) => e)
  ]);
  const saves = [];
  for (const email of predictorEmails) {
    const u = users[email];
    if (!u || !u.predictions || !u.predictions[matchId]) continue;
    const pred = u.predictions[matchId];
    if (pred.scored) continue;
    let earned = 0;
    (m.questions||[]).forEach(q => {
      const userAns = (pred.answers?.[q.id]||'').toString().trim();
      const correctAns = (q.correctAnswer||'').toString().trim();
      if (!userAns || !correctAns) return;
      if (q.type === 'text') { if (isFuzzyAnswerMatch(userAns, correctAns)) earned += (q.points||0); }
      else { if (userAns.toLowerCase() === correctAns.toLowerCase()) earned += (q.points||0); }
    });
    pred.pointsEarned = earned; pred.scored = true;
    u.points = (u.points||0) + earned;
    u.predictions[matchId] = pred;
    saves.push(_saveUserToFirestore(email, u));
  }
  await Promise.all(saves);
  try { localStorage.setItem('pp_matches_cache', JSON.stringify(matches)); localStorage.setItem('pp_users_cache', JSON.stringify(users)); } catch(e){}
  if (users[currentUser.email]) { currentUser.points = users[currentUser.email].points; currentUser.predictions = users[currentUser.email].predictions; }
  await finalizeH2HContests(matchId);
  await finalizeCustomContests(matchId);
  delete quickResultsDraft[matchId];
  showNotif(`✅ "${m.teamA} vs ${m.teamB}" scored! Points distributed 🎉`);
  refreshAdminPanel();
}

function d11QuickSaveAllStats(matchId) {
  const d11m = dream11Matches[matchId];
  if (!d11m) return;
  let count = 0;
  d11m.players.forEach(p => {
    const get = (f) => { const el = document.getElementById('qs-'+matchId+'-'+p.id+'-'+f); return el ? el.value : ''; };
    const isOutEl = document.getElementById('qs-'+matchId+'-'+p.id+'-isOut');
    p.stats = {
      runs: get('runs'), ballsFaced: get('balls'), fours: get('fours'), sixes: get('sixes'),
      isOut: isOutEl ? isOutEl.checked : false,
      wickets: get('wickets'), oversBowled: get('overs'), runsGiven: get('runsGiven'),
      maidens: get('maidens'), catches: get('catches'), stumpings: get('stumpings'), runOuts: get('runOuts')
    };
    p.points = calcDream11PlayerPoints(p.stats, matchId);
    count++;
  });
  d11m.lastLiveUpdateAt = getDateTime();
  _saveDream11MatchToFirestore(matchId, d11m);
  d11RefreshLiveTeamPoints(matchId);
  showNotif(`✅ ${count} players ke stats save ho gaye — live points update 🔴`);
  render();
}

function renderD11QuickScoreTable() {
  const matchId = d11QuickScoreMatchId || d11ActiveMatchId;
  const d11m = dream11Matches[matchId];
  if (!d11m) return '';
  if (d11m.scored) return `<div class="card mb14" style="text-align:center;color:#4ade80;font-weight:700;padding:16px">✅ Scoring already finalized.</div>`;

  const sideA = d11m.players.filter(p => p.side === 'A');
  const sideB = d11m.players.filter(p => p.side === 'B');

  const sc = getD11Scoring(matchId);

  // Calculate SR bonus/penalty label + points for display
  const calcSRDisplay = (s) => {
    const runs = Number(s.runs)||0;
    const balls = Number(s.ballsFaced)||0;
    if (balls < sc.srMinBalls) return { label: '—', pts: 0, color: 'var(--dim)' };
    const sr = (runs / balls) * 100;
    let pts = 0;
    if (sc.srBonus.above170 && sr > 170) pts = sc.srBonus.above170;
    else if (sc.srBonus.above150 && sr > 150) pts = sc.srBonus.above150;
    else if (sc.srBonus.above140 && sr > 140) pts = sc.srBonus.above140;
    else if (sc.srBonus.above130 && sr > 130) pts = sc.srBonus.above130;
    else if (sc.srBonus.above120 && sr > 120) pts = sc.srBonus.above120;
    else if (sc.srBonus.above100 && sr > 100) pts = sc.srBonus.above100;
    if (sc.srPenalty.below40 && sr < 40) pts = sc.srPenalty.below40;
    else if (sc.srPenalty.below50 && sr < 50) pts = sc.srPenalty.below50;
    else if (sc.srPenalty.below60 && sr < 60) pts = sc.srPenalty.below60;
    else if (sc.srPenalty.below70 && sr < 70) pts = sc.srPenalty.below70;
    else if (sc.srPenalty.below80 && sr < 80) pts = sc.srPenalty.below80;
    const color = pts > 0 ? '#4ade80' : pts < 0 ? '#f87171' : 'var(--dim)';
    return { label: sr.toFixed(1), pts, color };
  };

  // Calculate ER bonus/penalty label + points for display
  const calcERDisplay = (s) => {
    const overs = Number(s.oversBowled)||0;
    const rg = Number(s.runsGiven)||0;
    if (overs < sc.erMinOvers) return { label: '—', pts: 0, color: 'var(--dim)' };
    const er = rg / overs;
    let pts = 0;
    if (sc.erBonus.below2_5 && er < 2.5) pts = sc.erBonus.below2_5;
    else if (sc.erBonus.below3_5 && er < 3.5) pts = sc.erBonus.below3_5;
    else if (sc.erBonus.below4_5 && er < 4.5) pts = sc.erBonus.below4_5;
    else if (sc.erBonus.below5 && er < 5) pts = sc.erBonus.below5;
    else if (sc.erBonus.below6 && er < 6) pts = sc.erBonus.below6;
    else if (sc.erBonus.below7 && er < 7) pts = sc.erBonus.below7;
    if (sc.erPenalty.above7 && er > 7) pts = sc.erPenalty.above7;
    if (sc.erPenalty.above8 && er > 8) pts = sc.erPenalty.above8;
    if (sc.erPenalty.above9 && er > 9) pts = sc.erPenalty.above9;
    if (sc.erPenalty.above10 && er > 10) pts = sc.erPenalty.above10;
    if (sc.erPenalty.above11 && er > 11) pts = sc.erPenalty.above11;
    if (sc.erPenalty.above12 && er > 12) pts = sc.erPenalty.above12;
    const color = pts > 0 ? '#4ade80' : pts < 0 ? '#f87171' : 'var(--dim)';
    return { label: er.toFixed(2), pts, color };
  };

  const inp = (id, val, w, extra='') =>
    `<input type="number" min="0" id="${id}" value="${val??''}" placeholder="0" style="width:${w}px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--text);padding:5px 4px;font-size:11px;text-align:center" ${extra}/>`;

  const playerRow = (p) => {
    const s = p.stats || {};
    const sr = calcSRDisplay(s);
    const er = calcERDisplay(s);
    const pid = `qs-${matchId}-${p.id}`;
    return `
    <tr style="border-bottom:1px solid rgba(255,255,255,0.06)">
      <td style="padding:7px 6px;font-size:12px;font-weight:600;white-space:nowrap">
        <span class="d11-role-chip d11-role-${p.role}" style="font-size:9px;padding:1px 5px">${p.role}</span>
        ${p.name}
        ${p.isPlayingXI ? '<span style="color:#4ade80;font-size:9px;margin-left:3px">XI</span>' : ''}
      </td>
      <td style="padding:4px 3px">${inp(`${pid}-runs`, s.runs, 44)}</td>

      <td style="padding:4px 3px">${inp(`${pid}-catches`, s.catches, 40)}</td>
      <td style="padding:4px 3px"><input type="number" min="0" id="${pid}-stumpings" value="${s.stumpings??''}" placeholder="0" style="width:36px;background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.25);border-radius:6px;color:var(--text);padding:5px 4px;font-size:11px;text-align:center" title="Stumpings"/></td>
      <td style="padding:4px 3px"><input type="number" min="0" id="${pid}-runOuts" value="${s.runOuts??''}" placeholder="0" style="width:36px;background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);border-radius:6px;color:var(--text);padding:5px 4px;font-size:11px;text-align:center" title="Run Outs"/></td>

      <td style="padding:4px 5px;text-align:center">
        <div style="font-size:10px;font-weight:700;color:${sr.color}">${sr.label}</div>

      <td style="padding:4px 5px;text-align:center">
        <div style="font-size:10px;font-weight:700;color:${er.color}">${er.label}</div>

      </td>
      <td style="padding:4px 6px;font-size:12px;font-weight:700;color:var(--gold);text-align:right">${p.points||0}</td>
    </tr>`;
  };

  // ── Batting Card view (editable — same inputs/ids as Table view) ──
  const cardInp = (id, val, w) =>

// ── Admin: Mega Contest prize distribution panel ─────────────
function renderAdminMegaDistribution(m) {
  const parts = m.megaParticipants || [];
  if (parts.length === 0) return '';

  const pool = m.megaPool || 0;
  const distributable = Math.round(pool * (1 - MEGA_CONTEST_COMPANY_SHARE));
  const companyShare = pool - distributable;
  const prizes = m.megaPrizes || {};
  const totalAssigned = Object.values(prizes).reduce((s,v) => s + (Number(v)||0), 0);

  // sort by points desc to help admin see top scorers first
  const sorted = parts.map(email => {
    const u = users[email];
    const pred = u?.predictions?.[m.id];
    return { email, name: u?.name || email, points: pred?.pointsEarned || 0 };
  }).sort((a,b) => b.points - a.points);

  return `
  <div class="card mb14" style="background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.3)">
    <div style="font-weight:700;font-size:14px;color:var(--gold);margin-bottom:6px">🎯 Mega Contest — Prize Distribution</div>
    <div style="font-size:12px;color:var(--dim);line-height:1.7;margin-bottom:10px">
      💰 Total Pool: <b style="color:var(--text)">Rs ${pool}</b> (${parts.length} joined × Rs ${MEGA_CONTEST_ENTRY_FEE})<br/>
      🏆 Distributable (90%): <b style="color:#4ade80">Rs ${distributable}</b><br/>
      🏢 Company Share (10%): <b style="color:var(--text)">Rs ${companyShare}</b>
    </div>

    ${m.megaDistributed ? `
    <div style="text-align:center;color:#4ade80;font-weight:700;font-size:12.5px;padding:8px">✅ Prizes already distributed</div>
    ` : `
    <div style="font-size:11px;color:var(--dim);margin-bottom:8px">Enter prize amount (Rs) for each player based on their score. Total assigned: <b style="color:${totalAssigned>distributable?'#f87171':'var(--text)'}">Rs ${totalAssigned}</b> / Rs ${distributable}</div>
    ${sorted.map((p,i) => `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
      <div style="flex:1;font-size:12.5px"><b>#${i+1}</b> ${p.name} <span style="color:var(--dim)">(${p.points} pts)</span></div>
      <input class="input" id="mega-prize-${m.id}-${p.email}" type="number" min="0" placeholder="0" value="${prizes[p.email]||''}" style="width:90px;padding:8px" />
    </div>`).join('')}
    <button class="btn-primary btn-orange mb10" style="margin-top:6px" onclick="distributeMegaPrizes('${m.id}')">✅ Confirm & Pay Prizes</button>
    `}
  </div>`;
}

  const TX_META = {
    deposit:     { label: 'Deposit',            icon: '⬇️', positive: true },
    withdraw:    { label: 'Withdraw',           icon: '⬆️', positive: false },
    mega_entry:  { label: 'Mega Entry',         icon: '🎯', positive: false },
    mega_prize:  { label: 'Mega Prize',         icon: '🏆', positive: true },
    free_reward: { label: 'Free Reward',        icon: '🎁', positive: true },
    h2h_entry:   { label: 'H2H Entry',          icon: '🥊', positive: false },

  ];

  return `

    <div class="section-title" style="margin-bottom:10px">+ Add Players</div>

    ${!masterTeamsPasteMode && !masterTeamsScanMode ? `
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn-secondary" style="flex:1;font-size:12px;padding:10px 8px" onclick="masterTeamsStartPaste('${key}')">📋 Paste Squad</button>
      <label class="btn-secondary" style="flex:1;font-size:12px;padding:10px 8px;text-align:center;cursor:pointer">
        📷 Scan Screenshot
        <input type="file" accept="image/*" style="display:none" onchange="masterTeamsScanScreenshot('${key}', this)" />
      </label>
    </div>` : ''}

    ${masterTeamsPasteMode ? `
    <div class="card mb10" style="background:rgba(37,99,235,0.08);border-color:rgba(37,99,235,0.3)">
      <div style="font-size:12px;color:var(--dim);margin-bottom:8px">📋 Players paste karein — ek per line ya comma separated.<br/>Role tag optional: <b>Babar Azam - BAT</b> ya <b>Rizwan (WK)</b></div>
      <textarea class="input" style="min-height:180px;font-family:monospace;font-size:12.5px;resize:vertical" placeholder="Babar Azam&#10;Mohammad Rizwan - WK&#10;Shaheen Afridi - BOWL&#10;..." oninput="masterTeamsUpdatePasteText(this.value)">${(masterTeamsPasteText||'')}</textarea>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn-primary" style="flex:1" onclick="masterTeamsConfirmPaste('${key}')">✅ Add Players</button>
        <button class="btn-secondary" style="width:auto;padding:9px 14px" onclick="masterTeamsCancelPaste()">✕</button>
      </div>
    </div>` : ''}

    ${!masterTeamsPasteMode ? `
    <input class="input mb10" placeholder="Player name" value="${(masterTeamsNewPlayerName||'').replace(/"/g,'&quot;')}" oninput="masterTeamsUpdateNewPlayerName(this.value)" onkeydown="if(event.key==='Enter')masterTeamsAddPlayer('${key}')" />
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <select class="input" style="flex:1" onchange="masterTeamsUpdateNewPlayerRole(this.value)">
        ${roles.map(r => `<option value="${r}" ${masterTeamsNewPlayerRole===r?'selected':''}>${r}</option>`).join('')}
      </select>
      <input class="input" style="width:90px" type="number" step="0.5" placeholder="Credit" value="${masterTeamsNewPlayerCredit}" oninput="masterTeamsUpdateNewPlayerCredit(this.value)" />
    </div>
    <button class="btn-primary btn-block" onclick="masterTeamsAddPlayer('${key}')">+ Add Player</button>` : ''}
  </div>

  ${sortedPlayers.length === 0 ? `
  <div class="empty-state" style="padding:24px 10px">No players added yet.</div>
  ` : sortedPlayers.map(p => `
  <div class="card mb10" style="display:flex;align-items:center;gap:10px">
    <label style="cursor:pointer;flex-shrink:0">
      ${p.photo ? `<img src="${p.photo}" style="width:46px;height:46px;border-radius:50%;object-fit:cover;border:1px solid var(--border)" />` : `<div style="width:46px;height:46px;border-radius:50%;background:var(--bg-soft);display:flex;align-items:center;justify-content:center;font-size:18px">👤</div>`}
      <input type="file" accept="image/*" style="display:none" onchange="masterTeamsUploadPlayerPhoto('${key}','${p.id}', this)" />
    </label>
    <div style="flex:1;min-width:0">
      <div style="font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
      <div style="display:flex;gap:6px;margin-top:4px">
        <select class="input" style="padding:4px 6px;font-size:11px;width:auto" onchange="masterTeamsSetPlayerRole('${key}','${p.id}', this.value)">
          ${roles.map(r => `<option value="${r}" ${p.role===r?'selected':''}>${r}</option>`).join('')}
        </select>
        <input class="input" style="padding:4px 6px;font-size:11px;width:60px" type="number" step="0.5" value="${p.credit||0}" onchange="masterTeamsSetPlayerCredit('${key}','${p.id}', this.value)" /><span style="font-size:11px;color:var(--dim);align-self:center">Cr</span>
      </div>
    </div>
    <button class="btn-secondary" style="width:auto;padding:6px 10px;flex-shrink:0" onclick="masterTeamsRemovePlayer('${key}','${p.id}')">✕</button>
  </div>
  `).join('')}
  `;
}

function renderAdminCustomContests() {
  const all = Object.values(customContests).sort((a,b) => b.createdAt.localeCompare(a.createdAt));

  return `
  <div class="section-title">🛠️ User-Created Contests (${all.length})</div>

  ${all.length===0 ? `<div class="empty-state"><div class="empty-icon">🛠️</div>No custom contests created yet.</div>` :
  all.map(cc => {
    const m = matches[cc.matchId];
    const creatorName = users[cc.creatorEmail]?.name || cc.creatorEmail;
    const distributable = Math.round(cc.pool * (1 - CUSTOM_CONTEST_COMPANY_SHARE));
    const companyShare = cc.pool - distributable;
    return `
    <div class="card mb12" style="background:rgba(168,85,247,0.07);border-color:rgba(168,85,247,0.25)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div style="font-weight:700;font-size:14px;color:#c084fc">${cc.code}</div>
          <div style="font-size:11px;color:var(--dim);margin-top:2px">${m ? m.teamA+' vs '+m.teamB : 'Match deleted'}</div>
          <div style="font-size:11px;color:var(--dim);margin-top:2px">Created by <b style="color:var(--text)">${creatorName}</b></div>
        </div>
        <span style="font-size:10px;font-weight:700;color:${cc.status==='completed'?'#4ade80':'var(--gold)'};text-transform:uppercase">${cc.status}</span>
      </div>

      <div style="font-size:11.5px;color:var(--dim);line-height:1.8;margin-bottom:8px">
        💰 Entry: <b style="color:var(--text)">Rs ${cc.entryFee}</b> · Players: <b style="color:var(--text)">${cc.participants.length}/${CUSTOM_CONTEST_MAX_PLAYERS}</b><br/>
        Pool: <b style="color:var(--text)">Rs ${cc.pool}</b> · Distributable (90%): <b style="color:#4ade80">Rs ${distributable}</b> · Company (10%): <b style="color:var(--text)">Rs ${companyShare}</b>
      </div>

      <div style="display:flex;flex-direction:column;gap:4px">
        ${cc.participants.map((email,i) => {
          const u = users[email];
          const pred = u?.predictions?.[cc.matchId];
          const prize = cc.prizes?.[email];
          return `
          <div style="display:flex;justify-content:space-between;font-size:11.5px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
            <span>${i+1}. ${u?.name||email} ${email===cc.creatorEmail?'<span style="color:#c084fc;font-size:10px">(creator)</span>':''}</span>
            <span style="color:var(--dim)">${pred?.scored ? pred.pointsEarned+' pts' : '—'} ${prize ? `<b style="color:#4ade80">+Rs ${prize}</b>` : ''}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('')}
  `;
}
</script>

<script>
// ═══════════════════════════════════════════════════════════
// USER TOURNAMENTS (UT) — owner-run, independent Dream11-style
// tournaments. A regular user creates a tournament with a 6-digit
// password, becomes its owner, and gets admin-style tools scoped
// only to that tournament: own teams/players, own matches, own
// results. Publishing a match and finalizing its result both
// require re-entering the password. Every match has an entry fee
// (min Rs 20, owner's choice above that); 90% of the collected
// pool splits to the top 3 scorers, 10% goes to the company.
// ═══════════════════════════════════════════════════════════

// ── UT placeholder marker — full module inserted below ──

// ── Data model ──
function newUtTournamentTemplate(ownerEmail, name, passwordHash) {
  return {
    id: uid(),
    code: genUtTournamentCode(),
    name: (name || '').trim() || 'My Tournament',
    ownerEmail,
    passwordHash,
    teams: {},     // keyed by lowercased team name → { teamName, flag, players:[{id,name,role,credit,photo}] }
    matches: {},   // keyed by matchId → UT match object (see newUtMatchTemplate)
    participants: {}, // userEmail → true, for anyone who has ever joined a contest in this tournament
    createdAt: getDateTime(),
    deleted: false
  };
}
function genUtTournamentCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i=0; i<6; i++) code += chars[Math.floor(Math.random()*chars.length)];
  return 'PPUT-' + code;
}
function newUtMatchTemplate(tournamentId) {
  return {
    id: uid(),
    tournamentId,
    teamA: '', teamB: '',
    format: 'T20',
    seriesName: '',
    deadline: null,
    entryFee: UT_MIN_ENTRY_FEE,
    players: [],     // [{id,name,role,side,stats,points,isPlayingXI,photo,credit}]
    published: false,
    locked: false,
    scored: false,
    lastLiveUpdateAt: null,
    createdAt: getDateTime()
  };
}
function newUtTeamSubmission(tournamentId, matchId, userEmail) {
  return {
    id: uid(),
    tournamentId, matchId, userEmail,
    picks: [], captain: null, viceCaptain: null,
    totalPoints: 0,
    paid: false, // whether entry fee has been deducted
    createdAt: getDateTime()
  };
}
function newUtPlayer(name, role, side, extra) {
  extra = extra || {};
  return { id: uid(), name: (name||'').trim(), role, side, stats: null, points: 0, isPlayingXI: false, photo: extra.photo || null, credit: extra.credit || null };
}

// ── Navigation ──
function goUtHub() {
  tab = 'utHub';
  utHubTab = 'browse';
  utCreateDraft = null;
  utJoinCodeText = '';
  utShowTournamentLb = false;
  render();
  window.scrollTo(0,0);
}
function openUtDashboard(tId) {
  utViewTournamentId = tId;
  tab = 'utDashboard';
  utCreateMatchDraft = null;
  utShowTournamentLb = false;
  render();
  window.scrollTo(0,0);
}
function openUtTournamentLeaderboard() {
  utShowTournamentLb = true;
  render();
  window.scrollTo(0,0);
}
function closeUtTournamentLeaderboard() {
  utShowTournamentLb = false;
  render();
  window.scrollTo(0,0);
}
function isUtOwner(t) {
  return t && currentUser && t.ownerEmail === currentUser.email;
}
function utGetTournament(tId) { return utTournaments[tId] || null; }
function utGetMatch(tId, matchId) {
  const t = utTournaments[tId];
  return t ? (t.matches[matchId] || null) : null;
}

// ── Create Tournament flow ──
function utStartCreate() {
  utCreateDraft = { name: '', password: '', password2: '' };
  render();
}
function utCancelCreate() { utCreateDraft = null; render(); }
function utUpdateCreateField(field, val) {
  if (!utCreateDraft) return;
  if (field === 'password' || field === 'password2') {
    val = val.replace(/[^0-9]/g, '').slice(0, 6);
  }
  utCreateDraft[field] = val;
}
async function utSubmitCreate() {
  if (!utCreateDraft) return;
  const name = (utCreateDraft.name || '').trim();
  const pass = utCreateDraft.password || '';
  const pass2 = utCreateDraft.password2 || '';
  if (!name) { showNotif('Enter tournament name', 'error'); return; }
  if (pass.length !== 6) { showNotif('Security password must be exactly 6 digits', 'error'); return; }
  if (pass !== pass2) { showNotif('Passwords do not match', 'error'); return; }
  const passwordHash = await _sha256(pass);
  const t = newUtTournamentTemplate(currentUser.email, name, passwordHash);
  utTournaments[t.id] = t;
  _saveUtTournamentToFirestore(t.id, t);
  try { localStorage.setItem('pp_ut_tournaments_cache', JSON.stringify(utTournaments)); } catch(e){}
  utCreateDraft = null;
  showNotif('🏆 Tournament created! Remember your 6-digit password — you will need it to publish matches and set results.');
  openUtDashboard(t.id);
}

// ── Join by code (browse) ──
function utUpdateJoinCode(val) { utJoinCodeText = (val || '').toUpperCase(); }
function utJoinByCode() {
  const code = (utJoinCodeText || '').trim().toUpperCase();
  if (!code) { showNotif('Enter or paste the tournament code', 'error'); return; }
  const t = Object.values(utTournaments).find(x => !x.deleted && x.code === code);
  if (!t) { showNotif('This code does not match any tournament', 'error'); return; }
  openUtDashboard(t.id);
}

// ── Password confirmation gate — shared by Publish Match and Finalize Result ──
// Owner's 6-digit security password must be re-entered for either action.
function utRequestPasswordFor(type, matchId) {
  utPendingPasswordAction = { type, matchId };
  utPasswordPromptValue = '';
  utPasswordPromptError = '';
  render();
  setTimeout(() => { const el = document.getElementById('ut-pw-prompt-input'); if (el) el.focus(); }, 50);
}
function utCancelPasswordPrompt() {
  utPendingPasswordAction = null;
  utPasswordPromptValue = '';
  utPasswordPromptError = '';
  render();
}
function utUpdatePasswordPromptValue(val) {
  utPasswordPromptValue = (val || '').replace(/[^0-9]/g, '').slice(0, 6);
}
async function utConfirmPasswordPrompt() {
  if (!utPendingPasswordAction) return;
  const t = utTournaments[utViewTournamentId];
  if (!t) { utCancelPasswordPrompt(); return; }
  const entered = utPasswordPromptValue || '';
  if (entered.length !== 6) { utPasswordPromptError = 'Enter 6-digit password'; render(); return; }
  const hash = await _sha256(entered);
  if (hash !== t.passwordHash) {
    utPasswordPromptError = '❌ Incorrect password — please try again';
    utPasswordPromptValue = '';
    render();
    return;
  }
  const { type, matchId } = utPendingPasswordAction;
  utPendingPasswordAction = null;
  utPasswordPromptValue = '';
  utPasswordPromptError = '';
  if (type === 'publish') {
    await utDoPublishMatch(t.id, matchId);
  } else if (type === 'finalize') {
    await utDoFinalizeResult(t.id, matchId);
  }
}

// ── Match create/manage (owner) ──
function utStartCreateMatch() {
  utCreateMatchDraft = { teamA: '', teamB: '', format: 'T20', seriesName: '', deadline: '', entryFee: String(UT_MIN_ENTRY_FEE) };
  utTeamPickerOpenFor = null;
  render();
}
function utCancelCreateMatch() { utCreateMatchDraft = null; utTeamPickerOpenFor = null; render(); }
function utUpdateCreateMatchField(field, val) {
  if (!utCreateMatchDraft) return;
  utCreateMatchDraft[field] = val;
}
// ── Tap-to-pick dropdown for Team A/B on the New Match form — shows the
// full list of saved teams immediately on tap, no typing required. ──
function utToggleTeamPicker(field) {
  utTeamPickerOpenFor = (utTeamPickerOpenFor === field) ? null : field;
  render();
}
function utPickTeamForField(field, teamName) {
  if (!utCreateMatchDraft) return;
  utCreateMatchDraft[field] = teamName;
  utTeamPickerOpenFor = null;
  render();
}
function utSaveNewMatch() {
  const t = utTournaments[utViewTournamentId];
  if (!t || !utCreateMatchDraft) return;
  if (!isUtOwner(t)) { showNotif('Only the tournament owner can create matches', 'error'); return; }
  const d = utCreateMatchDraft;
  const teamA = (d.teamA || '').trim();
  const teamB = (d.teamB || '').trim();
  if (!teamA || !teamB) { showNotif('Enter both team names', 'error'); return; }
  const fee = parseFloat(d.entryFee);
  if (isNaN(fee) || fee < UT_MIN_ENTRY_FEE) { showNotif(`Entry fee cannot be less than Rs ${UT_MIN_ENTRY_FEE}`, 'error'); return; }
  if (!d.deadline) { showNotif('Set the match deadline (start time)', 'error'); return; }

  const m = newUtMatchTemplate(t.id);
  m.teamA = teamA; m.teamB = teamB;
  m.format = d.format || 'T20';
  m.seriesName = (d.seriesName || '').trim();
  m.deadline = new Date(d.deadline).getTime();
  m.entryFee = fee;
  t.matches[m.id] = m;
  _saveUtTournamentToFirestore(t.id, t);
  try { localStorage.setItem('pp_ut_tournaments_cache', JSON.stringify(utTournaments)); } catch(e){}

  utCreateMatchDraft = null;
  utActiveMatchId = m.id;
  utAdminTab = 'pool';
  tab = 'utMatchManage';
  render();
  window.scrollTo(0,0);
  showNotif('✅ Match created — now add players');
}
function utDeleteMatch(matchId) {
  const t = utTournaments[utViewTournamentId];
  if (!t || !isUtOwner(t)) return;
  if (!confirm('Delete this match? This cannot be undone.')) return;
  delete t.matches[matchId];
  _saveUtTournamentToFirestore(t.id, t);
  try { localStorage.setItem('pp_ut_tournaments_cache', JSON.stringify(utTournaments)); } catch(e){}
  render();
}
function openUtMatchManage(matchId) {
  utActiveMatchId = matchId;
  utAdminTab = 'pool';
  tab = 'utMatchManage';
  render();
  window.scrollTo(0,0);
}
function utBackToDashboard() {
  tab = 'utDashboard';
  utActiveMatchId = null;
  render();
  window.scrollTo(0,0);
}

// Publish requires the 6-digit security password.
function utTogglePublish(matchId) {
  const t = utTournaments[utViewTournamentId];
  const m = t && t.matches[matchId];
  if (!t || !m) return;
  if (!isUtOwner(t)) { showNotif('Only the tournament owner can publish', 'error'); return; }
  if (m.published) {
    // Unpublishing doesn't move money, so no password needed to hide a match again.
    m.published = false;
    _saveUtTournamentToFirestore(t.id, t);
    try { localStorage.setItem('pp_ut_tournaments_cache', JSON.stringify(utTournaments)); } catch(e){}
    render();
    showNotif('Match unpublished — users can no longer see it');
    return;
  }
  if (m.players.length < UT_TEAM_SIZE) { showNotif(`Add at least ${UT_TEAM_SIZE} players before publishing`, 'error'); return; }
  utRequestPasswordFor('publish', matchId);
}
async function utDoPublishMatch(tId, matchId) {
  const t = utTournaments[tId];
  const m = t && t.matches[matchId];
  if (!t || !m) return;
  m.published = true;
  _saveUtTournamentToFirestore(t.id, t);
  try { localStorage.setItem('pp_ut_tournaments_cache', JSON.stringify(utTournaments)); } catch(e){}
  render();
  showNotif(`🚀 Match published! Entry fee Rs ${m.entryFee} — users ab contest join kar sakte hain`);
}

// Admin (app owner) password reset for a forgetful tournament owner.
function utAdminResetPasswordPrompt(tId) {
  if (!isAdmin()) return;
  const t = utTournaments[tId];
  if (!t) return;
  const newPass = prompt('Naya Enter 6-digit password is tournament ke liye:');
  if (newPass === null) return;
  const clean = newPass.replace(/[^0-9]/g, '').slice(0, 6);
  if (clean.length !== 6) { showNotif('Password must be exactly 6 digits', 'error'); return; }
  _sha256(clean).then(hash => {
    t.passwordHash = hash;
    _saveUtTournamentToFirestore(t.id, t);
    try { localStorage.setItem('pp_ut_tournaments_cache', JSON.stringify(utTournaments)); } catch(e){}
    render();
    showNotif('✅ Password reset — share the new password with the owner');
  });
}

// ── Teams & Players manager (independent per-tournament roster) ──
// Mirrors the Master Teams feature, but scoped to t.teams instead of the
// global teamSquads — every UT tournament has its own fully separate set.
function utTeamKey(name) { return (name || '').trim().toLowerCase(); }
function openUtTeamsManage() {
  utTeamsActiveKey = null;
  utTeamsNewName = '';
  tab = 'utTeamsManage';
  render();
  window.scrollTo(0,0);
}
function utTeamsBackToList() { utTeamsActiveKey = null; render(); }
function utTeamsUpdateNewName(val) { utTeamsNewName = val; }
function utTeamsCreateTeam() {
  const t = utTournaments[utViewTournamentId];
  if (!t || !isUtOwner(t)) return;
  const name = (utTeamsNewName || '').trim();
  if (!name) { showNotif('Enter team name', 'error'); return; }
  const key = utTeamKey(name);
  if (t.teams[key]) { showNotif('This team already exists', 'error'); return; }
  t.teams[key] = { teamName: name, flag: null, players: [] };
  _saveUtTournamentToFirestore(t.id, t);
  try { localStorage.setItem('pp_ut_tournaments_cache', JSON.stringify(utTournaments)); } catch(e){}
  utTeamsNewName = '';
  render();
  showNotif(`✅ ${name} team add ho gayi`);
}
function utTeamsDeleteTeam(key) {
  const t = utTournaments[utViewTournamentId];
  if (!t || !isUtOwner(t)) return;
  if (!confirm('Ye team delete karni hai? Sab players bhi delete ho jayenge.')) return;
  delete t.teams[key];
  _saveUtTournamentToFirestore(t.id, t);
  try { localStorage.setItem('pp_ut_tournaments_cache', JSON.stringify(utTournaments)); } catch(e){}
  if (utTeamsActiveKey === key) utTeamsActiveKey = null;
  render();
}
function utTeamsOpenDetail(key) { utTeamsActiveKey = key; utTeamsPasteText = null; utTeamsPasteMode = false; render(); window.scrollTo(0,0); }
function utTeamsUpdateNewPlayerName(val) { utTeamsNewPlayerName = val; }
function utTeamsUpdateNewPlayerRole(val) { utTeamsNewPlayerRole = val; }
function utTeamsUpdateNewPlayerCredit(val) { utTeamsNewPlayerCredit = val; }
function utTeamsAddPlayer(key) {
  const t = utTournaments[utViewTournamentId];
  const squad = t && t.teams[key];
  if (!t || !squad || !isUtOwner(t)) return;
  const name = (utTeamsNewPlayerName || '').trim();
  if (!name) { showNotif('Enter player name', 'error'); return; }
  if (squad.players.some(p => p.name.toLowerCase() === name.toLowerCase())) {
    showNotif('This player already exists in this team', 'error');
    return;
  }
  const credit = parseFloat(utTeamsNewPlayerCredit) || UT_DEFAULT_CREDIT;
  squad.players.push({ id: uid(), name, role: utTeamsNewPlayerRole || 'BAT', credit, photo: null });
  _saveUtTournamentToFirestore(t.id, t);
  try { localStorage.setItem('pp_ut_tournaments_cache', JSON.stringify(utTournaments)); } catch(e){}
  utTeamsNewPlayerName = '';
  utTeamsNewPlayerCredit = '9.0';
  render();
  showNotif(`✅ ${name} added`);
}
function utTeamsRemovePlayer(key, playerId) {
  const t = utTournaments[utViewTournamentId];
  const squad = t && t.teams[key];
  if (!t || !squad || !isUtOwner(t)) return;
  squad.players = squad.players.filter(p => p.id !== playerId);
  _saveUtTournamentToFirestore(t.id, t);
  try { localStorage.setItem('pp_ut_tournaments_cache', JSON.stringify(utTournaments)); } catch(e){}
  render();
}
function utTeamsSetPlayerRole(key, playerId, role) {
  const t = utTournaments[utViewTournamentId];
  const squad = t && t.teams[key];
  const p = squad && squad.players.find(x => x.id === playerId);
  if (!p) return;
  p.role = role;
  _saveUtTournamentToFirestore(t.id, t);
  try { localStorage.setItem('pp_ut_tournaments_cache', JSON.stringify(utTournaments)); } catch(e){}
  render();
}
function utTeamsSetPlayerCredit(key, playerId, val) {
  const t = utTournaments[utViewTournamentId];
  const squad = t && t.teams[key];
  const p = squad && squad.players.find(x => x.id === playerId);
  if (!p) return;
  p.credit = parseFloat(val) || 0;
  _saveUtTournamentToFirestore(t.id, t);
  try { localStorage.setItem('pp_ut_tournaments_cache', JSON.stringify(utTournaments)); } catch(e){}
}
// ── Paste squad (bulk add) — reuses the same role-detection helpers (d11DetectExplicitRole, d11GuessRoleFromName, D11_SECTION_HEADERS) the main app already has ──

// ── UT-scoped scoring (same cricket point rules, independent of global `matches`) ──
function utGetScoring(matchId) {
  const t = utTournaments[utViewTournamentId];
  const m = t && t.matches[matchId];
  const fmt = (m && m.format) ? m.format : 'T20';
  return D11_SCORING[fmt] || D11_SCORING.T20;
}
function calcUtPlayerPoints(stats, matchId) {
  if (!stats) return 0;
  const s = utGetScoring(matchId);
  let pts = 0;
  const runs = Number(stats.runs)||0;
  const fours = Number(stats.fours)||0;
  const sixes = Number(stats.sixes)||0;
  const wickets = Number(stats.wickets)||0;
  const maidens = Number(stats.maidens)||0;
  const catches = Number(stats.catches)||0;
  const stumpings = Number(stats.stumpings)||0;
  const runOuts = Number(stats.runOuts)||0;
  const isOut = !!stats.isOut;
  const ballsFaced = Number(stats.ballsFaced)||0;
  const oversBowled = Number(stats.oversBowled)||0;

  pts += runs * s.perRun;
  pts += fours * s.boundary4Bonus;
  pts += sixes * s.boundary6Bonus;
  if (runs >= 100) pts += s.century100Bonus;
  else if (runs >= 50) pts += s.half50Bonus;
  if (runs === 0 && isOut && ballsFaced > 0) pts += s.duckPenalty;

  if (ballsFaced >= s.srMinBalls) {
    const sr = (runs / ballsFaced) * 100;
    if (s.srBonus.above170 && sr > 170) pts += s.srBonus.above170;
    else if (s.srBonus.above150 && sr > 150) pts += s.srBonus.above150;
    else if (s.srBonus.above130 && sr > 130) pts += s.srBonus.above130;
    else if (s.srBonus.above140 && sr > 140) pts += s.srBonus.above140;
    else if (s.srBonus.above120 && sr > 120) pts += s.srBonus.above120;
    else if (s.srBonus.above100 && sr > 100) pts += s.srBonus.above100;
    if (s.srPenalty.below60 && sr < 60) pts += s.srPenalty.below60;
    else if (s.srPenalty.below70 && sr < 70) pts += s.srPenalty.below70;
    else if (s.srPenalty.below80 && sr < 80) pts += s.srPenalty.below80;
    else if (s.srPenalty.below40 && sr < 40) pts += s.srPenalty.below40;
    else if (s.srPenalty.below50 && sr < 50) pts += s.srPenalty.below50;
  }

  pts += wickets * s.perWicket;
  if (wickets >= 5) pts += s.fiveWicketBonus;
  else if (wickets >= 3) pts += s.threeWicketBonus;
  pts += maidens * s.maidenOverBonus;

  const overs = oversBowled;
  if (overs >= s.erMinOvers) {
    const runsGiven = Number(stats.runsGiven)||0;
    const er = runsGiven / overs;
    if (s.erBonus.below5 && er < 5) pts += s.erBonus.below5;
    else if (s.erBonus.below6 && er < 6) pts += s.erBonus.below6;
    else if (s.erBonus.below7 && er < 7) pts += s.erBonus.below7;
    else if (s.erBonus.below2_5 && er < 2.5) pts += s.erBonus.below2_5;
    else if (s.erBonus.below3_5 && er < 3.5) pts += s.erBonus.below3_5;
    else if (s.erBonus.below4_5 && er < 4.5) pts += s.erBonus.below4_5;
    if (s.erPenalty.above12 && er > 12) pts += s.erPenalty.above12;
    else if (s.erPenalty.above11 && er > 11) pts += s.erPenalty.above11;
    else if (s.erPenalty.above10 && er > 10) pts += s.erPenalty.above10;
    else if (s.erPenalty.above9 && er > 9) pts += s.erPenalty.above9;
    else if (s.erPenalty.above8 && er > 8) pts += s.erPenalty.above8;
    else if (s.erPenalty.above7 && er > 7) pts += s.erPenalty.above7;
  }

  pts += catches * s.perCatch;
  pts += stumpings * s.perStumping;
  pts += runOuts * s.perRunOut;

  return Math.round(pts);
}
function utPlayerCredit(p) {
  return (p && p.credit != null && p.credit > 0) ? p.credit : UT_DEFAULT_CREDIT;

function utRecalcMatchPoints(m) {

function utApplyPasteStats() {
  const t = utTournaments[utViewTournamentId];
  const m = t && t.matches[utActiveMatchId];
  if (!t || !m || !utStatsPasteText || !isUtOwner(t)) { showNotif('Please paste the scoreboard first', 'error'); return; }
  const rows = d11ParseStatsText(utStatsPasteText); // shared parser — pipe / colon / detailed-scorecard formats
  if (rows.length === 0) { showNotif('No player rows detected — check the format', 'error'); return; }

  let matched = 0;
  const unmatched = [];
  rows.forEach(row => {
    const lowName = (row.name||'').toLowerCase().trim();
    let p = m.players.find(x => x.name.toLowerCase() === lowName);
    if (!p) p = m.players.find(x => x.name.toLowerCase().includes(lowName) || lowName.includes(x.name.toLowerCase()));
    if (!p) { unmatched.push(row.name); return; }
    p.stats = {
      runs: row.runs||0, ballsFaced: row.ballsFaced||0, fours: row.fours||0, sixes: row.sixes||0, isOut: !!row.isOut,

      catches: row.catches||0, stumpings: row.stumpings||0, runOuts: row.runOuts||0

  showNotif(`✅ ${matched} player${matched===1?'':'s'} ke points updated${unmatched.length ? `, ${unmatched.length} not matched: ${unmatched.slice(0,3).join(', ')}` : ''}`);
}

function _utBuildReviewRows(battingRows, bowlingRows, fieldingRows) {
  const t = utTournaments[utViewTournamentId];
  const m = t && t.matches[utActiveMatchId];
  const findPlayer = (name) => {
    if (!m) return null;
    const lowName = (name||'').toLowerCase().trim();
    if (!lowName) return null;
    let p = m.players.find(x => x.name.toLowerCase() === lowName);
    if (!p) p = m.players.find(x => x.name.toLowerCase().includes(lowName) || lowName.includes(x.name.toLowerCase()));
    return p;
  };

  const rowsByKey = {};
  const order = [];
  const touch = (scannedName) => {
    const p = findPlayer(scannedName);
    const key = p ? ('p_' + p.id) : ('u_' + scannedName.toLowerCase());
    if (!rowsByKey[key]) {
      rowsByKey[key] = {
        playerId: p ? p.id : null,
        scannedName,
        displayName: p ? p.name : scannedName,
        matched: !!p,
        runs: 0, ballsFaced: 0, fours: 0, sixes: 0, isOut: false,
        wickets: 0, maidens: 0, oversBowled: 0, runsGiven: 0,
        catches: 0, stumpings: 0, runOuts: 0
      };
      order.push(key);
    }
    return rowsByKey[key];
  };

  (battingRows||[]).forEach(row => {
    const r = touch(row.name);
    r.runs = row.runs||0; r.ballsFaced = row.ballsFaced||0; r.fours = row.fours||0; r.sixes = row.sixes||0; r.isOut = !!row.isOut;
  });
  (bowlingRows||[]).forEach(row => {
    const r = touch(row.name);
    r.wickets = row.wickets||0; r.maidens = row.maidens||0; r.oversBowled = row.oversBowled||0; r.runsGiven = row.runsGiven||0;
  });
  (fieldingRows||[]).forEach(row => {
    const r = touch(row.name);
    r.catches = row.catches||0; r.stumpings = row.stumpings||0; r.runOuts = row.runOuts||0;
  });

  return order.map(k => rowsByKey[k]);
}

function utReviewUpdateField(idx, field, value) {
  if (!utScanReview || !utScanReview.rows[idx]) return;
  const row = utScanReview.rows[idx];
  if (field === 'isOut') {
    row.isOut = !!value;
  } else if (field === 'displayName') {
    row.displayName = value;
  } else {
    const n = parseFloat(value);
    row[field] = isNaN(n) ? 0 : n;
  }
}
function utReviewRemoveRow(idx) {

}

function _utApplyParsedRows(battingRows, bowlingRows, fieldingRows) {
  const t = utTournaments[utViewTournamentId];
  const m = t && t.matches[utActiveMatchId];
  if (!t || !m) return { matched: 0, unmatched: [] };

  const findPlayer = (name) => {
    const lowName = (name||'').toLowerCase().trim();
    if (!lowName) return null;
    let p = m.players.find(x => x.name.toLowerCase() === lowName);
    if (!p) p = m.players.find(x => x.name.toLowerCase().includes(lowName) || lowName.includes(x.name.toLowerCase()));
    return p;
  };

  const matchedPlayerIds = new Set();
  const unmatched = [];

  (battingRows||[]).forEach(row => {
    const p = findPlayer(row.name);
    if (!p) { unmatched.push(row.name); return; }
    const prev = p.stats || {};
    p.stats = { ...prev, runs: row.runs||0, ballsFaced: row.ballsFaced||0, fours: row.fours||0, sixes: row.sixes||0, isOut: !!row.isOut };
    matchedPlayerIds.add(p.id);
  });
  (bowlingRows||[]).forEach(row => {
    const p = findPlayer(row.name);
    if (!p) { unmatched.push(row.name); return; }
    const prev = p.stats || {};
    p.stats = { ...prev, wickets: row.wickets||0, maidens: row.maidens||0, oversBowled: row.oversBowled||0, runsGiven: row.runsGiven||0 };
    matchedPlayerIds.add(p.id);
  });
  // Fielding (catches/stumpings/run-outs) is a fresh, complete read each time —
  // replaces rather than adds, same rationale as the Dream11 admin flow.
  (fieldingRows||[]).forEach(row => {
    const p = findPlayer(row.name);
    if (!p) { if (!unmatched.includes(row.name)) unmatched.push(row.name); return; }
    const prev = p.stats || {};
    p.stats = { ...prev, catches: row.catches||0, stumpings: row.stumpings||0, runOuts: row.runOuts||0 };
    matchedPlayerIds.add(p.id);
  });
  const matched = matchedPlayerIds.size;

  m.players.forEach(p => {
    if (!p.stats) return;
    const s = p.stats;
    p.stats = {
      runs: s.runs||0, ballsFaced: s.ballsFaced||0, fours: s.fours||0, sixes: s.sixes||0,
      isOut: !!s.isOut, wickets: s.wickets||0, maidens: s.maidens||0,
      catches: s.catches||0, stumpings: s.stumpings||0, runOuts: s.runOuts||0,
      oversBowled: s.oversBowled||0, runsGiven: s.runsGiven||0
    };
    p.points = calcUtPlayerPoints(p.stats, m.id);
  });

  _utRecalcAndSaveTeams(m);
  m.lastLiveUpdateAt = getDateTime();
  _saveUtTournamentToFirestore(t.id, t);
  try { localStorage.setItem('pp_ut_tournaments_cache', JSON.stringify(utTournaments)); } catch(e){}
  try { localStorage.setItem('pp_ut_teams_cache', JSON.stringify(utTeams)); } catch(e){}

  return { matched, unmatched: [...new Set(unmatched)] };
}

function utReviewConfirmApply() {
  if (!utScanReview || utScanReview.rows.length === 0) { showNotif('Nothing to apply', 'error'); return; }
  const t = utTournaments[utViewTournamentId];
  const m = t && t.matches[utActiveMatchId];

    bowlingRows.push({ name, wickets: row.wickets||0, maidens: row.maidens||0, oversBowled: row.oversBowled||0, runsGiven: row.runsGiven||0 });
    fieldingRows.push({ name, catches: row.catches||0, stumpings: row.stumpings||0, runOuts: row.runOuts||0 });

// ── Finalize Result (requires password) → locks scoring + pays out 90/10 split ──
function utRequestFinalize(matchId) {
  const t = utTournaments[utViewTournamentId];
  const m = t && t.matches[matchId];
  if (!t || !m) return;
  if (!isUtOwner(t)) { showNotif('Only the tournament owner can finalize results', 'error'); return; }
  const teamCount = Object.values(utTeams).filter(x => x.matchId === matchId).length;
  if (teamCount === 0) { showNotif('No users have joined yet — nothing to finalize', 'error'); return; }
  if (!confirm(`Finalize result? This is final — ${UT_COMPANY_SHARE*100}% goes to company and 90% to top scorers. This cannot be undone.`)) return;
  utRequestPasswordFor('finalize', matchId);
}
async function utDoFinalizeResult(tId, matchId) {
  const t = utTournaments[tId];
  const m = t && t.matches[matchId];
  if (!t || !m) return;

  utRecalcMatchPoints(m);
  const teams = Object.values(utTeams).filter(x => x.matchId === matchId);
  teams.forEach(team => {
    let total = 0;
    team.picks.forEach(pid => {
      const p = m.players.find(x => x.id === pid);
      if (!p) return;
      const mult = team.captain === pid ? 2 : team.viceCaptain === pid ? 1.5 : 1;
      total += Math.round((p.points||0) * mult);
    });
    team.totalPoints = total;
  });
  teams.sort((a,b) => (b.totalPoints||0) - (a.totalPoints||0));

  // ── 90/10 payout split ──
  const pool = teams.length * (m.entryFee || UT_MIN_ENTRY_FEE);
  const distributable = pool * (1 - UT_COMPANY_SHARE); // 90%
  const winners = teams.slice(0, Math.min(3, teams.length));
  // Re-normalize the split proportionally if fewer than 3 teams joined.
  const splitWeights = UT_PRIZE_SPLIT.slice(0, winners.length);
  const weightSum = splitWeights.reduce((a,b)=>a+b, 0) || 1;
  winners.forEach((team, i) => {
    const prize = Math.round((distributable * (splitWeights[i] / weightSum)) * 100) / 100;
    if (prize <= 0) return;
    // Credit prize server-side
    _adminWalletPrize(team.userEmail, prize, 'ut_prize', null, `${t.name} — ${m.teamA} vs ${m.teamB} — Rank #${i+1}`);
  });

  m.scored = true;
  m.locked = true;
  _saveUtTournamentToFirestore(t.id, t);
  teams.forEach(team => _saveUtTeamToFirestore(team.id, team));
  try { localStorage.setItem('pp_ut_tournaments_cache', JSON.stringify(utTournaments)); } catch(e){}
  try { localStorage.setItem('pp_ut_teams_cache', JSON.stringify(utTeams)); } catch(e){}
  try { localStorage.setItem('pp_users_cache', JSON.stringify(users)); } catch(e){}

  render();
  showNotif(`🏁 Result finalized! Rs ${distributable.toFixed(0)} top ${winners.length} ko distribute ho gaye, Rs ${(pool*UT_COMPANY_SHARE).toFixed(0)} company share.`);
}

// ── Recalculate points after finalization (owner/admin can fix mistakes) ──
async function utRecalculateAfterFinalize(matchId) {
  const t = utTournaments[utViewTournamentId];

  if (!t || !m) return;

  utRecalcMatchPoints(m);
  const teams = Object.values(utTeams).filter(x => x.matchId === matchId);
  teams.forEach(team => {
    let total = 0;
    team.picks.forEach(pid => {
      const p = m.players.find(x => x.id === pid);
      if (!p) return;
      const mult = team.captain === pid ? 2 : team.viceCaptain === pid ? 1.5 : 1;
      total += Math.round((p.points||0) * mult);
    });
    team.totalPoints = total;
  });

  m.lastLiveUpdateAt = getDateTime();
  _saveUtTournamentToFirestore(t.id, t);
  teams.forEach(team => _saveUtTeamToFirestore(team.id, team));
  try { localStorage.setItem('pp_ut_tournaments_cache', JSON.stringify(utTournaments)); } catch(e){}
