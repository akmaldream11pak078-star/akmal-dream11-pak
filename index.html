// ── User side: join contest, build Dream11-style team, leaderboard, view team ──
function isUtLocked(tId, matchId) {
  const m = utGetMatch(tId, matchId);
  if (!m) return false;
  if (m.locked) return true;
  if (m.deadline && Date.now() > m.deadline) return true;
  return false;
}
function utGetUserTeam(tId, matchId, email) {
  return Object.values(utTeams).find(x => x.tournamentId === tId && x.matchId === matchId && x.userEmail === email) || null;
}

// ── UT: cumulative tournament-wide leaderboard — sums a user's totalPoints
// across every match in the tournament. Recomputed live on every render, so
// it auto-updates the instant any match's points change (same pattern as
// the Dream11 Tournaments cumulative leaderboard via d11TournamentUserPoints). ──
function utTournamentUserPoints(t, email) {
  return Object.values(t.matches||{}).reduce((sum, m) => {
    const team = utGetUserTeam(t.id, m.id, email);
    return sum + (team?.totalPoints || 0);
  }, 0);
}
function utTournamentRanked(t) {
  const emails = new Set();
  Object.values(utTeams).forEach(team => { if (team.tournamentId === t.id) emails.add(team.userEmail); });
  return [...emails]
    .map(email => ({ email, name: users[email]?.name || email, points: utTournamentUserPoints(t, email) }))
    .sort((a,b) => b.points - a.points);
}
function utStartJoinContest(matchId) {
  const t = utTournaments[utViewTournamentId];
  const m = t && t.matches[matchId];
  if (!t || !m) return;
  if (isUtLocked(t.id, matchId)) { showNotif('Deadline has passed — team cannot be submitted', 'error'); return; }
  const existing = utGetUserTeam(t.id, matchId, currentUser.email);
  if (existing) {
    utTeamDraft = { tournamentId: t.id, matchId, picks: [...existing.picks], captain: existing.captain, viceCaptain: existing.viceCaptain, editingTeamId: existing.id };
  } else {
    utTeamDraft = { tournamentId: t.id, matchId, picks: [], captain: null, viceCaptain: null, editingTeamId: null };
  }
  utActiveMatchId = matchId;
  tab = 'utBuildTeam';
  render();
  window.scrollTo(0,0);
}
function utTeamComposition(picks, m) {
  const counts = { WK:0, BAT:0, AR:0, BOWL:0 };
  const sideCounts = {};
  picks.forEach(pid => {
    const p = (m.players||[]).find(x => x.id === pid);
    if (!p) return;
    counts[p.role] = (counts[p.role]||0) + 1;
    sideCounts[p.side] = (sideCounts[p.side]||0) + 1;
  });
  return { counts, sideCounts };
}
function utTeamDraftCreditsUsed(m) {
  if (!utTeamDraft) return 0;
  return utTeamDraft.picks.reduce((sum, pid) => {
    const p = m.players.find(x => x.id === pid);
    return sum + (p ? utPlayerCredit(p) : 0);
  }, 0);
}
function utTogglePick(playerId) {
  if (!utTeamDraft) return;
  const t = utTournaments[utTeamDraft.tournamentId];
  const m = t && t.matches[utTeamDraft.matchId];
  if (!m) return;
  const idx = utTeamDraft.picks.indexOf(playerId);
  if (idx >= 0) {
    utTeamDraft.picks.splice(idx, 1);
    if (utTeamDraft.captain === playerId) utTeamDraft.captain = null;
    if (utTeamDraft.viceCaptain === playerId) utTeamDraft.viceCaptain = null;
    render();
    return;
  }
  if (utTeamDraft.picks.length >= UT_TEAM_SIZE) { showNotif(`Only ${UT_TEAM_SIZE} players can be selected`, 'error'); return; }
  const p = m.players.find(x => x.id === playerId);
  if (!p) return;
  const thisCredit = utPlayerCredit(p);
  const creditsUsed = utTeamDraftCreditsUsed(m);
  if (creditsUsed + thisCredit > UT_CREDIT_BUDGET + 1e-9) {
    showNotif(`Not enough credits left — ${(UT_CREDIT_BUDGET - creditsUsed).toFixed(1)} Cr remaining, this player costs ${thisCredit} Cr`, 'error');
    return;
  }
  const { counts } = utTeamComposition(utTeamDraft.picks, m);
  const [min, max] = UT_ROLE_LIMITS[p.role];
  if ((counts[p.role]||0) >= max) { showNotif(`Max ${max} ${UT_ROLE_LABELS[p.role]}s allowed`, 'error'); return; }
  const { sideCounts } = utTeamComposition(utTeamDraft.picks, m);
  if ((sideCounts[p.side]||0) >= UT_MAX_PER_SIDE) { showNotif(`Max ${UT_MAX_PER_SIDE} players allowed from one team`, 'error'); return; }
  utTeamDraft.picks.push(playerId);
  render();
}
function utSetCaptain(pid) { if (!utTeamDraft) return; utTeamDraft.captain = pid; if (utTeamDraft.viceCaptain === pid) utTeamDraft.viceCaptain = null; render(); }
function utSetViceCaptain(pid) { if (!utTeamDraft) return; utTeamDraft.viceCaptain = pid; if (utTeamDraft.captain === pid) utTeamDraft.captain = null; render(); }
function utValidateTeam(picks, m) {
  const errors = [];
  if (picks.length !== UT_TEAM_SIZE) errors.push(`Exactly ${UT_TEAM_SIZE} players required (currently ${picks.length})`);
  const { counts, sideCounts } = utTeamComposition(picks, m);
  Object.keys(UT_ROLE_LIMITS).forEach(role => {
    const [min, max] = UT_ROLE_LIMITS[role];
    const c = counts[role]||0;
    if (c < min || c > max) errors.push(`${UT_ROLE_LABELS[role]}: ${min}-${max} required (currently ${c})`);
  });
  Object.keys(sideCounts).forEach(side => {
    if (sideCounts[side] > UT_MAX_PER_SIDE) errors.push(`Max ${UT_MAX_PER_SIDE} players allowed from one team (${side})`);
  });
  const creditsUsed = picks.reduce((sum, pid) => {
    const p = (m.players||[]).find(x => x.id === pid);
    return sum + (p ? utPlayerCredit(p) : 0);
  }, 0);
  if (creditsUsed > UT_CREDIT_BUDGET + 1e-9) errors.push(`Over credit budget: ${creditsUsed.toFixed(1)}/${UT_CREDIT_BUDGET} Cr used`);
  return errors;
}
async function utSubmitTeam() {
  if (!utTeamDraft) return;
  const t = utTournaments[utTeamDraft.tournamentId];
  const m = t && t.matches[utTeamDraft.matchId];
  if (!t || !m) return;
  if (isUtLocked(t.id, m.id)) { showNotif('Deadline guzar gayi', 'error'); return; }
  const errors = utValidateTeam(utTeamDraft.picks, m);
  if (errors.length) { showNotif(errors[0], 'error'); return; }
  if (!utTeamDraft.captain || !utTeamDraft.viceCaptain) { showNotif('Please select Captain and Vice-Captain', 'error'); return; }

  const isNewEntry = !utTeamDraft.editingTeamId;
  const u = users[currentUser.email];
  if (isNewEntry) {
    if ((u.balance||0) < m.entryFee) {
      showNotif(`Insufficient balance — Rs ${m.entryFee} required to join this contest`, 'error');
      return;
    }
  }

  let team;
  if (utTeamDraft.editingTeamId) {
    team = utTeams[utTeamDraft.editingTeamId];
    team.picks = [...utTeamDraft.picks];
    team.captain = utTeamDraft.captain;
    team.viceCaptain = utTeamDraft.viceCaptain;
  } else {
    team = newUtTeamSubmission(t.id, m.id, currentUser.email);
    team.picks = [...utTeamDraft.picks];
    team.captain = utTeamDraft.captain;
    team.viceCaptain = utTeamDraft.viceCaptain;
    team.paid = true;
    utTeams[team.id] = team;

    // Deduct entry fee server-side
    const result = await _walletCall({ action: 'join_mega_contest', matchId: m.id, contestType: 'ut', entryFee: m.entryFee });
    if (!result) return;
    u.balance = result.balance;
    u.transactions = result.transactions;
    currentUser.balance = result.balance;
    currentUser.transactions = result.transactions;

    t.participants[currentUser.email] = true;
  }

  _saveUtTeamToFirestore(team.id, team);
  _saveUtTournamentToFirestore(t.id, t);
  try { localStorage.setItem('pp_ut_teams_cache', JSON.stringify(utTeams)); } catch(e){}
  try { localStorage.setItem('pp_ut_tournaments_cache', JSON.stringify(utTournaments)); } catch(e){}
  try { localStorage.setItem('pp_users_cache', JSON.stringify(users)); } catch(e){}

  utTeamDraft = null;
  tab = 'utDashboard';
  render();
  window.scrollTo(0,0);
  showNotif(isNewEntry ? `✅ Team submit ho gayi — Rs ${m.entryFee} deduct ho gaye` : '✅ Team update ho gayi');
}

// ── RENDER: Match Manage (owner) — add players to pool + Instant Points result entry ──
// ── UT: Quick Score Table — compact spreadsheet UI for owner scoring ──
function renderUtQuickScoreTable() {
  const t = utTournaments[utViewTournamentId];
  const m = t && t.matches[utActiveMatchId];
  if (!t || !m || m.players.length === 0) return `<div class="empty-state">Add players from Player Pool tab first.</div>`;
  const mid = m.id;
  const sideA = m.players.filter(p => p.side === 'A');
  const sideB = m.players.filter(p => p.side === 'B');

  const sc = getD11Scoring(mid);

  const calcSRDisplay = (s) => {
    const runs = Number(s.runs)||0;
    const balls = Number(s.ballsFaced)||0;
    if (balls < sc.srMinBalls) return { label: '—', pts: 0, color: 'var(--dim)' };
    const sr = (runs / balls) * 100;
    let pts = 0;
    if (sc.srBonus.above170 && sr > 170) pts = sc.srBonus.above170;
    else if (sc.srBonus.above150 && sr > 150) pts = sc.srBonus.above150;
    else if (sc.srBonus.above130 && sr > 130) pts = sc.srBonus.above130;
    if (sc.srPenalty.below60 && sr < 60) pts = sc.srPenalty.below60;
    else if (sc.srPenalty.below70 && sr < 70) pts = sc.srPenalty.below70;
    else if (sc.srPenalty.below80 && sr < 80) pts = sc.srPenalty.below80;
    const color = pts > 0 ? '#4ade80' : pts < 0 ? '#f87171' : 'var(--dim)';
    return { label: sr.toFixed(1), pts, color };
  };

  const calcERDisplay = (s) => {
    const overs = Number(s.oversBowled)||0;
    const rg = Number(s.runsGiven)||0;
    if (overs < sc.erMinOvers) return { label: '—', pts: 0, color: 'var(--dim)' };
    const er = rg / overs;
    let pts = 0;
    if (sc.erBonus.below5 && er < 5) pts = sc.erBonus.below5;
    else if (sc.erBonus.below6 && er < 6) pts = sc.erBonus.below6;
    else if (sc.erBonus.below7 && er < 7) pts = sc.erBonus.below7;
    if (sc.erPenalty.above10 && er > 10) pts = sc.erPenalty.above10;
    if (sc.erPenalty.above11 && er > 11) pts = sc.erPenalty.above11;
    if (sc.erPenalty.above12 && er > 12) pts = sc.erPenalty.above12;
    const color = pts > 0 ? '#4ade80' : pts < 0 ? '#f87171' : 'var(--dim)';
    return { label: er.toFixed(2), pts, color };
  };

  const inp = (id, val, w, extra='') =>
    `<input type="number" min="0" id="${id}" value="${val??''}" placeholder="0" style="width:${w}px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--text);padding:5px 4px;font-size:11px;text-align:center" ${extra}/>`;

  const playerRow = (p) => {
    const s = p.stats || {};
    const sr = calcSRDisplay(s);
    const er = calcERDisplay(s);
    const pid = `utqs-${mid}-${p.id}`;
    return `
    <tr style="border-bottom:1px solid rgba(255,255,255,0.06)">
      <td style="padding:7px 6px;font-size:12px;font-weight:600;white-space:nowrap">
        <span class="d11-role-chip d11-role-${p.role}" style="font-size:9px;padding:1px 5px">${p.role}</span>
        ${p.name}
        ${p.isPlayingXI ? '<span style="color:#4ade80;font-size:9px;margin-left:3px">XI</span>' : ''}
      </td>
      <td style="padding:4px 3px">${inp(`${pid}-runs`, s.runs, 44)}</td>
      <td style="padding:4px 3px">${inp(`${pid}-balls`, s.ballsFaced, 40)}</td>
      <td style="padding:4px 3px">${inp(`${pid}-fours`, s.fours, 36)}</td>
      <td style="padding:4px 3px">${inp(`${pid}-sixes`, s.sixes, 36)}</td>

  // ── Batting Card (editable — same ids as Table view) ──
  const renderBattingCard = (players, teamName, teamColor) => {
    if (!players.length) return `<div style="font-size:12px;color:var(--dim);text-align:center;padding:12px">No players for ${teamName}</div>`;

    <div style="margin-bottom:14px">
      <div style="font-size:11.5px;font-weight:800;color:${teamColor};text-transform:uppercase;letter-spacing:0.7px;margin-bottom:8px;padding-left:4px">${teamName}</div>
      <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;overflow:hidden">
        <div style="display:grid;grid-template-columns:1fr 38px 38px 30px 30px 54px 58px;padding:7px 12px;background:rgba(255,255,255,0.05);font-size:10px;font-weight:700;color:var(--dim);text-align:right">
          <div style="text-align:left">Batter</div><div>R</div><div>B</div><div>4s</div><div>6s</div><div>SR</div><div style="color:var(--gold)">Pts</div>
        </div>
        ${players.map(p => {
          const s = p.stats||{}; const runs=Number(s.runs)||0; const balls=Number(s.ballsFaced)||0;
          const fours=Number(s.fours)||0; const sixes=Number(s.sixes)||0; const isOut=s.isOut;
          const srD=calcSRDisplay(s); const srLabel=balls>0?((runs/balls)*100).toFixed(1):'—';
          const batPts=runs*sc.perRun+fours*sc.boundary4Bonus+sixes*sc.boundary6Bonus+(runs>=100?sc.century100Bonus:runs>=50?sc.half50Bonus:0)+(runs===0&&isOut&&balls>0?sc.duckPenalty:0)+srD.pts;
          const fPts=(Number(s.catches)||0)*sc.perCatch+(Number(s.stumpings)||0)*sc.perStumping+(Number(s.runOuts)||0)*sc.perRunOut;
          const pid=`utqs-${mid}-${p.id}`;
          return `
          <div style="display:grid;grid-template-columns:1fr 38px 38px 30px 30px 54px 58px;padding:8px 12px;border-top:1px solid rgba(255,255,255,0.05);align-items:center">
            <div>
              <div style="font-size:12px;font-weight:600;color:var(--text)">${p.name}</div>
              <div style="font-size:10px;color:var(--dim);margin-top:2px;display:flex;gap:4px;flex-wrap:wrap;align-items:center">
                <span class="d11-role-chip d11-role-${p.role}" style="font-size:8px;padding:1px 4px">${p.role}</span>
                <label style="display:flex;align-items:center;gap:2px;cursor:pointer">
                  <input type="checkbox" id="${pid}-isOut" ${isOut?'checked':''} style="width:12px;height:12px;accent-color:var(--orange)" />

                </label>
                ${(Number(s.catches)||0)>0?`<span style="color:#60a5fa">🧤${s.catches}ct</span>`:''}
                ${(Number(s.stumpings)||0)>0?`<span style="color:#a78bfa">🥊${s.stumpings}st</span>`:''}
                ${(Number(s.runOuts)||0)>0?`<span style="color:#fb923c">🏃${s.runOuts}ro</span>`:''}
              </div>
            </div>
            <div>${inp(`${pid}-runs`, s.runs, 34)}</div>
            <div>${inp(`${pid}-balls`, s.ballsFaced, 34)}</div>
            <div>${inp(`${pid}-fours`, s.fours, 28)}</div>
            <div>${inp(`${pid}-sixes`, s.sixes, 28)}</div>
            <div style="text-align:right;font-size:10.5px;font-weight:700;color:${srD.color}">${srLabel}${srD.pts!==0?`<div style="font-size:8.5px">${srD.pts>0?'+':''}${srD.pts}pts</div>`:''}</div>
            <div style="text-align:right"><div style="font-size:13px;font-weight:700;color:var(--gold)">${p.points||0}</div><div style="font-size:9px;color:var(--dim)">🏏${Math.round(batPts)}${fPts>0?`<span style="color:#60a5fa"> 🧤+${fPts}</span>`:''}</div></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  };

  // ── Bowling Card (editable — same ids as Table view) ──
  const renderBowlingCard = (players, teamName, teamColor) => {
    if (!players.length) return `<div style="font-size:12px;color:var(--dim);text-align:center;padding:12px">No players for ${teamName}</div>`;
    return `
    <div style="margin-bottom:14px">
      <div style="font-size:11.5px;font-weight:800;color:${teamColor};text-transform:uppercase;letter-spacing:0.7px;margin-bottom:8px;padding-left:4px">${teamName}</div>

          const erD=calcERDisplay(s); const erLabel=overs>0?(rg/overs).toFixed(2):'—';
          const bowlPts=wkts*sc.perWicket+(wkts>=5?sc.fiveWicketBonus:wkts>=3?sc.threeWicketBonus:0)+maidens*sc.maidenOverBonus+erD.pts;
          const fPts=(Number(s.catches)||0)*sc.perCatch+(Number(s.stumpings)||0)*sc.perStumping+(Number(s.runOuts)||0)*sc.perRunOut;

            <div><input type="number" min="0" id="${pid}-maidens" value="${s.maidens??''}" placeholder="0" style="width:26px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);border-radius:6px;color:var(--text);padding:4px 3px;font-size:11px;text-align:center"/></div>
            <div>${inp(`${pid}-runsGiven`, s.runsGiven, 34)}</div>
            <div>${inp(`${pid}-wickets`, s.wickets, 34)}</div>

            <div style="text-align:right"><div style="font-size:13px;font-weight:700;color:var(--gold)">${p.points||0}</div><div style="font-size:9px;color:var(--dim)">🎳${Math.round(bowlPts)}${fPts>0?`<span style="color:#60a5fa"> 🧤+${fPts}</span>`:''}</div></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  };

  // ── Fielding Card ──
  const renderFieldingCard = (allPlayers) => {
    const fielders = allPlayers.filter(p => (Number(p.stats?.catches)||0)>0||(Number(p.stats?.stumpings)||0)>0||(Number(p.stats?.runOuts)||0)>0);
    if (!fielders.length) return `<div class="card mb14" style="text-align:center;padding:18px;color:var(--dim)"><div style="font-size:22px;margin-bottom:8px">🧤</div><div style="font-size:12px">No fielding data yet — add Catch / Stumping / Run-out in Table view</div></div>`;
    return `
    <div style="margin-bottom:14px">

          <div style="text-align:left;color:var(--dim)">Fielder</div>
          <div style="color:#60a5fa">🧤 Ct</div>
          <div style="color:#a78bfa">🥊 St</div>

          <div style="color:var(--gold)">Field Pts</div>
        </div>
        ${fielders.map(p => {
          const s=p.stats||{};
          const catches=Number(s.catches)||0; const stumpings=Number(s.stumpings)||0; const runOuts=Number(s.runOuts)||0;
          const fPts=catches*sc.perCatch+stumpings*sc.perStumping+runOuts*sc.perRunOut;
          const pid=`utqs-${mid}-${p.id}`;
          return `
          <div style="display:grid;grid-template-columns:1fr 52px 52px 52px 70px;padding:8px 12px;border-top:1px solid rgba(255,255,255,0.05);align-items:center">
            <div>
              <div style="font-size:12px;font-weight:600;color:var(--text)">${p.name}</div>
              <span class="d11-role-chip d11-role-${p.role}" style="font-size:8px;padding:1px 4px">${p.role}</span>
            </div>
            <div style="text-align:right">
              <input type="number" min="0" id="${pid}-catches" value="${catches||''}" placeholder="0" oninput="utQuickSaveAllStats()" style="width:40px;background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.3);border-radius:6px;color:var(--text);padding:4px;font-size:12px;text-align:center"/>

        }).join('')}
      </div>
    </div>
    <div class="card mb14" style="background:rgba(96,165,250,0.06);border-color:rgba(96,165,250,0.2);padding:12px 14px">
      <div style="font-size:11px;color:var(--dim);margin-bottom:6px;font-weight:700">📋 Fielding Points Reference</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;font-size:11px">
        <span style="color:#60a5fa">🧤 Catch = +${sc.perCatch} pts</span>
        <span style="color:#a78bfa">🥊 Stumping = +${sc.perStumping} pts</span>
        <span style="color:#fb923c">🏃 Run-out = +${sc.perRunOut} pts</span>
      </div>
      <div style="font-size:10px;color:var(--dim);margin-top:6px">💡 Fielding card sirf un players ko show karta hai jinka Ct/St/RO > 0 hai. Table view mein har player ke fielding stats enter karo.</div>
    </div>`;
  };

  const teamAName = m.teamA || 'Team A';
  const teamBName = m.teamB || 'Team B';
  const saveBtn = `<button class="btn-primary btn-block mb10" style="background:linear-gradient(135deg,#f97316,#ea580c);font-size:13px;padding:12px" onclick="utQuickSaveAllStats()">💾 Save All & Calculate Points</button>`;
  const backBtn = `<button class="btn-secondary btn-block mb10" style="font-size:12px" onclick="utQuickScoreOpen=false;utQsViewMode='table';render()">← Back to Player-by-Player Entry</button>`;

  return `
  <div class="card mb14" style="border-color:rgba(249,115,22,0.35);background:rgba(249,115,22,0.07);padding:12px 14px">
    <div style="font-weight:700;font-size:14px;color:#fb923c;margin-bottom:8px">⚡ Quick Score — ${t.name}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px">
      <button onclick="utQsViewMode='table';render()" style="padding:7px 4px;border-radius:10px;border:1px solid ${utQsViewMode==='table'?'#f97316':'rgba(255,255,255,0.1)'};background:${utQsViewMode==='table'?'rgba(249,115,22,0.2)':'rgba(255,255,255,0.04)'};color:${utQsViewMode==='table'?'#fb923c':'var(--dim)'};font-size:10.5px;font-weight:700;cursor:pointer">📋 Table</button>
      <button onclick="utQsViewMode='batting';render()" style="padding:7px 4px;border-radius:10px;border:1px solid ${utQsViewMode==='batting'?'#3b82f6':'rgba(255,255,255,0.1)'};background:${utQsViewMode==='batting'?'rgba(59,130,246,0.2)':'rgba(255,255,255,0.04)'};color:${utQsViewMode==='batting'?'#60a5fa':'var(--dim)'};font-size:10.5px;font-weight:700;cursor:pointer">🏏 Batting</button>

      <button onclick="utQsViewMode='fielding';render()" style="padding:7px 4px;border-radius:10px;border:1px solid ${utQsViewMode==='fielding'?'#60a5fa':'rgba(255,255,255,0.1)'};background:${utQsViewMode==='fielding'?'rgba(96,165,250,0.2)':'rgba(255,255,255,0.04)'};color:${utQsViewMode==='fielding'?'#60a5fa':'var(--dim)'};font-size:10.5px;font-weight:700;cursor:pointer">🧤 Fielding</button>

  ${saveBtn}${backBtn}
  `:utQsViewMode==='fielding'?`
  ${renderFieldingCard([...sideA,...sideB])}
  ${saveBtn}${backBtn}
  `:`

  <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:14px">
    <table style="width:100%;border-collapse:collapse;min-width:880px">
      <thead>
        <tr style="border-bottom:2px solid rgba(255,255,255,0.1)">
          <th style="padding:7px 6px;font-size:10px;color:var(--dim);text-align:left;font-weight:700;text-transform:uppercase;letter-spacing:0.5px">Player</th>
          <th style="padding:7px 3px;font-size:10px;color:var(--dim);font-weight:700" title="Runs">R</th>
          <th style="padding:7px 3px;font-size:10px;color:var(--dim);font-weight:700" title="Balls Faced">B</th>
          <th style="padding:7px 3px;font-size:10px;color:var(--dim);font-weight:700" title="Fours">4s</th>
          <th style="padding:7px 3px;font-size:10px;color:var(--dim);font-weight:700" title="Sixes">6s</th>
          <th style="padding:7px 3px;font-size:10px;color:var(--dim);font-weight:700" title="Wickets">Wkt</th>
          <th style="padding:7px 3px;font-size:10px;color:var(--dim);font-weight:700" title="Overs Bowled">Ovr</th>
          <th style="padding:7px 3px;font-size:10px;color:var(--dim);font-weight:700" title="Runs Given">RG</th>
          <th style="padding:7px 3px;font-size:10px;color:#4ade80;font-weight:700" title="Maiden Overs">Md</th>
          <th style="padding:7px 3px;font-size:10px;color:#60a5fa;font-weight:700" title="Catches">Ct</th>
          <th style="padding:7px 3px;font-size:10px;color:#a78bfa;font-weight:700" title="Stumpings">St</th>
          <th style="padding:7px 3px;font-size:10px;color:#fb923c;font-weight:700" title="Run Outs">RO</th>

          <th style="padding:7px 4px;font-size:10px;color:#34d399;font-weight:700;text-align:center" title="Economy Rate">ER</th>

        </tr>
      </thead>
      <tbody>
        ${sideA.length > 0 ? `<tr><td colspan="16" style="padding:8px 6px 4px;font-size:11px;font-weight:700;color:var(--blue-l);letter-spacing:0.5px">${m.teamA||'Team A'}</td></tr>${sideA.map(playerRow).join('')}` : ''}
        ${sideB.length > 0 ? `<tr><td colspan="16" style="padding:10px 6px 4px;font-size:11px;font-weight:700;color:var(--orange);letter-spacing:0.5px">${m.teamB||'Team B'}</td></tr>${sideB.map(playerRow).join('')}` : ''}
      </tbody>
    </table>

  ${saveBtn}${backBtn}
  `}
  `;
}

function renderUtMatchManage() {
  const t = utTournaments[utViewTournamentId];
  const m = t && t.matches[utActiveMatchId];
  if (!t || !m) return `<div class="empty-state">Match not found. <button class="btn-secondary" onclick="goUtHub()" style="margin-top:10px">← Back</button></div>`;
  if (!isUtOwner(t)) return `<div class="empty-state">Only the tournament owner can access this screen.</div>`;

  const sideA = m.players.filter(p => p.side === 'A');
  const sideB = m.players.filter(p => p.side === 'B');
  const squadA = utGetTeamSquad(t.id, m.teamA);
  const squadB = utGetTeamSquad(t.id, m.teamB);

      <div style="display:flex;align-items:center;gap:6px">

// ── RENDER: Build Team (Dream11-style cricket pick UI, same UX as main app) ──
function renderUtBuildTeam() {
  if (!utTeamDraft) return `<div class="empty-state">Team draft not found.</div>`;
  const t = utTournaments[utTeamDraft.tournamentId];
  const m = t && t.matches[utTeamDraft.matchId];
  if (!t || !m) return `<div class="empty-state">Match not found. <button class="btn-secondary" onclick="utBackFromBuildOrBoard()" style="margin-top:10px">← Back</button></div>`;

  const { counts } = utTeamComposition(utTeamDraft.picks, m);
  const sideA = m.players.filter(p => p.side === 'A');
  const sideB = m.players.filter(p => p.side === 'B');
  const dLocked = isUtLocked(t.id, m.id);
  const deadlineStr = m.deadline ? new Date(m.deadline).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
  const xiCount = m.players.filter(p => p.isPlayingXI).length;

  const progressPill = (role) => {
    const [min, max] = UT_ROLE_LIMITS[role];
    const c = counts[role]||0;
    const cls = c > max ? 'over' : (c >= min ? 'ok' : '');
    return `<div class="d11-progress-pill ${cls}"><div class="d11-progress-num">${c}/${max}</div><div class="d11-progress-lbl">${role}</div></div>`;
  };

  return `
  <button class="btn-secondary mb14" style="font-size:12px;padding:8px 14px" onclick="utBackFromBuildOrBoard()">← Back</button>

  <div class="card mb14">
    <div class="match-teams" style="margin-bottom:4px">
      <span class="team-name">${m.teamA||'TBD'}</span>
      <span class="vs-badge">VS</span>
      <span class="team-name">${m.teamB||'TBD'}</span>
    </div>
    <div style="text-align:center;font-size:11px;color:var(--dim)">Build your team — select ${UT_TEAM_SIZE} players · 💰 Entry Rs ${m.entryFee}</div>
    ${deadlineStr ? `<div class="match-deadline">${dLocked ? '🔒 Deadline passed' : `⏰ Deadline: ${deadlineStr}`}</div>` : ''}
    ${xiCount > 0 ? `<div style="text-align:center;font-size:10.5px;color:#4ade80;margin-top:4px">🏏 Playing XI confirmed for ${xiCount} player${xiCount===1?'':'s'}</div>` : ''}
  </div>

  <div class="d11-progress-bar">
    ${progressPill('WK')}${progressPill('BAT')}${progressPill('AR')}${progressPill('BOWL')}
  </div>

  <div class="section-title">${m.teamA||'Team A'}</div>
  ${sideA.map(p => utPickRow(p)).join('')}

  <div class="section-title" style="margin-top:16px">${m.teamB||'Team B'}</div>
  ${sideB.map(p => utPickRow(p)).join('')}

  ${utTeamDraft.picks.length === UT_TEAM_SIZE ? `
  <div class="section-title" style="margin-top:18px">👑 Select Captain & Vice-Captain</div>
  <div class="empty-state" style="padding:8px 4px;font-size:11px;text-align:left">Captain = 2x points · Vice-Captain = 1.5x points</div>
  ${utTeamDraft.picks.map(pid => {
    const p = m.players.find(x => x.id === pid);
    if (!p) return '';
    return `
    <div class="d11-player-row picked">
      <div class="d11-player-left">
        <span class="d11-role-chip d11-role-${p.role}">${p.role}</span>
        <div class="d11-player-name">${p.name}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="d11-cv-btn ${utTeamDraft.captain===pid?'is-c':''}" onclick="utSetCaptain('${pid}')">C</button>
        <button class="d11-cv-btn ${utTeamDraft.viceCaptain===pid?'is-vc':''}" onclick="utSetViceCaptain('${pid}')">VC</button>
      </div>
    </div>`;
  }).join('')}
  ` : ''}

  <div class="d11-sticky-bar">
    <div>
      <div style="font-size:11px;color:var(--dim)">Selected</div>
      <div class="display" style="font-size:18px">${utTeamDraft.picks.length}/${UT_TEAM_SIZE}</div>
    </div>
    <div>
      <div style="font-size:11px;color:var(--dim);text-align:center">Credits Left</div>
      <div class="display" style="font-size:18px;color:${(UT_CREDIT_BUDGET - utTeamDraftCreditsUsed(m)) < 0 ? '#f87171' : 'var(--gold)'};text-align:center">${(UT_CREDIT_BUDGET - utTeamDraftCreditsUsed(m)).toFixed(1)}</div>
    </div>
    ${dLocked
      ? `<button class="btn-secondary" style="padding:12px 22px" disabled>🔒 Locked</button>`
      : `<button class="btn-primary" style="padding:12px 22px;background:linear-gradient(135deg,#f97316,#ea580c)" onclick="utSubmitTeam()">✅ Submit Team</button>`}
  </div>
  `;
}
function utPickRow(p) {
  const picked = utTeamDraft.picks.includes(p.id);
  return `

      <div style="margin-top:2px;font-size:10.5px;font-weight:700;color:${finalPts>0?'#4ade80':'rgba(255,255,255,0.6)'}">${finalPts} pts</div>

  return `
  <button class="btn-secondary mb14" style="font-size:12px;padding:8px 14px" onclick="utBackFromBuildOrBoard()">← Back</button>

  <div class="card mb14">
    <div style="font-size:12px;color:var(--dim);text-align:center">${u?.name||team.userEmail}'s Team</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:14px;margin:8px 0 4px">
      <span class="team-name" style="font-size:13px">${m?.teamA||'TBD'}</span>
      <span class="vs-badge" style="font-size:9px;padding:2px 7px">VS</span>
      <span class="team-name" style="font-size:13px">${m?.teamB||'TBD'}</span>
    </div>
    <div style="text-align:center;margin-top:8px">
      <div class="display" style="font-size:26px;color:var(--gold)">${team.totalPoints||0} pts</div>
      ${m?.scored ? `<span class="match-status status-completed" style="margin-top:4px;display:inline-block">🏁 FINAL</span>` : m?.lastLiveUpdateAt ? `<span class="match-status status-live" style="margin-top:4px;display:inline-block">🔴 LIVE</span>` : ''}
    </div>
  </div>

  <div style="background:linear-gradient(180deg,#1d6b3a,#155a2f);border-radius:16px;padding:18px 8px;margin-bottom:18px;position:relative;overflow:hidden">
    <div style="position:absolute;top:50%;left:50%;width:160%;height:55%;border:1.5px solid rgba(255,255,255,0.15);border-radius:50%;transform:translate(-50%,-50%)"></div>
    ${roleOrder.map(r => byRole[r].length ? `
    <div style="position:relative;margin-bottom:18px">
      <div style="text-align:center;font-size:11px;font-weight:800;letter-spacing:0.5px;color:rgba(255,255,255,0.85);margin-bottom:12px">${roleLabels[r]}</div>

  <div class="section-title">Playing 11</div>
  ${team.picks.map(pid => {
    const p = m?.players.find(x => x.id === pid);
    if (!p) return '';
    const isC = team.captain === pid, isVC = team.viceCaptain === pid;
    const mult = isC ? 2 : isVC ? 1.5 : 1;
    const finalPts = Math.round((p.points||0) * mult);
    return `
    <div class="d11-player-row">

      </div>
      <div style="text-align:right">
        <div style="font-weight:700;font-size:13px;color:${finalPts>0?'#4ade80':'var(--dim)'}">${finalPts} pts</div>
        ${mult>1 ? `<div style="font-size:9.5px;color:var(--dim)">${p.points||0} × ${mult}</div>` : ''}
      </div>
    </div>`;
  }).join('')}

}

<script>
// ═══════════════════════════════════════════════════════════
// APP INITIALIZATION
// ═══════════════════════════════════════════════════════════
async function initApp() {
  // ── Handle ?join_tournament=CODE deep link (from WhatsApp share) ──
  const _urlParams = new URLSearchParams(window.location.search);
  const _tjCode = _urlParams.get('join_tournament');
  if (_tjCode) {
    window._pendingTournamentJoinCode = _tjCode.toUpperCase();
    // Clean URL without reload
    try { history.replaceState(null, '', window.location.pathname); } catch(e) {}
  }

  // Step 1: Load cache instantly → render right away (feels instant)
  loadLocalCache();
  loadSession(); // optimistic instant paint from localStorage (legacy/cache only)
  if (currentUser && users[currentUser.email]) {
    currentUser = { ...users[currentUser.email], email: currentUser.email };
  }
  render(); // Show UI immediately from cache

  // Step 2: Wait for Firebase Auth to confirm the REAL session (source of truth)
  const firebaseOk = await new Promise(resolve => {
    if (window._firebaseReady !== undefined) {
      resolve(!!window._firebaseReady);
    } else {
      window._firebaseReadyResolve = resolve;
      setTimeout(() => resolve(false), 5000);
    }
  });

  // Was there a legacy (pre-migration) session loaded from cache in Step 1?
  // We need this later to avoid nuking a not-yet-migrated user's data.
  const _legacySessionEmail = currentUser ? currentUser.email : null;

  if (firebaseOk && window._fbAuthReadyPromise) {
    const authUser = await window._fbAuthReadyPromise;
    if (authUser && authUser.email) {
      // Real, valid Firebase Auth session exists — this is the source of truth
      const authEmail = authUser.email.toLowerCase();
      if (!users[authEmail]) await _loadAllUsersFromFirestore();
      if (users[authEmail]) {
        currentUser = { ...users[authEmail], email: authEmail };
        saveSession(authEmail); // keep cache in sync for next instant paint
        if (window.showBabarSplash) window.showBabarSplash();
      } else {
        // Firebase Auth session is valid but user profile not found in Firestore yet.
        // Retry once before giving up — avoids clearing valid sessions on new browsers.
        await _loadAllUsersFromFirestore();
        if (users[authEmail]) {
          currentUser = { ...users[authEmail], email: authEmail };
          saveSession(authEmail);
          if (window.showBabarSplash) window.showBabarSplash();
        } else {
          // Still not found — keep them logged in with basic info so they can use the app
          currentUser = { email: authEmail, points: 0, balance: 0 };
          saveSession(authEmail);
          if (window.showBabarSplash) window.showBabarSplash();
        }
      }
    } else if (_legacySessionEmail) {
      // No real Firebase Auth session, BUT a legacy (pre-migration) session
      // was restored from localStorage in Step 1. This account predates the
      // Firebase Auth migration and has never logged in since. We can't
      // silently re-authenticate them (we never store their password), and
      // we can't safely keep showing them as "logged in" because all
      // authenticated Firestore reads will fail going forward. Instead: log
      // them out cleanly, but remember their email so the login screen is
      // pre-filled and shows a one-time "please log in again" notice. Their
      // data is untouched in Firestore — logging back in re-syncs everything
      // and silently completes the Firebase Auth migration (see handleLogin).
      _legacyMigrationEmail = _legacySessionEmail;
      currentUser = null;
      clearSession();
    } else {
      // No real Firebase Auth session and nothing in cache either — nothing to keep.
      if (currentUser) { currentUser = null; clearSession(); }
    }
    render();
  } else if (!firebaseOk) {
    console.warn("Firebase not available — running on localStorage cache only");
    if (currentUser && window.showBabarSplash) window.showBabarSplash();
    return; // App already rendered from cache above — user can still use it
  }

  // Step 3: Sync from Firestore silently
  // Only load if user is authenticated — rules require request.auth != null
  const authOk = !!(window._fbAuthCurrentUser && window._fbAuthCurrentUser());
  if (!authOk) {
    console.warn('[initApp] No Firebase Auth session — skipping Firestore sync to avoid PERMISSION_DENIED');
    render();
    return;
  }
  await _loadAllUsersFromFirestore();
  await _loadAllMatchesFromFirestore();
  await _loadAllH2HFromFirestore();
  await _loadAllCustomContestsFromFirestore();
  await _loadAllDream11MatchesFromFirestore();
  await _loadAllTeamSquadsFromFirestore();
  await _loadAllDream11TeamsFromFirestore();
  await _loadAllD11H2HFromFirestore();
  await _loadAllD11CustomContestsFromFirestore();
  await _loadAllD11TournamentsFromFirestore();
  await _loadAllUtTournamentsFromFirestore();
  await _loadAllUtTeamsFromFirestore();
  await _loadAllDeletedMatchesFromFirestore();
  await _loadAllDeletedD11MatchesFromFirestore();

  render(); // Re-render with all fresh Dream11 + match data

  // Ensure owner/admin account always exists
  if (!users[OWNER_EMAIL]) {
    const passHash = await _sha256("kmnadfkm");
    const adminUser = newUserTemplate(OWNER_EMAIL, "Abdullah Akmal", passHash, null);
    adminUser.referralCode = "OWNER001";
    users[OWNER_EMAIL] = adminUser;
    await _saveUserToFirestore(OWNER_EMAIL, adminUser);
  }

  // Refresh session user with latest Firestore data
  if (currentUser && users[currentUser.email]) {
    currentUser = { ...users[currentUser.email], email: currentUser.email };
  }

  render(); // Re-render with fresh data (silent update)
}

initApp();

// ── Register service worker for offline support + push ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch((err) => {
      console.warn('Service worker registration failed:', err);
    });
    navigator.serviceWorker.register('./firebase-messaging-sw.js').catch((err) => {
      console.warn('Firebase messaging service worker registration failed:', err);
    });
  });
}

// ── Live countdown ticker ──
// Updates all .d11-countdown elements every second without full re-render
function d11FormatCountdown(ms) {
  if (ms <= 0) return '🔒 Deadline passed';
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  if (d > 1) return `⏳ ${d}d ${h%24}h remaining`;
  if (h > 0) return `⏳ ${h}h ${m%60}m remaining`;
  if (m > 0) return `⏳ ${m}m ${s%60}s remaining`;
  return `🔴 ${s}s remaining`;
}
setInterval(() => {
  document.querySelectorAll('.d11-countdown[data-deadline]').forEach(el => {
    const dl = parseInt(el.dataset.deadline);
    const remaining = dl - Date.now();
    el.textContent = d11FormatCountdown(remaining);
    el.style.color = remaining < 3600000 ? '#f87171' : remaining < 86400000 ? '#fb923c' : 'var(--orange)';
  });
}, 1000);
</script>

<script>
// ── Player DP (Display Picture) Upload ──────────────────────────────────────
let _dpTarget = null; // { type: 'd11'|'ut', playerId }

function playerAvatarHtml(photo, name, size) {
  size = size || 32;
  const base = 'border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.18)';
  const dim = 'width:'+size+'px;height:'+size+'px;';
  if (photo) return '<img src="'+photo+'" style="'+dim+base+'" />';
  const initials = (name||'?').charAt(0).toUpperCase();
  const fs = Math.round(size * 0.44);
  return '<div style="'+dim+'border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#2563eb,#f97316);display:flex;align-items:center;justify-content:center;font-size:'+fs+'px;font-weight:700;color:#fff;font-family:Rajdhani,sans-serif;border:1.5px solid rgba(255,255,255,0.18)">'+initials+'</div>';
}

function d11TriggerPhotoUpload(playerId) { _dpTarget = { type: 'd11', playerId }; document.getElementById('player-dp-input').click(); }
function utTriggerPhotoUpload(playerId) { _dpTarget = { type: 'ut', playerId }; document.getElementById('player-dp-input').click(); }

function _onPlayerDpChange(input) {
  const file = input.files[0];
  if (!file || !_dpTarget) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxSide = 140;
      const ratio = Math.min(maxSide / img.width, maxSide / img.height);
      canvas.width = Math.round(img.width * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const b64 = canvas.toDataURL('image/jpeg', 0.78);
      _applyPlayerDp(_dpTarget.type, _dpTarget.playerId, b64);
    };
    img.src = e.target.result;
    input.value = '';
  };
  reader.readAsDataURL(file);
}

function _applyPlayerDp(type, playerId, b64) {
  if (type === 'd11') {
    const d11m = dream11Matches[d11ActiveMatchId];
    if (!d11m) return;
    const p = (d11m.players || []).find(x => x.id === playerId);
    if (p) { p.photo = b64; _saveDream11MatchToFirestore(d11ActiveMatchId, d11m); }
  } else if (type === 'ut') {
    const t = utTournaments[utViewTournamentId];
    const m = t && t.matches[utActiveMatchId];
    if (!m) return;
    const p = (m.players || []).find(x => x.id === playerId);
    if (p) {
      p.photo = b64;
      // Also sync photo to team squad so future matches carry it
      const squad = utGetTeamSquad(t.id, p.side === 'A' ? m.teamA : m.teamB);
      if (squad) { const sp = squad.players.find(x => x.name.toLowerCase() === p.name.toLowerCase()); if (sp) sp.photo = b64; }
      _saveUtTournamentToFirestore(t.id, t);
    }
  }
  render();
  showNotif('✅ Player photo updated!');
}
</script>

<input type="file" id="player-dp-input" accept="image/*" style="display:none" onchange="_onPlayerDpChange(this)">
