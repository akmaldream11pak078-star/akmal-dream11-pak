<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#2563eb">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Akmal Dream 11 Pak">
<meta name="description" content="PredictionPro — Cricket & Football Prediction Contests | Win Points, Climb the Leaderboard">
<title>Akmal Dream 11 Pak 🇵🇰</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0a1628; --navy2:#0e1f3a; --blue:#2563eb; --blue-l:#3b82f6;
    --orange:#f97316; --green:#16a34a; --red:#dc2626; --gold:#fbbf24;
    --card:rgba(255,255,255,0.045); --card-b:rgba(255,255,255,0.09);
    --text:#e7edf7; --dim:#7e8db0; --dim2:#506084;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overscroll-behavior:none; }
  body {
    font-family:'Inter',sans-serif; background:var(--navy); color:var(--text);
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  #app {
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, rgba(37,99,235,0.18), transparent 45%),
      radial-gradient(circle at 90% 15%, rgba(249,115,22,0.10), transparent 40%),
      linear-gradient(180deg, #0a1628 0%, #0c1b33 100%);
    padding-bottom:86px;
  }
  .display { font-family:Rajdhani,sans-serif; font-weight:700; letter-spacing:0.3px; }
  h1,h2,h3 { font-family:Rajdhani,sans-serif; font-weight:700; }
  ::-webkit-scrollbar { display:none; }
  button { font-family:inherit; cursor:pointer; }
  a { text-decoration:none; color:inherit; }

  /* ── Header ── */
  #header {
    position:sticky; top:0; z-index:50; backdrop-filter:blur(18px);
    background:rgba(10,22,40,0.85); border-bottom:1px solid rgba(255,255,255,0.06);
    padding:14px 18px; display:flex; align-items:center; justify-content:space-between;
  }
  .logo-wrap { display:flex; align-items:center; gap:10px; }
  .logo-mark {
    width:38px; height:38px; border-radius:11px;
    background:linear-gradient(135deg,var(--blue),var(--orange));
    display:flex; align-items:center; justify-content:center; font-size:19px;
    box-shadow:0 4px 14px rgba(37,99,235,0.4);
    overflow:hidden;
  }
  .logo-mark img { width:100%; height:100%; object-fit:cover; display:block; }
  .logo-text-main { font-family:Rajdhani,sans-serif; font-weight:700; font-size:19px; letter-spacing:0.5px; line-height:1.05; }
  .logo-text-main span { color:var(--orange); }
  .logo-text-sub { font-size:9.5px; color:var(--dim); letter-spacing:1.5px; text-transform:uppercase; }
  .header-right { display:flex; align-items:center; gap:8px; }
  .pill {
    font-size:11px; font-weight:700; padding:7px 13px; border-radius:20px;
    display:flex; align-items:center; gap:5px; font-family:Rajdhani,sans-serif; letter-spacing:0.3px;
  }
  .pill-points { background:rgba(251,191,36,0.13); color:var(--gold); border:1px solid rgba(251,191,36,0.3); }
  .pill-admin { background:rgba(249,115,22,0.15); color:var(--orange); border:1px solid rgba(249,115,22,0.3); }
  .pill-logout { background:rgba(220,38,38,0.1); color:#f87171; border:1px solid rgba(220,38,38,0.25); padding:7px 13px; font-size:11px; font-weight:700; border-radius:20px; }

  /* ── Page ── */
  .page { padding:18px 16px 10px; max-width:600px; margin:0 auto; animation:fadeIn 0.3s; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .mb10{margin-bottom:10px}.mb14{margin-bottom:14px}.mb18{margin-bottom:18px}.mb22{margin-bottom:22px}

  /* ── Cards ── */
  .card {
    background:var(--card); border:1px solid var(--card-b); border-radius:18px; padding:18px;
  }
  .section-title { font-size:13px; font-weight:700; color:var(--dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; display:flex; align-items:center; gap:7px; }

  /* ── Buttons ── */
  .btn-primary {
    width:100%; padding:15px; border:none; border-radius:14px; font-size:15px; font-weight:700;
    font-family:Rajdhani,sans-serif; letter-spacing:0.4px; color:#fff;
    background:linear-gradient(135deg,var(--blue),#1d4ed8);
    box-shadow:0 6px 18px rgba(37,99,235,0.35); transition:transform 0.15s;
  }
  .btn-primary:active { transform:scale(0.97); }
  .btn-orange { background:linear-gradient(135deg,var(--orange),#ea580c); box-shadow:0 6px 18px rgba(249,115,22,0.35); }
  .btn-secondary {
    width:100%; padding:13px; border:1px solid var(--card-b); border-radius:14px; font-size:14px;
    font-weight:600; color:var(--text); background:rgba(255,255,255,0.04);
  }
  .btn-block { width:100%; }
  .btn-disabled { opacity:0.4; pointer-events:none; }

  /* ── Inputs ── */
  .label { font-size:12px; font-weight:600; color:var(--dim); margin-bottom:7px; display:block; }
  .input {
    width:100%; padding:13px 15px; border-radius:12px; border:1px solid var(--card-b);
    background:rgba(255,255,255,0.04); color:var(--text); font-size:14.5px; font-family:inherit;
  }
  .input:focus { outline:none; border-color:rgba(37,99,235,0.5); }
  .input::placeholder { color:var(--dim2); }
  select.input { appearance:none; }
  textarea.input { resize:vertical; min-height:70px; }

  /* ── Bottom Nav ── */
  #bottom-nav {
    position:fixed; bottom:0; left:0; right:0; z-index:50;
    background:rgba(10,22,40,0.92); backdrop-filter:blur(18px);
    border-top:1px solid rgba(255,255,255,0.07);
    display:flex; justify-content:space-around; padding:7px 1px 10px;
  }
  .nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; flex:1; opacity:0.42; transition:opacity 0.2s; position:relative; min-width:0; }
  .nav-item.active { opacity:1; }
  .nav-icon { font-size:17px; }
  .nav-label { font-size:8.3px; font-weight:600; color:var(--dim); white-space:nowrap; }
  .nav-item.active .nav-label { color:var(--blue-l); font-weight:700; }
  .nav-dot { width:5px; height:5px; border-radius:50%; background:var(--orange); position:absolute; top:-3px; right:28%; }

  /* mini cricket ball used as the Dream11 nav icon — spins gently only while active */
  .nav-ball {
    width:16px; height:16px; border-radius:50%; position:relative;
    background:radial-gradient(circle at 32% 28%, #e0503f 0%, #c4321f 40%, #8c1c10 80%, #6e1409 100%);
    box-shadow:inset -2px -3px 4px rgba(0,0,0,0.35), inset 2px 2px 3px rgba(255,255,255,0.2);
  }
  .nav-ball::before, .nav-ball::after {
    content:''; position:absolute; inset:1px; border-radius:50%; border:1px dashed rgba(255,255,255,0.8);
    -webkit-mask-image:linear-gradient(115deg, transparent 42%, #000 46%, #000 54%, transparent 58%);
            mask-image:linear-gradient(115deg, transparent 42%, #000 46%, #000 54%, transparent 58%);
  }
  .nav-ball::after { transform:rotate(90deg); }
  .nav-item.active .nav-ball { animation:d11BallSpin 3s linear infinite; }

  /* ── Auth screen ── */
  .auth-wrap { min-height:100vh; display:flex; flex-direction:column; justify-content:center; padding:32px 24px; }
  .auth-logo { text-align:center; margin-bottom:8px; }
  .auth-logo-mark {
    width:74px; height:74px; border-radius:20px; margin:0 auto 16px;
    background:linear-gradient(135deg,var(--blue),var(--orange));
    display:flex; align-items:center; justify-content:center; font-size:36px;
    box-shadow:0 10px 30px rgba(37,99,235,0.4);
  }
  .auth-title { font-family:Rajdhani,sans-serif; font-weight:700; font-size:30px; text-align:center; letter-spacing:0.5px; }
  .auth-title span { color:var(--orange); }
  .auth-sub { text-align:center; color:var(--dim); font-size:13px; margin-top:6px; margin-bottom:30px; }
  .tab-switcher { display:flex; background:rgba(255,255,255,0.04); border-radius:14px; padding:4px; margin-bottom:24px; }
  .tab-btn { flex:1; padding:11px; text-align:center; border-radius:11px; font-size:13.5px; font-weight:700; color:var(--dim); border:none; background:none; font-family:Rajdhani,sans-serif; }
  .tab-btn.active { background:var(--blue); color:#fff; }
  .err { background:rgba(220,38,38,0.1); border:1px solid rgba(220,38,38,0.25); color:#f87171; padding:11px 14px; border-radius:11px; font-size:12.5px; margin-bottom:14px; }
  .eye-btn { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--dim); font-size:15px; }
  .input-wrap { position:relative; }

  /* ── Stat boxes ── */
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stat-box { background:var(--card); border:1px solid var(--card-b); border-radius:16px; padding:16px; text-align:center; }
  .stat-val { font-family:Rajdhani,sans-serif; font-weight:700; font-size:25px; }
  .stat-lbl { font-size:11px; color:var(--dim); margin-top:3px; font-weight:600; }

  /* ── Match card (signature element: prediction slip) ── */
  .match-slip {
    background:var(--card); border:1px solid var(--card-b); border-radius:18px;
    margin-bottom:14px; overflow:hidden; position:relative;
  }
  .match-slip-top {
    background:linear-gradient(90deg, rgba(37,99,235,0.12), rgba(249,115,22,0.08));
    padding:11px 16px; display:flex; justify-content:space-between; align-items:center;
    border-bottom:1px dashed rgba(255,255,255,0.12);
  }
  .match-sport-tag { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:3px 9px; border-radius:6px; }
  .tag-cricket { background:rgba(22,163,74,0.18); color:#4ade80; }
  .tag-football { background:rgba(37,99,235,0.18); color:#60a5fa; }
  .match-status { font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:6px; }
  .status-upcoming { background:rgba(251,191,36,0.15); color:var(--gold); }
  .status-live { background:rgba(220,38,38,0.18); color:#f87171; animation:pulse 1.5s infinite; }
  .status-completed { background:rgba(126,141,176,0.15); color:var(--dim); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
  .match-slip-body { padding:16px; }
  .match-teams { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:10px; }
  .team-name { font-family:Rajdhani,sans-serif; font-weight:700; font-size:16px; text-align:center; flex:1; }
  .vs-badge { font-size:11px; color:var(--dim); font-weight:700; background:rgba(255,255,255,0.05); padding:4px 10px; border-radius:8px; }
  .match-meta { display:flex; justify-content:center; gap:14px; font-size:11px; color:var(--dim); margin-bottom:4px; flex-wrap:wrap; }
  .match-deadline { font-size:11px; color:var(--orange); font-weight:600; text-align:center; margin-top:6px; }

  /* perforated edge effect */
  .slip-perf {
    height:14px; background:
      radial-gradient(circle at 8px 7px, transparent 6px, var(--navy) 6.5px) ;
    background-size:16px 14px; background-repeat:repeat-x;
    margin-top:-1px;
  }

  /* ── Question card ── */
  .q-card { background:rgba(255,255,255,0.035); border:1px solid var(--card-b); border-radius:14px; padding:15px; margin-bottom:12px; }
  .q-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; gap:10px; }
  .q-text { font-size:14px; font-weight:600; line-height:1.4; flex:1; }
  .q-points { font-size:11px; font-weight:700; color:var(--gold); background:rgba(251,191,36,0.12); padding:4px 9px; border-radius:8px; white-space:nowrap; font-family:Rajdhani,sans-serif; }
  .opt-grid { display:flex; flex-direction:column; gap:8px; }
  .opt-btn {
    width:100%; text-align:left; padding:12px 14px; border-radius:11px; border:1.5px solid var(--card-b);
    background:rgba(255,255,255,0.03); color:var(--text); font-size:13.5px; font-weight:600;
    display:flex; justify-content:space-between; align-items:center; transition:all 0.15s;
  }
  .opt-btn.selected { border-color:var(--blue); background:rgba(37,99,235,0.13); }
  .opt-btn.correct { border-color:var(--green); background:rgba(22,163,74,0.13); color:#4ade80; }
  .opt-btn.wrong { border-color:var(--red); background:rgba(220,38,38,0.1); color:#f87171; opacity:0.7; }
  .check-circle { width:18px; height:18px; border-radius:50%; border:2px solid var(--dim2); display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; }
  .opt-btn.selected .check-circle { background:var(--blue); border-color:var(--blue); }
  .opt-btn.correct .check-circle { background:var(--green); border-color:var(--green); }

  /* ── Badges & misc ── */
  .empty-state { text-align:center; color:var(--dim); font-size:13px; padding:50px 20px; line-height:1.7; }
  .empty-icon { font-size:42px; margin-bottom:12px; opacity:0.5; }
  .toast {
    position:fixed; top:14px; left:50%; transform:translateX(-50%) translateY(-60px);
    background:#16203c; border:1px solid var(--card-b); color:var(--text); padding:13px 20px;
    border-radius:13px; font-size:13.5px; font-weight:600; z-index:9999; box-shadow:0 8px 24px rgba(0,0,0,0.4);
    transition:transform 0.3s; max-width:90%; display:flex; align-items:center; gap:8px;
  }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast.error { border-color:rgba(220,38,38,0.4); }
  .toast.success { border-color:rgba(22,163,74,0.4); }
  .badge-dot { width:7px; height:7px; border-radius:50%; display:inline-block; }

  /* ── Loading ── */
  .loader-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:14px; }
  .spinner { width:40px; height:40px; border:3px solid rgba(255,255,255,0.1); border-top-color:var(--orange); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* ── Modal/Sheet ── */
  .sheet-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:9999; display:flex; align-items:flex-end; justify-content:center; animation:fadeIn 0.2s; }
  .sheet { background:#101e38; border-radius:24px 24px 0 0; width:100%; max-width:600px; padding:22px 18px 36px; max-height:88vh; overflow-y:auto; animation:slideUp 0.25s ease; border-top:1px solid var(--card-b); }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .sheet-close { background:rgba(255,255,255,0.08); border:none; color:#fff; width:32px; height:32px; border-radius:50%; font-size:15px; }

  /* ── Leaderboard ── */
  .lb-row { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:13px; margin-bottom:7px; background:rgba(255,255,255,0.03); border:1px solid var(--card-b); }
  .lb-rank { width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-family:Rajdhani,sans-serif; font-weight:700; font-size:14px; background:rgba(255,255,255,0.06); flex-shrink:0; }
  .lb-rank.r1 { background:linear-gradient(135deg,#fbbf24,#d97706); color:#1a1206; }
  .lb-rank.r2 { background:linear-gradient(135deg,#cbd5e1,#94a3b8); color:#1a1206; }
  .lb-rank.r3 { background:linear-gradient(135deg,#fb923c,#c2410c); color:#1a1206; }
  .lb-name { font-weight:700; font-size:13.5px; flex:1; }
  .lb-pts { font-family:Rajdhani,sans-serif; font-weight:700; color:var(--gold); font-size:15px; }

  /* ── Admin ── */
  .admin-tab-row { display:flex; gap:7px; overflow-x:auto; margin-bottom:16px; padding-bottom:2px; }
  .admin-tab { flex-shrink:0; padding:9px 15px; border-radius:11px; font-size:12.5px; font-weight:700; border:1px solid transparent; background:rgba(255,255,255,0.04); color:var(--dim); }
  .admin-tab.active { background:var(--blue); color:#fff; }

  /* ── H2H Contest ── */
  .h2h-card {
    background:linear-gradient(135deg,rgba(249,115,22,0.1),rgba(37,99,235,0.08));
    border:1px solid rgba(249,115,22,0.3); border-radius:18px; padding:18px; margin-bottom:14px;
  }
  .h2h-badge { display:inline-flex; align-items:center; gap:5px; background:rgba(249,115,22,0.18); color:var(--orange); border:1px solid rgba(249,115,22,0.35); padding:4px 10px; border-radius:8px; font-size:11px; font-weight:700; margin-bottom:8px; }
  .h2h-vs-row { display:flex; align-items:center; justify-content:center; gap:10px; margin:10px 0; }
  .h2h-player { flex:1; text-align:center; }
  .h2h-player-name { font-family:Rajdhani,sans-serif; font-weight:700; font-size:15px; }
  .h2h-player-sub { font-size:10.5px; color:var(--dim); margin-top:2px; }
  .h2h-slot { flex:1; background:rgba(255,255,255,0.04); border:1.5px dashed var(--card-b); border-radius:13px; padding:12px; text-align:center; }
  .h2h-slot-empty { color:var(--dim); font-size:12px; }
  .h2h-prize-row { display:flex; justify-content:space-between; background:rgba(255,255,255,0.03); border-radius:11px; padding:10px 14px; margin-top:10px; }
  .h2h-prize-item { text-align:center; }
  .h2h-prize-val { font-family:Rajdhani,sans-serif; font-weight:700; font-size:16px; }
  .h2h-prize-lbl { font-size:10px; color:var(--dim); margin-top:2px; }

  /* ── Receipt upload ── */
  .receipt-upload-box {
    border:2px dashed rgba(37,99,235,0.4); border-radius:14px; padding:24px; text-align:center;
    background:rgba(37,99,235,0.05); cursor:pointer; transition:all 0.2s; margin-bottom:14px;
  }
  .receipt-upload-box:hover { border-color:var(--blue); background:rgba(37,99,235,0.1); }
  .receipt-upload-icon { font-size:32px; margin-bottom:8px; }
  .receipt-preview { width:100%; max-height:200px; object-fit:contain; border-radius:10px; margin-bottom:10px; }
  .profit-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.06); }

  /* ── Dream11 ── */
  /* Cricket hero banner — stadium floodlight glow behind a spinning seam ball,
     a sweeping stitched-ball divider, and animated stumps. Built with CSS only
     (no images) so it stays crisp at any size and costs nothing to load. */
  .d11-hero {
    position:relative; overflow:hidden; border-radius:18px; margin-bottom:16px;
    padding:22px 16px 18px; background:
      radial-gradient(120% 140% at 18% -10%, rgba(249,115,22,0.22), transparent 55%),
      radial-gradient(100% 120% at 90% 110%, rgba(37,99,235,0.28), transparent 60%),
      linear-gradient(160deg,#0c1c36,#091428 70%);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 10px 30px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .d11-hero::before {
    /* faint floodlight beams sweeping across the banner */
    content:''; position:absolute; inset:-40%; pointer-events:none;
    background:conic-gradient(from 200deg at 80% 20%, rgba(255,255,255,0.09), transparent 18%, transparent 100%);
    animation:d11Floodlight 7s ease-in-out infinite;
  }
  @keyframes d11Floodlight { 0%,100%{opacity:0.55; transform:rotate(0deg)} 50%{opacity:1; transform:rotate(6deg)} }
  .d11-hero-row { position:relative; display:flex; align-items:center; gap:14px; z-index:1; }
  .d11-hero-text { flex:1; min-width:0; }
  .d11-hero-eyebrow {
    font-family:Rajdhani,sans-serif; font-weight:700; font-size:11px; letter-spacing:2px;
    text-transform:uppercase; color:var(--orange); display:flex; align-items:center; gap:6px; margin-bottom:3px;
  }
  .d11-hero-eyebrow .dot { width:6px; height:6px; border-radius:50%; background:var(--orange); animation:pulse 1.5s infinite; }
  .d11-hero-title {
    font-family:Rajdhani,sans-serif; font-weight:700; font-size:21px; line-height:1.15; color:#fff;
    letter-spacing:0.3px;
  }
  .d11-hero-title span { color:var(--orange); }
  .d11-hero-sub { font-size:11.5px; color:var(--dim); margin-top:4px; line-height:1.5; }

  /* the spinning cricket ball — CSS seam + shine, no image asset needed */
  .d11-ball {
    flex-shrink:0; width:54px; height:54px; border-radius:50%; position:relative;
    background:radial-gradient(circle at 32% 28%, #e0503f 0%, #c4321f 38%, #8c1c10 78%, #6e1409 100%);
    box-shadow:0 6px 14px -2px rgba(0,0,0,0.55), inset -4px -6px 10px rgba(0,0,0,0.35), inset 3px 4px 7px rgba(255,255,255,0.18);
    animation:d11BallSpin 5.5s linear infinite, d11BallBounce 2.2s ease-in-out infinite;
  }
  .d11-ball::before, .d11-ball::after {

// Speaks the welcome message using the browser's built-in Text-to-Speech engine.
// Works on all modern browsers (Chrome, Safari, Firefox) — no API key needed.
window.speakWelcome = function(){
  if (!window.speechSynthesis) return;
  try {
    window.speechSynthesis.cancel(); // stop any previous speech
    var msg = new SpeechSynthesisUtterance(
      "Well Come To Akmal Dream 11 Pak. Create Your Team, Join Contest, and Earn Big Awards!"
    );
    msg.lang = 'en-US';
    msg.rate = 0.92;   // slightly slower for clarity
    msg.pitch = 1.05;  // a touch higher for energy
    msg.volume = 1.0;

    // Prefer a richer voice if available (e.g. Google US English)
    var voices = window.speechSynthesis.getVoices();
    var preferred = voices.find(function(v){
      return v.name.toLowerCase().includes('google') && v.lang === 'en-US';
    }) || voices.find(function(v){
      return v.lang === 'en-US' && !v.localService;
    }) || voices.find(function(v){
      return v.lang.startsWith('en');
    });
    if (preferred) msg.voice = preferred;

    window.speechSynthesis.speak(msg);
  } catch(e) { /* speech not supported — silently skip */ }
};

// Voices may load asynchronously — pre-load them so the preferred voice is ready.
if (window.speechSynthesis && window.speechSynthesis.onvoiceschanged !== undefined) {

function getDateTime() {
  const now = new Date();
  const date = now.toISOString().split('T')[0];
  const hours = String(now.getHours()).padStart(2,'0');
  const mins = String(now.getMinutes()).padStart(2,'0');
  return `${date} ${hours}:${mins}`;
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function isAdmin() { return currentUser && currentUser.email === OWNER_EMAIL; }

async function _sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function genReferralCode(name) {
  const clean = (name||'USER').toUpperCase().replace(/[^A-Z]/g,'').slice(0,4).padEnd(4,'X');
  const num = Math.floor(1000 + Math.random()*9000);
  return clean + num;
}

function genContestCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no confusing chars (0/O, 1/I)
  let code = '';
  for (let i=0; i<6; i++) code += chars[Math.floor(Math.random()*chars.length)];
  return 'PPC-' + code;
}

let toastTimer = null;
function showNotif(msg, type='success') {
  let t = document.getElementById('toastEl');
  if (t) t.remove();
  t = document.createElement('div');
  t.id = 'toastEl';
  t.className = 'toast ' + type;
  const icon = type==='error' ? '⚠️' : '✅';
  t.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  document.body.appendChild(t);
  requestAnimationFrame(()=> t.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> { t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 3200);
}

async function _saveUserToFirestore(email, userData) {
  if (!window._fbDb || !window._fbFns) return;
  const { doc, setDoc } = window._fbFns;
  const safeKey = email.replace(/\./g, '_');
  // Await save so user profile is confirmed in Firestore before continuing
  await setDoc(doc(window._fbDb, 'pp_users', safeKey), userData)
    .catch(e => console.error('Firestore user save error:', e));
}
async function _loadAllUsersFromFirestore() {
  if (!window._fbDb || !window._fbFns) return false;
  const { collection, getDocs } = window._fbFns;
  try {
    const snap = await getDocs(collection(window._fbDb, 'pp_users'));
    snap.forEach(d => { users[d.id.replace(/_/g,'.')] = d.data(); });
    try { localStorage.setItem('pp_users_cache', JSON.stringify(users)); } catch(e){}
    return true;
  } catch(e){ return false; }
}

// ─── Fuzzy answer matching for open-ended (text) questions ──
// Accepts: case-insensitive exact match, OR <=3 char spelling
// mistakes (Levenshtein distance), OR first-3-letters match
// (e.g. "aus" matches "Australia").
function levenshteinDistance(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  const dp = Array.from({length: m+1}, () => new Array(n+1).fill(0));
  for (let i=0;i<=m;i++) dp[i][0] = i;
  for (let j=0;j<=n;j++) dp[0][j] = j;
  for (let i=1;i<=m;i++) {
    for (let j=1;j<=n;j++) {
      if (a[i-1] === b[j-1]) dp[i][j] = dp[i-1][j-1];
      else dp[i][j] = 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}
function isFuzzyAnswerMatch(userAns, correctAns) {
  const u = (userAns||'').toString().trim().toLowerCase();
  const c = (correctAns||'').toString().trim().toLowerCase();
  if (!u || !c) return false;
  if (u === c) return true;
  // First-3-letters short form (e.g. "aus" -> "australia")
  if (u.length >= 3 && c.length >= 3 && u === c.slice(0,3)) return true;
  // Spelling mistake tolerance (<=3 edits)
  if (levenshteinDistance(u, c) <= 3) return true;
  return false;
}

function setAuthError(msg) { authError = msg; render(); }

async function handleRegister() {
  const name = (document.getElementById('a-name')?.value||'').trim();
  const email = (document.getElementById('a-email')?.value||'').toLowerCase().trim();
  const pass = document.getElementById('a-pass')?.value||'';

  if (!name||!email||!pass) return setAuthError("Please fill in all fields");
  if (pass.length < 6) return setAuthError("Password must be at least 6 characters");
  if (!email.includes('@')) return setAuthError("Please enter a valid email");

  if (!window._firebaseReady || !window._fbAuthRegister) {
    return setAuthError("Connection error — please check your internet and try again");
  }

  // Sync from Firestore if available to check for duplicates
  await _loadAllUsersFromFirestore();
  if (users[email]) return setAuthError("This email is already registered");

  let referredBy = null;
  if (ref) {
    const owner = Object.entries(users).find(([e,u]) => u.referralCode === ref);
    if (!owner) return setAuthError("Invalid referral code");
    referredBy = owner[0];
  }

  // Create the real Firebase Auth account — this is now the source of truth for login
  try {
    await window._fbAuthRegister(email, pass);
  } catch (e) {
    if (e.code === 'auth/email-already-in-use') return setAuthError("This email is already registered");
    if (e.code === 'auth/weak-password') return setAuthError("Password must be at least 6 characters");
    return setAuthError("Could not create account — " + (e.message||'please try again'));
  }

  const passHash = await _sha256(pass); // kept only for legacy-field compatibility, not used for auth
  const newUser = newUserTemplate(email, name, passHash, referredBy);
  users[email] = newUser;

  await _saveUserToFirestore(email, newUser);

  if (referredBy && users[referredBy]) {
    users[referredBy].referrals.push({ email, name, joinDate: getDateTime() });
    await _saveUserToFirestore(referredBy, users[referredBy]);
  }

  try { localStorage.setItem('pp_users_cache', JSON.stringify(users)); } catch(e){}
  currentUser = { ...newUser, email };
  saveSession(email);
  tab = 'home';
  showNotif(`Welcome, ${name}! 🎉`);
  render();
  if (window.showBabarSplash) window.showBabarSplash();
  if (window._fbRequestPushPermission) window._fbRequestPushPermission(email);
}

async function handleLogin() {
  const email = (document.getElementById('a-email')?.value||'').toLowerCase().trim();
  const pass = document.getElementById('a-pass')?.value||'';
  if (!email||!pass) return setAuthError("Please enter your email and password");

  if (!window._firebaseReady || !window._fbAuthLogin) {
    return setAuthError("Connection error — please check your internet and try again");
  }

  // ── Step 1: Try real Firebase Auth login first ──
  try {
    await window._fbAuthLogin(email, pass);
  } catch (e) {
    // Newer Firebase Auth SDKs collapse "user not found" and "wrong password"
    // into the single generic code auth/invalid-credential (for security —
    // so attackers can't tell which case it is). That means a legacy account
    // that has never been migrated to real Firebase Auth will ALSO raise
    // auth/invalid-credential here, not auth/user-not-found. We must try the
    // legacy-migration path for both codes; the legacy hash check below is
    // what actually distinguishes "no such legacy account" / "wrong password"
    // from "this is a legacy account that just needs migrating".
    if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password') {
      // ── Step 2: Legacy account — verify against old Firestore SHA-256 hash, then migrate ──
      let user = users[email];
      if (!user) { await _loadAllUsersFromFirestore(); user = users[email]; }

      const passHash = user ? await _sha256(pass) : null;

      if (!user || user.password !== passHash) {
        // Not a legacy account we recognize, or the password truly doesn't
        // match the legacy hash — this is a genuine incorrect-password /
        // no-account case.
        return setAuthError(user ? "Incorrect password" : "No account found with this email — check your email or register first");
      }

      // Password matches the legacy record — silently create the real Auth account now
      try {
        await window._fbAuthRegister(email, pass);
      } catch (migrateErr) {
        if (migrateErr.code === 'auth/email-already-in-use') {
          // Auth account already exists but password differs from legacy hash (e.g. reset elsewhere) — fail clearly
          return setAuthError("Incorrect password");
        }
        return setAuthError("Login failed — please try again");
      }
      // _fbAuthRegister also signs the user in, so we can fall through below
    } else if (e.code === 'auth/too-many-requests') {
      return setAuthError("Too many attempts — please wait a bit and try again");
    } else {
      return setAuthError("Login failed — " + (e.message||'please try again'));
    }
  }

  // ── Auth succeeded (fresh login or just-migrated) — load the matching Firestore profile ──
  let user = users[email];
  if (!user) { await _loadAllUsersFromFirestore(); user = users[email]; }
  if (!user) return setAuthError("Account data not found — please contact support");

  currentUser = { ...user, email };
  saveSession(email);
  _legacyMigrationEmail = '';
  tab = 'home';
  showNotif(`Welcome back, ${user.name}!`);
  render(); // Show home instantly
  if (window.showBabarSplash) window.showBabarSplash();
  if (window._fbRequestPushPermission) window._fbRequestPushPermission(email);

  // Sync matches in background
  _loadAllMatchesFromFirestore().then(() => render());
  _loadAllH2HFromFirestore();
  _loadAllCustomContestsFromFirestore().then(() => render());
  // Load Dream11 data in background so Dream11 tab works immediately after login
  _loadAllDream11MatchesFromFirestore().then(() => render());
  _loadAllDream11TeamsFromFirestore();
  _loadAllTeamSquadsFromFirestore();
  _loadAllD11H2HFromFirestore();
  _loadAllD11CustomContestsFromFirestore();
  _loadAllD11TournamentsFromFirestore();
  _loadAllUtTournamentsFromFirestore();
  _loadAllUtTeamsFromFirestore();
}

function handleLogout() {
  currentUser = null;
  clearSession();
  if (window._fbAuthSignOut) window._fbAuthSignOut().catch(()=>{});
  tab = 'home';
  var s=document.getElementById('babar-splash');
  if (s) s.style.display='none';
  render();
}

function switchAuthMode(mode) {
  authMode = mode;
  authError='';
  if (mode !== 'login') { _legacyMigrationEmail = ''; }
  if (mode === 'forgot') { forgotStep = 'email'; forgotEmailPending = ''; }
  render();
}

async function handleSendOtp() {
  const email = (document.getElementById('a-forgot-email')?.value||'').toLowerCase().trim();
  if (!email || !email.includes('@')) return setAuthError('Please enter a valid email');

  let user = users[email];
  if (!user && window._firebaseReady) { await _loadAllUsersFromFirestore(); user = users[email]; }
  if (!user) return setAuthError('No account found with this email — check your email or register');

  const btn = document.getElementById('a-send-otp-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; }

  try {
    const resp = await fetch('/.netlify/functions/send-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await resp.json();
    if (!resp.ok || data.error) {
      if (btn) { btn.disabled = false; btn.textContent = '📧 Send Verification Code'; }
      return setAuthError(data.error || 'Could not send code — please try again');
    }
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = '📧 Send Verification Code'; }
    return setAuthError('Could not send code — please check your connection and try again');
  }

  forgotEmailPending = email;
  forgotStep = 'otp';
  authError = '';
  render();
  showNotif('📧 Verification code sent — check your email');
}

async function handleResendOtp() {
  const email = forgotEmailPending;
  if (!email) { forgotStep = 'email'; return render(); }
  try {
    await fetch('/.netlify/functions/send-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    showNotif('📧 A new code has been sent');
  } catch (e) {
    setAuthError('Could not resend code — please try again');
  }
}

async function handleForgotPassword() {
  const email = forgotEmailPending || (document.getElementById('a-forgot-email')?.value||'').toLowerCase().trim();
  const otp = (document.getElementById('a-forgot-otp')?.value||'').trim();
  const newPass = document.getElementById('a-forgot-newpass')?.value||'';
  const confirmPass = document.getElementById('a-forgot-confirmpass')?.value||'';
  if (!email) return setAuthError('Email daalna zaroori hai');
  if (!otp || otp.length !== 6) return setAuthError('Please enter the 6-digit verification code');
  if (!newPass || newPass.length < 6) return setAuthError('Password must be at least 6 characters');
  if (newPass !== confirmPass) return setAuthError('Passwords do not match');

  // Load user from Firestore if not in cache
  let user = users[email];
  if (!user && window._firebaseReady) {
    await _loadAllUsersFromFirestore();
    user = users[email];
  }
  if (!user) return setAuthError('No account found with this email — check your email or register');

  // Update the real Firebase Auth password (creates the account if this user
  // never logged in since migration began) via the secure server-side function.
  // The OTP proves the requester owns this email — verified server-side too.
  try {
    const resp = await fetch('/.netlify/functions/admin-set-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, newPassword: newPass, otp })
    });
    const data = await resp.json();
    if (!resp.ok || data.error) {
      return setAuthError('Password reset failed — ' + (data.error || 'please try again'));
    }
  } catch (e) {
    return setAuthError('Password reset failed — please check your connection and try again');
  }

  // Keep the legacy hash in sync too (used only as a migration fallback)
  const newPassHash = await _sha256(newPass);
  user.password = newPassHash;
  users[email] = user;
  await _saveUserToFirestore(email, user);

  authMode = 'login';
  forgotStep = 'email';
  forgotEmailPending = '';
  authError = '';
  render();
  showNotif('✅ Password reset successful — please login with your new password');
}
</script>

<script>
// ═══════════════════════════════════════════════════════════
// MATCH MANAGEMENT (Admin creates, users predict)
// ═══════════════════════════════════════════════════════════

// Match object shape:
// {
//   id, sport:'cricket'|'football', teamA, teamB, deadline(ms), status:'upcoming'|'live'|'completed',
//   createdAt, questions:[{id, text, type:'options'|'text', options:[...], points, correctAnswer:null}],
//   participants:[email,...]
// }

function newMatchTemplate() {
  return {
    id: uid(), sport:'cricket', format:'T20', teamA:'', teamB:'', deadline: Date.now()+86400000,
    seriesName: '',
    status:'upcoming', createdAt: getDateTime(), questions: [], participants: [],
    megaParticipants: [], megaPool: 0, megaDistributed: false,
    freeParticipants: []
  };
}

let draftMatch = null; // used while admin is creating/editing a match
let draftQuestions = [];

function startNewMatch() {
  draftMatch = newMatchTemplate();
  draftQuestions = [{ id: uid(), text:'', type:'options', options:['',''], points:10, correctAnswer:null }];
  adminTab = 'create';
  render();
}

function editMatch(matchId) {
  const m = matches[matchId];
  if (!m) return;
  draftMatch = { ...m };
  draftQuestions = JSON.parse(JSON.stringify(m.questions || []));
  adminTab = 'create';
  render();
}

function draftAddQuestion(type) {
  draftQuestions.push({ id: uid(), text:'', type, options: type==='options' ? ['',''] : [], points:10, correctAnswer:null });
  render();
}
function draftRemoveQuestion(qId) {
  draftQuestions = draftQuestions.filter(q => q.id !== qId);
  render();
}
function draftAddOption(qId) {
  const q = draftQuestions.find(x=>x.id===qId);
  if (q) q.options.push('');
  render();
}
function draftRemoveOption(qId, idx) {
  const q = draftQuestions.find(x=>x.id===qId);
  if (q && q.options.length > 2) q.options.splice(idx,1);
  render();
}
function draftUpdateField(field, value) {
  draftMatch[field] = value;
}
function draftUpdateQField(qId, field, value) {
  const q = draftQuestions.find(x=>x.id===qId);
  if (q) q[field] = value;
}
function draftUpdateOption(qId, idx, value) {
  const q = draftQuestions.find(x=>x.id===qId);
  if (q) q.options[idx] = value;
}

// ── Admin: Save a single question (validate + lock) ──────────
function draftSaveQuestion(qId) {
  const q = draftQuestions.find(x=>x.id===qId);
  if (!q) return;

  const elText = document.getElementById('dq-text-'+qId);
  if (elText) q.text = elText.value.trim();
  const elPts = document.getElementById('dq-points-'+qId);
  if (elPts) q.points = parseInt(elPts.value) || 10;
  if (q.type === 'options') {
    q.options = q.options.map((o,idx) => {
      const el = document.getElementById('dq-opt-'+qId+'-'+idx);
      return el ? el.value.trim() : o;
    });
  }

  if (!q.text) return showNotif('Question text is required', 'error');
  if (q.type === 'options' && q.options.filter(o=>o).length < 2) {
    return showNotif('At least 2 valid options are required', 'error');
  }

  q.saved = true;
  showNotif('Question saved ✅');
  render();
}

function draftEditQuestion(qId) {
  const q = draftQuestions.find(x=>x.id===qId);
  if (q) q.saved = false;
  render();
}

async function saveDraftMatch() {
  // Read live form values
  draftMatch.teamA = document.getElementById('dm-teamA')?.value.trim() || '';
  draftMatch.teamB = document.getElementById('dm-teamB')?.value.trim() || '';
  draftMatch.sport = document.getElementById('dm-sport')?.value || 'cricket';
  if (draftMatch.sport === 'cricket' && !draftMatch.format) draftMatch.format = 'T20';
  const seriesNameEl2 = document.getElementById('dm-seriesName');
  if (seriesNameEl2) draftMatch.seriesName = seriesNameEl2.value.trim();
  const deadlineStr = document.getElementById('dm-deadline')?.value;
  if (deadlineStr) draftMatch.deadline = new Date(deadlineStr).getTime();

  draftQuestions.forEach(q => {
    const elText = document.getElementById('dq-text-'+q.id);
    if (elText) q.text = elText.value.trim();
    const elPts = document.getElementById('dq-points-'+q.id);
    if (elPts) q.points = parseInt(elPts.value) || 10;
    if (q.type === 'options') {
      q.options = q.options.map((o,idx) => {
        const el = document.getElementById('dq-opt-'+q.id+'-'+idx);
        return el ? el.value.trim() : o;
      });
    }
  });

  if (!draftMatch.teamA || !draftMatch.teamB) return showNotif('Please enter both team names', 'error');
  if (draftQuestions.length === 0) return showNotif('Add at least one question', 'error');
  for (const q of draftQuestions) {
    if (!q.text) return showNotif('All questions need text', 'error');
    if (q.type === 'options' && q.options.filter(o=>o).length < 2) return showNotif('Options need at least 2 valid choices', 'error');
  }

  draftMatch.questions = draftQuestions.map(({saved, ...q}) => q);
  matches[draftMatch.id] = draftMatch;
  await _saveMatchToFirestore(draftMatch.id, draftMatch);
  try { localStorage.setItem('pp_matches_cache', JSON.stringify(matches)); } catch(e){}
  showNotif('Match saved successfully! 🏆');
  draftMatch = null; draftQuestions = [];
  adminTab = 'scoring'; // stay on scoring screen so admin can distribute Mega/Free rewards
  render();
}

// ── Admin: Confirm & pay out Mega Contest prizes ──────────────
async function distributeMegaPrizes(matchId) {
  const m = matches[matchId];
  if (!m) return;
  if (m.megaDistributed) return showNotif('Prizes already distributed for this match', 'error');

  const parts = m.megaParticipants || [];
  const pool = m.megaPool || 0;
  const distributable = Math.round(pool * (1 - MEGA_CONTEST_COMPANY_SHARE));

  const prizes = {};
  let total = 0;
  for (const email of parts) {
    const el = document.getElementById(`mega-prize-${matchId}-${email}`);
    const val = Math.max(0, parseInt(el?.value) || 0);
    if (val > 0) prizes[email] = val;
    total += val;
  }

  if (total > distributable) {
    return showNotif(`Total assigned (Rs ${total}) exceeds distributable pool (Rs ${distributable})`, 'error');
  }
  if (!confirm(`Pay out Rs ${total} across ${Object.keys(prizes).length} player(s)? This cannot be undone.`)) return;

  const savePromises = [];
  for (const [email, amount] of Object.entries(prizes)) {
    // Credit prize server-side (wallet.js verifies admin token)
    savePromises.push(_adminWalletPrize(email, amount, 'mega_prize', matchId, 'Mega Contest'));
  }
  await Promise.all(savePromises);

  m.megaPrizes = prizes;
  m.megaDistributed = true;
  await _saveMatchToFirestore(matchId, m);

  try {
    localStorage.setItem('pp_users_cache', JSON.stringify(users));
    localStorage.setItem('pp_matches_cache', JSON.stringify(matches));
  } catch(e){}

  showNotif(`Mega Contest prizes paid! Rs ${total} distributed 🏆`);
  render();
}

// ── Admin: Give manual rewards to Free Contest players ────────
async function giveFreeRewards(matchId) {
  const m = matches[matchId];
  if (!m) return;

  const parts = m.freeParticipants || [];
  m.freeRewards = m.freeRewards || {};

  const newRewards = {};
  for (const email of parts) {
    if (m.freeRewards[email]) continue; // already rewarded, skip
    const el = document.getElementById(`free-reward-${matchId}-${email}`);
    const val = Math.max(0, parseInt(el?.value) || 0);
    if (val > 0) newRewards[email] = val;
  }

  if (Object.keys(newRewards).length === 0) {
    return showNotif('Enter at least one reward amount', 'error');
  }
  if (!confirm(`Give rewards to ${Object.keys(newRewards).length} player(s)?`)) return;

  const savePromises = [];
  for (const [email, amount] of Object.entries(newRewards)) {
    // Credit reward server-side
    savePromises.push(_adminWalletPrize(email, amount, 'free_reward', matchId, 'Free Contest reward'));
    m.freeRewards[email] = amount;
  }
  await Promise.all(savePromises);
  await _saveMatchToFirestore(matchId, m);

  try {
    localStorage.setItem('pp_users_cache', JSON.stringify(users));
    localStorage.setItem('pp_matches_cache', JSON.stringify(matches));
  } catch(e){}

  showNotif(`Rewards given to ${Object.keys(newRewards).length} player(s) 🎁`);
  render();
}

async function deleteMatch(matchId) {
  const m = matches[matchId];
  if (!m) return;

  const hasD11 = !!dream11Matches[matchId];
  const d11TeamCount = hasD11 ? Object.values(dream11Teams).filter(t => t.matchId === matchId).length : 0;

  const warning = hasD11
    ? `\n\n⚠️ This match also has a Dream11 contest${d11TeamCount ? ` with ${d11TeamCount} submitted team(s)` : ''}. Deleting it here will ALSO remove it from Dream11. If you only want to remove the Prediction side, use "🚫 Disable Prediction Only" instead.\n\nType the delete password to delete BOTH Prediction & Dream11:`
    : `\n\nEnter the delete password to confirm.\nThe match will be moved to the Recycle Bin and can be restored later if needed.`;

  const input = prompt(`⚠️ Delete "${m.teamA} vs ${m.teamB}"?${warning}`);
  if (input === null) return; // cancelled
  if (input !== MATCH_DELETE_PASSWORD) { showNotif('Wrong password — match not deleted', 'error'); return; }

  // Back up Dream11 data too (if any) so a full delete here is still recoverable as one unit
  if (hasD11) {
    const teamIds = Object.keys(dream11Teams).filter(tid => dream11Teams[tid].matchId === matchId);
    const teamsBackup = {};
    teamIds.forEach(tid => { teamsBackup[tid] = dream11Teams[tid]; });

    deletedDream11Matches[matchId] = { ...dream11Matches[matchId], _deletedAt: getDateTime(), _teamsBackup: teamsBackup };
    await _saveDeletedD11MatchToFirestore(matchId, deletedDream11Matches[matchId]);

    delete dream11Matches[matchId];
    if (window._fbDb && window._fbFns) {
      const { doc, deleteDoc } = window._fbFns;
      try { await deleteDoc(doc(window._fbDb, 'pp_dream11_matches', matchId)); } catch(e){}
    }
    for (const tid of teamIds) {
      delete dream11Teams[tid];
      if (window._fbDb && window._fbFns) {
        const { doc, deleteDoc } = window._fbFns;
        try { await deleteDoc(doc(window._fbDb, 'pp_dream11_teams', tid)); } catch(e){}
      }
    }
    try {
      localStorage.setItem('pp_dream11_matches_cache', JSON.stringify(dream11Matches));
      localStorage.setItem('pp_dream11_teams_cache', JSON.stringify(dream11Teams));
      localStorage.setItem('pp_deleted_dream11_matches_cache', JSON.stringify(deletedDream11Matches));
    } catch(e){}
  }

  // Move match to recycle bin instead of permanent removal
  deletedMatches[matchId] = { ...m, _deletedAt: getDateTime() };
  await _saveDeletedMatchToFirestore(matchId, deletedMatches[matchId]);

  delete matches[matchId];
  await _deleteMatchFromFirestore(matchId);

  try {
    localStorage.setItem('pp_matches_cache', JSON.stringify(matches));
    localStorage.setItem('pp_deleted_matches_cache', JSON.stringify(deletedMatches));
  } catch(e){}

  showNotif(`Match deleted${hasD11 ? ' (+ Dream11 data)' : ''} — moved to Recycle Bin 🗑️`, 'error');
  render();
}

// ── Admin: Disable ONLY the Prediction side of a match, leaving its
//    Dream11 contest fully intact and untouched ─────────────────
async function disablePredictionOnly(matchId) {
  const m = matches[matchId];
  if (!m) return;
  const input = prompt(`Hide "${m.teamA} vs ${m.teamB}" from the Prediction module only?\n\nIts Dream11 contest (if any) will be left exactly as-is. Enter the delete password to confirm.`);
  if (input === null) return;
  if (input !== MATCH_DELETE_PASSWORD) { showNotif('Wrong password — nothing changed', 'error'); return; }

  m.predictionDisabled = true;

// ── Admin: Restore a match from the Recycle Bin ───────────────
async function restoreMatch(matchId) {
  const m = deletedMatches[matchId];
  if (!m) return;
  const hasD11Backup = !!deletedDream11Matches[matchId];
  if (!confirm(`Restore "${m.teamA} vs ${m.teamB}"?${hasD11Backup ? ' Its Dream11 contest will be restored too.' : ''} It will reappear in the Matches list.`)) return;

  const { _deletedAt, ...restored } = m;
  matches[matchId] = restored;
  await _saveMatchToFirestore(matchId, restored);

  delete deletedMatches[matchId];
  await _removeDeletedMatchFromFirestore(matchId);

  // Restore Dream11 data too, if it was deleted alongside this match
  let restoredTeamCount = 0;
  if (hasD11Backup) {
    const dm = deletedDream11Matches[matchId];
    const { _deletedAt: _d, _teamsBackup, ...restoredD11 } = dm;
    dream11Matches[matchId] = restoredD11;
    await _saveDream11MatchToFirestore(matchId, restoredD11);

    const teamIds = Object.keys(_teamsBackup || {});
    for (const tid of teamIds) {
      dream11Teams[tid] = _teamsBackup[tid];
      await _saveDream11TeamToFirestore(tid, _teamsBackup[tid]);
    }
    restoredTeamCount = teamIds.length;

    delete deletedDream11Matches[matchId];
    await _removeDeletedD11MatchFromFirestore(matchId);
  }

  try {
    localStorage.setItem('pp_matches_cache', JSON.stringify(matches));
    localStorage.setItem('pp_deleted_matches_cache', JSON.stringify(deletedMatches));
    localStorage.setItem('pp_dream11_matches_cache', JSON.stringify(dream11Matches));
    localStorage.setItem('pp_dream11_teams_cache', JSON.stringify(dream11Teams));
    localStorage.setItem('pp_deleted_dream11_matches_cache', JSON.stringify(deletedDream11Matches));
  } catch(e){}

  showNotif(`✅ Match restored${hasD11Backup ? ` (+ Dream11${restoredTeamCount ? ` + ${restoredTeamCount} team(s)` : ''})` : ''}`);
  render();
}

// When a Dream11 match goes live, automatically add it to all open tournaments

async function d11AutoAddLiveMatchToTournaments(matchId) {

// Called automatically when admin finalizes scoring for a match.
// Distributes each open custom contest tied to this match: top 3 by points get 50/30/20 of the 90% pool.
async function finalizeCustomContests(matchId) {
  const contests = Object.values(customContests).filter(c => c.matchId === matchId && c.status === 'open');
  if (contests.length === 0) return;

  const savePromises = [];
  for (const cc of contests) {
    const ranked = cc.participants
      .map(email => {
        const u = users[email];
        const pred = u?.predictions?.[matchId];
        return { email, points: pred?.pointsEarned || 0 };
      })
      .sort((a,b) => b.points - a.points);

    const distributable = Math.round(cc.pool * (1 - CUSTOM_CONTEST_COMPANY_SHARE));
    const prizes = {};

    // Pay top 3 (or fewer if contest had fewer players) using the 50/30/20 split,
    // re-normalized if there are fewer than 3 players.
    const payCount = Math.min(3, ranked.length);
    const splitSlice = CUSTOM_CONTEST_SPLIT.slice(0, payCount);
    const splitSum = splitSlice.reduce((a,b)=>a+b, 0);

    for (let i = 0; i < payCount; i++) {
      const share = splitSlice[i] / splitSum; // re-normalize so it always sums to 100%
      const amount = Math.round(distributable * share);
      if (amount <= 0) continue;
      prizes[ranked[i].email] = amount;
      // Credit prize server-side (wallet.js verifies admin token)
      savePromises.push(_adminWalletPrize(ranked[i].email, amount, 'custom_prize', matchId, cc.code));
    }

    cc.prizes = prizes;
    cc.status = 'completed';
    savePromises.push(_saveCustomContestToFirestore(cc.id, cc));
  }

  await Promise.all(savePromises);
  try {
    localStorage.setItem('pp_custom_contests_cache', JSON.stringify(customContests));
    localStorage.setItem('pp_users_cache', JSON.stringify(users));
  } catch(e){}
}

// ── Admin: Manual correct/wrong override for a single user's single answer ──
async function toggleAnswerOverride(email, qId) {
  const m = matches[activeMatchId];
  const u = users[email];
  if (!m || !u || !u.predictions || !u.predictions[activeMatchId]) return;

  const pred = u.predictions[activeMatchId];
  const q = m.questions.find(x => x.id === qId);
  if (!q) return;

  const pAns = (pred.answers?.[qId] || '').toString().trim();
  const correctAns = (q.correctAnswer || '').toString().trim();
  const autoCorrect = q.type === 'text'
    ? isFuzzyAnswerMatch(pAns, correctAns)
    : pAns.toLowerCase() === correctAns.toLowerCase();

  if (!pred.overrides) pred.overrides = {};

  // Determine current effective state (override if present, else auto)
  const currentlyCorrect = (qId in pred.overrides) ? pred.overrides[qId] : autoCorrect;
  const newCorrect = !currentlyCorrect;

  // If new state matches the auto-computed state, clear the override (back to automatic)
  if (newCorrect === autoCorrect) {
    delete pred.overrides[qId];
  } else {
    pred.overrides[qId] = newCorrect;
  }

  // Recompute this question's points contribution
  const oldEarnedForQ = currentlyCorrect ? (q.points || 0) : 0;
  const newEarnedForQ = newCorrect ? (q.points || 0) : 0;
  const diff = newEarnedForQ - oldEarnedForQ;

  pred.pointsEarned = Math.max(0, (pred.pointsEarned || 0) + diff);
  pred.manuallyAdjusted = true;
  u.points = Math.max(0, (u.points || 0) + diff);
  u.predictions[activeMatchId] = pred;

  await _saveUserToFirestore(email, u);

  try {
    localStorage.setItem('pp_users_cache', JSON.stringify(users));
  } catch(e){}

  if (currentUser && currentUser.email === email) {
    currentUser.points = u.points;
    currentUser.predictions = u.predictions;
  }

  showNotif(`${newCorrect ? '✅ Marked Correct' : '❌ Marked Wrong'} for ${u.name} (${diff>=0?'+':''}${diff} pts)`);
  render();
}

async function finalizeScoring() {
  const m = matches[activeMatchId];
  if (!m) return;

  // Capture text-type correct answers from inputs
  m.questions.forEach(q => {
    if (q.type === 'text') {
      const el = document.getElementById('sc-text-'+q.id);
      if (el) scoringDraft[q.id] = el.value.trim();
    }
  });

  for (const q of m.questions) {
    if (!scoringDraft[q.id]) return showNotif('Please set the correct answer for all questions', 'error');
  }

  // Save correct answers onto match
  m.questions.forEach(q => { q.correctAnswer = scoringDraft[q.id]; });
  m.status = 'completed';
  await _saveMatchToFirestore(activeMatchId, m);

  // Score every user who submitted a prediction for this match
  // (covers Mega/Free participants AND H2H-only joiners, since H2H doesn't add to m.participants)
  const savePromises = [];
  const predictorEmails = new Set([
    ...(m.participants || []),
    ...Object.entries(users).filter(([,u]) => u.predictions && u.predictions[activeMatchId]).map(([e]) => e)
  ]);
  for (const email of predictorEmails) {
    const u = users[email];
    if (!u || !u.predictions || !u.predictions[activeMatchId]) continue;
    const pred = u.predictions[activeMatchId];
    if (pred.scored) continue; // avoid double-scoring

    let earned = 0;
    m.questions.forEach(q => {
      const userAns = (pred.answers[q.id]||'').toString().trim();
      const correctAns = (q.correctAnswer||'').toString().trim();
      if (!userAns || !correctAns) return;
      if (q.type === 'text') {
        if (isFuzzyAnswerMatch(userAns, correctAns)) earned += (q.points||0);
      } else {
        if (userAns.toLowerCase() === correctAns.toLowerCase()) earned += (q.points||0);
      }
    });

    pred.pointsEarned = earned;
    pred.scored = true;
    u.points = (u.points || 0) + earned;
    u.predictions[activeMatchId] = pred;

    savePromises.push(_saveUserToFirestore(email, u));
  }
  await Promise.all(savePromises); // Save all users in parallel

  try {
    localStorage.setItem('pp_matches_cache', JSON.stringify(matches));
    localStorage.setItem('pp_users_cache', JSON.stringify(users));
  } catch(e){}

  // Refresh current user's points if they were a participant
  if (users[currentUser.email]) {
    currentUser.points = users[currentUser.email].points;
    currentUser.predictions = users[currentUser.email].predictions;
  }

  showNotif('Match scored! Points credited to all participants 🎉');
  scoringDraft = {};

  // Finalize H2H contests for this match
  await finalizeH2HContests(activeMatchId);
  try { localStorage.setItem('pp_h2h_cache', JSON.stringify(h2hContests)); } catch(e){}

  // Finalize user-created custom contests for this match
  await finalizeCustomContests(activeMatchId);

  adminTab = 'matches';
  render();
}

// ── Per-user match history + winning ratio (Top 10 finishes / total matches played) ──
function getUserMatchHistoryStats(email) {
  const u = users[email];
  if (!u) return { history: [], totalPlayed: 0, top10Count: 0, winRatio: 0 };

  const matchIds = Object.keys(u.predictions || {});
  const history = matchIds.map(mId => {
    const m = matches[mId];
    if (!m) return null;
    const myPred = u.predictions[mId];

    // Rank this user among everyone who predicted this match (by pointsEarned)
    const allPreds = Object.entries(users)
      .filter(([,ou]) => ou.predictions && ou.predictions[mId])
      .map(([oe,ou]) => ({ email: oe, points: ou.predictions[mId].pointsEarned || 0 }))
      .sort((a,b) => b.points - a.points);
    const rank = allPreds.findIndex(p => p.email === email) + 1;

    return {
      matchId: mId,
      teamA: m.teamA, teamB: m.teamB, sport: m.sport, status: m.status,
      points: myPred.pointsEarned || 0,
      scored: myPred.scored || false,
      rank: rank || null,
      totalPlayers: allPreds.length,
      isTop10: rank > 0 && rank <= 10,
      submittedAt: myPred.submittedAt
    };
  }).filter(Boolean).sort((a,b) => (b.submittedAt||'').localeCompare(a.submittedAt||''));

  const scoredHistory = history.filter(h => h.scored);
  const top10Count = scoredHistory.filter(h => h.isTop10).length;
  const winRatio = scoredHistory.length > 0 ? Math.round((top10Count / scoredHistory.length) * 100) : 0;

  return { history, totalPlayed: history.length, top10Count, winRatio };
}

// ── Per-user Dream11 match history + win ratio ─────────────────
// A match "Win" counts if the user finishes Top 5 of a contest they joined
// (Free or Mega) when that contest has under 15 joiners, or Top 10 when it
// has 15+ joiners. Ranking is by Dream11 team totalPoints among that
// contest's own participants. If a user joined both Free & Mega for the
// same match, qualifying in either one counts the match as a Win.
function getUserD11MatchHistoryStats(email) {
  // Also include matches where user submitted a team (covers old data where participant arrays may be missing)
  const teamMatchIds = Object.values(dream11Teams)
    .filter(t => t.userEmail === email)
    .map(t => t.matchId);
  const matchIds = Array.from(new Set([
    ...Object.keys(dream11Matches).filter(mId => {
      const d11m = dream11Matches[mId];
      return (d11m.freeParticipants||[]).includes(email) || (d11m.megaParticipants||[]).includes(email);
    }),
    ...teamMatchIds.filter(mId => !!dream11Matches[mId])
  ]));

  const history = matchIds.map(mId => {
    const m = matches[mId];
    const d11m = dream11Matches[mId];
    if (!m || !d11m) return null;

    const myTeam = d11GetUserTeam(mId, email);
    const myPoints = myTeam?.totalPoints || 0;

    const joinedFree = (d11m.freeParticipants||[]).includes(email);
    const joinedMega = (d11m.megaParticipants||[]).includes(email);

    function rankWithin(participantEmails) {
      const ranked = participantEmails
        .map(e => ({ email: e, points: d11GetUserTeam(mId, e)?.totalPoints || 0 }))
        .sort((a,b) => b.points - a.points);
      const rank = ranked.findIndex(p => p.email === email) + 1;
      const threshold = ranked.length >= 15 ? 10 : 5;
      return { rank: rank || null, total: ranked.length, isWin: rank > 0 && rank <= threshold, threshold };
    }

    const freeRank = joinedFree ? rankWithin(d11m.freeParticipants||[]) : null;
    const megaRank = joinedMega ? rankWithin(d11m.megaParticipants||[]) : null;

    const isWin = (freeRank?.isWin) || (megaRank?.isWin) || false;
    const bestRank = [freeRank, megaRank].filter(Boolean).sort((a,b)=>(a.rank||999)-(b.rank||999))[0];

    return {
      matchId: mId,
      teamA: m.teamA, teamB: m.teamB, sport: m.sport, status: m.status,
      points: myPoints,
      scored: !!d11m.scored,
      joinedFree, joinedMega,
      freeRank, megaRank,
      rank: bestRank?.rank || null,
      totalPlayers: bestRank?.total || 0,
      threshold: bestRank?.threshold || 5,
      isWin,
      submittedAt: myTeam?.submittedAt || ''
    };
  }).filter(Boolean).sort((a,b) => (b.submittedAt||'').localeCompare(a.submittedAt||''));

  const scoredHistory = history.filter(h => h.scored);
  const winCount = scoredHistory.filter(h => h.isWin).length;
  const winRatio = scoredHistory.length > 0 ? Math.round((winCount / scoredHistory.length) * 100) : 0;

  return { history, totalPlayed: history.length, winCount, winRatio };
}

// ─── H2H Contest Logic ──────────────────────────────────────
function newH2HContest(matchId) {
  return {
    id: uid(), matchId,
    player1: null, player2: null, // { email, name, predictions, submittedAt }
    status: 'open', // 'open' | 'full' | 'completed'
    createdAt: getDateTime(),
    winnerId: null,
    entryFee: H2H_ENTRY_FEE,
    prizePool: H2H_PRIZE_POOL,
    winnerPrize: H2H_WINNER_PRIZE
  };
}

// Get open H2H contests for a match, or create one if needed
function getH2HContestsForMatch(matchId) {
  return Object.values(h2hContests).filter(c => c.matchId === matchId);
}

function hasUserJoinedH2H(matchId, email) {
  return Object.values(h2hContests).some(c =>
    c.matchId === matchId && (c.player1?.email === email || c.player2?.email === email)
  );
}

async function joinH2HContest(matchId) {
  const u = users[currentUser.email];
  if (!u) return;

  // Check balance
  if ((u.balance || 0) < H2H_ENTRY_FEE) {
    return showNotif(`Minimum Rs ${H2H_ENTRY_FEE} balance required to join H2H Contest. Please deposit first.`, 'error');
  }

  // Check if already joined H2H for this match
  if (hasUserJoinedH2H(matchId, currentUser.email)) {
    return showNotif('You already joined an H2H contest for this match!', 'error');
  }

  // Check if prediction submitted
  if (!u.predictions?.[matchId]) {
    return showNotif('Please submit your match prediction first before joining H2H!', 'error');
  }

  // Deduct entry fee server-side first
  const result = await _walletCall({ action: 'join_h2h', matchId, entryFee: H2H_ENTRY_FEE });
  if (!result) return;

  // Update local state from server response
  u.balance = result.balance;
  u.transactions = result.transactions;
  currentUser.balance = result.balance;
  currentUser.transactions = result.transactions;

  // Find open H2H contest for this match (with slot available)
  let openContest = Object.values(h2hContests).find(c => c.matchId === matchId && c.status === 'open' && !c.player2);

  const playerData = {
    email: currentUser.email,
    name: u.name,
    submittedAt: getDateTime()
  };

  if (!openContest) {
    // Create new H2H contest
    openContest = newH2HContest(matchId);
    openContest.player1 = playerData;
    h2hContests[openContest.id] = openContest;
  } else {
    // Join existing as player2
    openContest.player2 = playerData;
    openContest.status = 'full';
    h2hContests[openContest.id] = openContest;

    // Auto-create next H2H slot for the same match
    const nextContest = newH2HContest(matchId);
    h2hContests[nextContest.id] = nextContest;
    await _saveH2HToFirestore(nextContest.id, nextContest);
    showNotif(`H2H Contest joined! Rs ${H2H_ENTRY_FEE} deducted. New H2H slot auto-created for others. 🥊`);
  }

  await _saveH2HToFirestore(openContest.id, openContest);
  try {
    localStorage.setItem('pp_h2h_cache', JSON.stringify(h2hContests));
    localStorage.setItem('pp_users_cache', JSON.stringify(users));
  } catch(e){}

  if (openContest.status !== 'full') showNotif(`H2H Contest joined! Rs ${H2H_ENTRY_FEE} deducted. Waiting for opponent... 🥊`);
  render();
}

async function finalizeH2HContests(matchId) {
  const m = matches[matchId];
  if (!m || m.status !== 'completed') return;

  const contested = Object.values(h2hContests).filter(c => c.matchId === matchId && c.status === 'full');

  for (const contest of contested) {
    if (contest.status === 'completed') continue;

    const p1 = users[contest.player1?.email];
    const p2 = users[contest.player2?.email];
    if (!p1 || !p2) continue;

    const p1Pred = p1.predictions?.[matchId];
    const p2Pred = p2.predictions?.[matchId];

    const p1Score = p1Pred?.pointsEarned || 0;
    const p2Score = p2Pred?.pointsEarned || 0;

    let winnerId = null;
    if (p1Score > p2Score) winnerId = contest.player1.email;
    else if (p2Score > p1Score) winnerId = contest.player2.email;
    else winnerId = 'draw';

    contest.status = 'completed';
    contest.winnerId = winnerId;
    contest.p1Score = p1Score;
    contest.p2Score = p2Score;

    // Pay winner
    if (winnerId && winnerId !== 'draw') {
      const winner = users[winnerId];
      if (winner) winner.h2hWins = (winner.h2hWins || 0) + 1;
      // Credit prize server-side
      await _adminWalletPrize(winnerId, H2H_WINNER_PRIZE, 'h2h_prize', matchId, 'H2H win');
      if (winner) await _saveUserToFirestore(winnerId, winner); // persist h2hWins only
    } else if (winnerId === 'draw') {
      // Refund both on draw server-side
      await _adminWalletRefund(contest.player1.email, H2H_ENTRY_FEE, matchId, 'H2H draw refund');
      await _adminWalletRefund(contest.player2.email, H2H_ENTRY_FEE, matchId, 'H2H draw refund');
    }

    await _saveH2HToFirestore(contest.id, contest);
    h2hContests[contest.id] = contest;
  }

  // Remove empty open H2H slots created for this match if match is now complete
  for (const [id, c] of Object.entries(h2hContests)) {
    if (c.matchId === matchId && c.status === 'open') {
      if (!c.player1 && !c.player2) {
        // Empty slot — refund not needed, just mark inactive
        c.status = 'cancelled';
        await _saveH2HToFirestore(id, c);
        h2hContests[id] = c;
      } else if (c.player1 && !c.player2) {
        // Only one player — refund them server-side
        c.status = 'cancelled';
        c.refunded = true;
        await _adminWalletRefund(c.player1.email, H2H_ENTRY_FEE, c.matchId, 'H2H no opponent refund');
        await _saveH2HToFirestore(id, c);
        h2hContests[id] = c;
      }
    }
  }

  try { localStorage.setItem('pp_h2h_cache', JSON.stringify(h2hContests)); } catch(e){}
}
</script>

async function submitDeposit() {

  if (!amount || amount <= 0) return showNotif('Please enter a valid amount', 'error');

  const receiptData = window._depositReceiptData || null;
  if (!receiptData) return showNotif('Please upload your payment receipt screenshot', 'error');

  if (!window._fbGetIdToken) return showNotif('Connection error — please try again', 'error');
  const idToken = await window._fbGetIdToken();
  if (!idToken) return showNotif('Session expired — please log in again', 'error');

  try {
    const resp = await fetch('/.netlify/functions/wallet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },

        action: 'submit_deposit', idToken, method, amount,

      })
    });
    const data = await resp.json();
    if (!resp.ok || data.error) return showNotif(data.error || 'Could not submit deposit', 'error');

    currentUser.transactions = data.transactions;
    try { localStorage.setItem('pp_users_cache', JSON.stringify(users)); } catch(e){}

// ── Generic server-side wallet call (user actions) ──────────
// Returns parsed JSON data on success, or null on failure (shows notif).
async function _walletCall(payload) {
  if (!window._fbGetIdToken) { showNotif('Connection error — please try again', 'error'); return null; }
  const idToken = await window._fbGetIdToken();
  if (!idToken) { showNotif('Session expired — please log in again', 'error'); return null; }
  try {
    const resp = await fetch('/.netlify/functions/wallet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...payload, idToken })
    });
    const data = await resp.json();
    if (!resp.ok || data.error) { showNotif(data.error || 'Action failed', 'error'); return null; }
    return data;
  } catch (e) {
    showNotif('Action failed — please check your connection', 'error');
    return null;
  }
}

// ─── Admin: approve/reject deposit & withdraw ───────────────
// These now call the secure server-side wallet function, which independently
// verifies the caller is the admin before touching any balance.
async function _adminWalletAction(action, email, txId) {
  if (!window._fbGetIdToken) { showNotif('Connection error', 'error'); return null; }
  const idToken = await window._fbGetIdToken();
  if (!idToken) { showNotif('Session expired — please log in again', 'error'); return null; }
  try {
    const resp = await fetch('/.netlify/functions/wallet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, idToken, email, txId })
    });
    const data = await resp.json();
    if (!resp.ok || data.error) { showNotif(data.error || 'Action failed', 'error'); return null; }
    return data;
  } catch (e) {
    showNotif('Action failed — please check your connection', 'error');
    return null;
  }
}

// Credit a prize amount to any user's balance (admin-only, verified server-side)
async function _adminWalletPrize(email, amount, txType, matchId, note) {
  if (!window._fbGetIdToken) return;

  if (!idToken) return;
  try {

}

// Refund an entry fee to a user (admin-only, verified server-side)

async function adminApproveDeposit(email, txId) {

function getAllPendingDeposits() {

function refreshAdminPanel() {
  const page = document.querySelector('.page');
  if (page && isAdmin()) page.innerHTML = renderAdminPanel();
}

function handleReceiptUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    // Compress image to max 800px / 0.7 quality to stay under Firestore 1MB doc limit
    const img = new Image();
    img.onload = function() {
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.7);
      window._depositReceiptData = compressed;
      const wrap = document.getElementById('receipt-preview-wrap');
      if (wrap) {
        wrap.innerHTML = '<img src="' + compressed + '" class="receipt-preview" /><div style="font-size:12px;color:#4ade80;font-weight:600">✅ Receipt uploaded</div>';
      }
      showNotif('Receipt uploaded ✓', 'success');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
</script>

    ${authMode==='register' ? `
    <div class="mb18">
      <label class="label">Referral Code (Optional)</label>
      <input class="input" id="a-ref" placeholder="e.g. ABCD1234" style="text-transform:uppercase" />
    </div>`:''}

    <button class="btn-primary btn-orange" onclick="${authMode==='login'?'handleLogin()':'handleRegister()'}">
      ${authMode==='login'?'Login →':'Create Account →'}
    </button>

    ${authMode==='login' ? `
    <div style="text-align:center;margin-top:14px">
      <button onclick="switchAuthMode('forgot')" style="background:none;border:none;color:var(--dim);font-size:12.5px;cursor:pointer;text-decoration:underline">🔒 Forgot password?</button>
    </div>` : ''}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// MAIN RENDER ROUTER
// ═══════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  if (!currentUser) {
    app.innerHTML = renderAuth();
    return;
  }

  app.innerHTML = `
    ${renderHeader()}
    <div class="page">
      ${isAdmin() && tab==='home' ? renderAdminPanel() : ''}
      ${!isAdmin() && tab==='home' ? renderHome() : ''}
      ${tab==='matches' ? renderMatchesList() : ''}
      ${tab==='matchDetail' ? renderMatchDetail() : ''}
      ${tab==='contest' ? renderContest() : ''}
      ${tab==='h2h' ? renderH2HContest() : ''}
      ${tab==='dream11' ? renderDream11Hub() : ''}
      ${tab==='dream11Pool' ? renderDream11AdminPool() : ''}
      ${tab==='dream11Build' ? renderDream11BuildTeam() : ''}
      ${tab==='dream11JoinContest' ? renderD11JoinContest() : ''}
      ${tab==='dream11Tournaments' ? renderD11Tournaments() : ''}
      ${tab==='dream11TournamentDetail' ? renderD11TournamentDetail() : ''}
      ${tab==='utHub' ? renderUtHub() : ''}
      ${tab==='utDashboard' && utShowTournamentLb ? renderUtTournamentLeaderboardScreen() : tab==='utDashboard' ? renderUtDashboard() : ''}
      ${tab==='utMatchManage' ? renderUtMatchManage() : ''}
      ${tab==='utTeamsManage' ? renderUtTeamsManage() : ''}
      ${tab==='utBuildTeam' ? renderUtBuildTeam() : ''}
      ${tab==='utLeaderboard' ? renderUtLeaderboard() : ''}
      ${tab==='utViewTeam' ? renderUtViewTeam() : ''}
      ${tab==='dream11Leaderboard' ? renderDream11Leaderboard() : ''}
      ${tab==='dream11ViewTeam' ? renderDream11ViewTeam() : ''}
      ${tab==='leaderboard' ? renderGlobalLeaderboard() : ''}
      ${tab==='profile' ? renderProfile() : ''}
      ${tab==='viewProfile' ? renderViewProfile() : ''}
      ${tab==='deposit' ? renderDeposit() : ''}
      ${tab==='withdraw' ? renderWithdraw() : ''}
      ${tab==='history' ? renderHistory() : ''}
      ${tab==='referral' ? renderReferral() : ''}
      ${tab==='viewPrediction' ? renderViewPrediction() : ''}
    </div>
    ${renderBottomNav()}
  `;
}

function goTab(t) {
  tab = t;
  render();
  window.scrollTo(0,0);
  // Auto-refresh Dream11 data from Firestore when user opens the Dream11 tab
  // so admin publish/unpublish is visible immediately without a full page reload
  if (t === 'dream11') {
    _loadAllDream11MatchesFromFirestore().then(() => render()).catch(() => {});
  }
}
</script>

<script>

// HEADER & NAV
// ═══════════════════════════════════════════════════════════

}

function renderBottomNav() {
  if (isAdmin()) {
    return `
    <div id="bottom-nav">
      ${navItem('home','🏠','Panel')}

}

function navItem(t, icon, label) {
  const iconHtml = t === 'dream11' ? `<span class="nav-ball"></span>` : `<span class="nav-icon">${icon}</span>`;
  return `
  <div class="nav-item ${tab===t?'active':''}" onclick="goTab('${t}')">
    ${iconHtml}
    <span class="nav-label">${label}</span>
