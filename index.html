}
</script>

<script>
// ═══════════════════════════════════════════════════════════
// HOME (User Dashboard)
// ═══════════════════════════════════════════════════════════
function renderHome() {
  const u = users[currentUser.email] || currentUser;
  // Exclude Dream11-only matches (no prediction questions) — those belong in the Dream11 tab
  const upcoming = Object.values(matches).filter(m => m.status !== 'completed' && !m.predictionDisabled && (m.questions && m.questions.length > 0)).sort((a,b)=>a.deadline-b.deadline);
  const myJoined = (u.matchesJoined||[]).length;

  return `
  <div class="stat-grid mb14">
    <div class="stat-box">
      <div class="stat-val" style="color:var(--gold)">${u.points||0}</div>
      <div class="stat-lbl">Total Points</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" style="color:var(--blue-l)">${myJoined}</div>
      <div class="stat-lbl">Matches Joined</div>
    </div>
  </div>

  <div class="card mb18" style="background:linear-gradient(135deg,rgba(37,99,235,0.13),rgba(249,115,22,0.08));border-color:rgba(37,99,235,0.3)">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:12px;color:var(--dim);font-weight:600">Wallet Balance</div>
        <div class="display" style="font-size:26px;color:#fff;margin-top:2px">Rs ${(u.balance||0).toFixed(2)}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="goTab('deposit')" style="background:rgba(22,163,74,0.15);border:1px solid rgba(22,163,74,0.35);color:#4ade80;padding:9px 14px;border-radius:10px;font-size:12px;font-weight:700">⬇ Deposit</button>
        <button onclick="goTab('withdraw')" style="background:rgba(220,38,38,0.12);border:1px solid rgba(220,38,38,0.3);color:#f87171;padding:9px 14px;border-radius:10px;font-size:12px;font-weight:700">⬆ Withdraw</button>
      </div>
    </div>
  </div>

  ${(() => {
    // Show published Dream11 matches on home screen as individual cards
    const publishedD11 = Object.values(matches).filter(m => {
      const d11m = dream11Matches[m.id];
      return d11m && d11m.published && d11m.players.length >= D11_TEAM_SIZE && !d11m.scored;
    });
    if (publishedD11.length === 0) return '';
    return `<div class="section-title" style="margin-bottom:10px">🎮 Dream11 Contests</div>
    ${publishedD11.map(m => {
      const d11m = dream11Matches[m.id];
      const myTeam = Object.values(dream11Teams).find(t => t.matchId === m.id && t.userEmail === currentUser.email);
      const dLocked = isD11Locked(m.id);
      const deadlineStr = m.deadline ? new Date(m.deadline).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
      const fmtBadge = m.format ? `<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.3);color:#fbbf24;margin-right:6px">🏏 ${m.format}</span>` : '';
      return `<div class="card mb14" style="border-color:rgba(192,132,252,0.4);background:linear-gradient(135deg,rgba(192,132,252,0.08),rgba(37,99,235,0.05))">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div class="match-teams" style="gap:8px">
            <span class="team-name" style="font-size:14px">${m.teamA||'TBD'}</span>
            <span class="vs-badge" style="font-size:10px;padding:2px 8px">VS</span>
            <span class="team-name" style="font-size:14px">${m.teamB||'TBD'}</span>
          </div>
          ${dLocked ? `<span class="match-status status-live">LOCKED</span>` : `<span class="match-status status-upcoming">OPEN</span>`}
        </div>
        ${fmtBadge ? `<div style="margin-bottom:6px">${fmtBadge}</div>` : ''}
        ${deadlineStr && !dLocked ? `<div style="font-size:11px;color:var(--orange);margin-bottom:10px">⏰ Deadline: ${deadlineStr}</div>` : ''}
        ${myTeam
          ? `<button class="btn-secondary btn-block" style="font-size:12px;padding:9px" onclick="openDream11ViewTeam('${myTeam.id}')">👁 My Team ${myTeam.totalPoints?'· '+myTeam.totalPoints+' pts':''}</button>`
          : !dLocked
            ? `<button class="btn-primary btn-block" style="font-size:12px;padding:9px;background:linear-gradient(135deg,#a855f7,#7c3aed)" onclick="openDream11Match('${m.id}')">🎮 Build My Dream11 Team</button>`
            : `<div style="text-align:center;font-size:12px;color:var(--dim);padding:8px">🔒 Contest locked — joining closed</div>`
        }
      </div>`;
    }).join('')}`;
  })()}

  <div class="section-title">🔥 Upcoming & Live Matches</div>
  ${upcoming.length === 0 ? `
  <div class="empty-state"><div class="empty-icon">⚽</div>No matches available right now.<br/>Check back soon!</div>` :
  upcoming.slice(0,5).map(m => matchSlipCard(m)).join('')}

  ${upcoming.length > 0 ? `<button class="btn-secondary btn-block mb14" onclick="goTab('matches')">View All Matches →</button>` : ''}
  `;
}

function matchSlipCard(m) {
  const hasJoined = (currentUser.matchesJoined||[]).includes(m.id);
  const deadlinePassed = isDeadlinePassed(m);
  const fmtLabel = m.sport==='cricket' && m.format ? m.format : ''; const sportTag = m.sport === 'cricket' ? `<span class="match-sport-tag tag-cricket">🏏 ${fmtLabel||'Cricket'}</span>` : `<span class="match-sport-tag tag-football">⚽ Football</span>`;
  let statusTag = '';
  if (m.status === 'live') statusTag = `<span class="match-status status-live">● LIVE</span>`;
  else if (m.status === 'completed') statusTag = `<span class="match-status status-completed">FINISHED</span>`;
  else statusTag = `<span class="match-status status-upcoming">UPCOMING</span>`;

  const deadlineDate = new Date(m.deadline);
  const deadlineStr = deadlineDate.toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });

  return `
  <div class="match-slip" onclick="openMatch('${m.id}')">
    <div class="match-slip-top">
      ${sportTag}
      ${statusTag}
    </div>
    <div class="match-slip-body">
      <div class="match-teams">
        <div class="team-name">${m.teamA||'TBD'}</div>
        <div class="vs-badge">VS</div>
        <div class="team-name">${m.teamB||'TBD'}</div>
      </div>
      <div class="match-meta">
        <span>📋 ${(m.questions||[]).length} Questions</span>
        <span>👥 ${(m.participants||[]).length} Joined</span>
      </div>
      ${m.status!=='completed' ? `
      <div class="match-deadline">
        ${deadlinePassed ? '🔒 Predictions Closed' : `⏰ Deadline: ${deadlineStr}`}
      </div>` : ''}
      ${hasJoined ? `<div style="text-align:center;margin-top:8px"><span class="pill pill-points" style="font-size:10px">✓ You Joined</span></div>` : ''}
    </div>
    <div class="slip-perf"></div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// MATCHES LIST (all matches, filterable)
// ═══════════════════════════════════════════════════════════
function renderMatchesList() {
  // Exclude Dream11-only matches (no prediction questions) — they live in the Dream11 tab
  const all = Object.values(matches).filter(m => !m.predictionDisabled && (m.questions && m.questions.length > 0)).sort((a,b)=>b.deadline-a.deadline);
  const upcoming = all.filter(m=>m.status==='upcoming');
  const live = all.filter(m=>m.status==='live');
  const completed = all.filter(m=>m.status==='completed');

  return `
  <div class="section-title">⚽ All Matches</div>
  ${all.length===0 ? `<div class="empty-state"><div class="empty-icon">📭</div>No matches yet.</div>` : `
  ${live.length>0 ? `<div style="font-size:12px;font-weight:700;color:#f87171;margin-bottom:8px">● LIVE NOW</div>${live.map(m=>matchSlipCard(m)).join('')}` : ''}
  ${upcoming.length>0 ? `<div style="font-size:12px;font-weight:700;color:var(--gold);margin:14px 0 8px">UPCOMING</div>${upcoming.map(m=>matchSlipCard(m)).join('')}` : ''}
  ${completed.length>0 ? `<div style="font-size:12px;font-weight:700;color:var(--dim);margin:14px 0 8px">COMPLETED</div>${completed.map(m=>matchSlipCard(m)).join('')}` : ''}
  `}`;
}
</script>

<script>
// ═══════════════════════════════════════════════════════════
// MATCH DETAIL — Prediction Submission Screen
// ═══════════════════════════════════════════════════════════
function renderMatchDetail() {
  const m = matches[activeMatchId];
  if (!m) return `<div class="empty-state">Match not found.</div>`;

  const hasJoined = (currentUser.matchesJoined||[]).includes(m.id);
  const myPred = currentUser.predictions?.[m.id];
  const deadlinePassed = isDeadlinePassed(m);
  const canEdit = !deadlinePassed && m.status !== 'completed';
  const fmtLabel = m.sport==='cricket' && m.format ? m.format : ''; const sportTag = m.sport === 'cricket' ? `<span class="match-sport-tag tag-cricket">🏏 ${fmtLabel||'Cricket'}</span>` : `<span class="match-sport-tag tag-football">⚽ Football</span>`;
  const deadlineDate = new Date(m.deadline);
  const deadlineStr = deadlineDate.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });

  return `
  <button class="btn-secondary mb14" style="width:auto;padding:9px 16px" onclick="goTab('matches')">← Back</button>

  <div class="match-slip mb18" style="cursor:default">
    <div class="match-slip-top">${sportTag}
      ${m.status==='live'?'<span class="match-status status-live">● LIVE</span>':m.status==='completed'?'<span class="match-status status-completed">FINISHED</span>':'<span class="match-status status-upcoming">UPCOMING</span>'}
    </div>
    <div class="match-slip-body">
      <div class="match-teams">
        <div class="team-name">${m.teamA}</div>
        <div class="vs-badge">VS</div>
        <div class="team-name">${m.teamB}</div>

      <div class="match-meta"><span>📋 ${m.questions.length} Questions</span><span>👥 ${m.participants.length} Joined</span></div>
      <div class="match-deadline">${deadlinePassed ? '🔒 Predictions Closed' : `⏰ Deadline: ${deadlineStr}`}</div>
    </div>
    <div class="slip-perf"></div>
  </div>

  ${myPred?.scored ? `
  <div class="card mb18" style="background:rgba(22,163,74,0.1);border-color:rgba(22,163,74,0.3);text-align:center">
    <div style="font-size:12px;color:var(--dim);font-weight:600">Your Score for this Match</div>
    <div class="display" style="font-size:32px;color:#4ade80;margin-top:4px">${myPred.pointsEarned} pts</div>
  </div>` : ''}

  ${m.status === 'completed' && m.participants.length > 1 ? `
  <div class="card mb14" style="background:rgba(37,99,235,0.07);border-color:rgba(37,99,235,0.25)">

      ${m.participants.filter(e => e !== currentUser.email && users[e]).map(e => `
      <button onclick="openViewPrediction('${m.id}','${e}')"
        style="background:rgba(255,255,255,0.05);border:1px solid var(--card-b);color:var(--text);padding:7px 12px;border-radius:9px;font-size:12px;font-weight:600">
        👤 ${users[e]?.name || e.split('@')[0]}
      </button>`).join('')}

  ${!canEdit && !myPred ? `
  <div class="empty-state"><div class="empty-icon">🔒</div>Predictions are closed for this match.</div>` : `

  <div class="section-title">📝 Your Predictions</div>
  ${m.questions.map((q,idx) => questionCard(q, idx, m, canEdit, myPred)).join('')}

  ${canEdit ? `

    ${myPred ? 'Update Prediction' : 'Submit Prediction 📝'}

  ${myPred ? renderContestChoices(m) : ''}

function renderContestChoices(m) {
  const deadlinePassed = isDeadlinePassed(m);
  const inMega = (m.megaParticipants||[]).includes(currentUser.email);
  const inFree = (m.freeParticipants||[]).includes(currentUser.email);
  const inH2H = hasUserJoinedH2H(m.id, currentUser.email);
  const myCustomContests = Object.values(customContests).filter(c => c.matchId === m.id && c.participants.includes(currentUser.email));

  return `
  <div class="section-title">🏟️ Join a Contest</div>

  <div class="card mb12" style="background:linear-gradient(135deg,rgba(251,191,36,0.1),rgba(249,115,22,0.05));border-color:rgba(251,191,36,0.25)">

        ? `<span style="font-size:11px;font-weight:700;color:#4ade80">✅ Joined</span>`

          ? `<span style="font-size:11px;color:var(--dim)">🔒 Closed</span>`
          : `<button class="btn-primary btn-orange" style="width:auto;padding:9px 16px;font-size:12px" onclick="joinH2HContest('${m.id}')">Join Rs ${H2H_ENTRY_FEE}</button>`

    </div>
  </div>

  <div class="card mb12" style="background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.25)">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-weight:700;font-size:14px">🎁 Free Contest</div>
        <div style="font-size:11px;color:var(--dim);margin-top:2px">Free entry • ${(m.freeParticipants||[]).length} joined • Admin gives rewards</div>

      ${inFree
        ? `<span style="font-size:11px;font-weight:700;color:#4ade80">✅ Joined</span>`
        : deadlinePassed
          ? `<span style="font-size:11px;color:var(--dim)">🔒 Closed</span>`
          : `<button class="btn-secondary" style="width:auto;padding:9px 16px;font-size:12px;color:#4ade80;border-color:rgba(34,197,94,0.3)" onclick="joinFreeContest('${m.id}')">Join Free</button>`
      }
    </div>
  </div>

  ${renderCustomContestSection(m, deadlinePassed, myCustomContests)}
  `;
}

// ── User-created contest section: create new + join via code + my contests for this match ──
function renderCustomContestSection(m, deadlinePassed, myCustomContests) {
  return `
  <div class="card mb12" style="background:rgba(168,85,247,0.08);border-color:rgba(168,85,247,0.3)">

    ${deadlinePassed ? `<span style="font-size:11px;color:var(--dim)">🔒 Closed — deadline passed</span>` : `
    <div style="display:flex;gap:8px">
      <input class="input" id="cc-code-${m.id}" placeholder="e.g. PPC-AB12CD" style="flex:1;text-transform:uppercase" />
      <button class="btn-secondary" style="width:auto;padding:9px 16px;font-size:12px;color:#c084fc;border-color:rgba(168,85,247,0.3)" onclick="handleJoinCustomContest('${m.id}')">Join</button>
    </div>`}
  </div>

  ${myCustomContests.length > 0 ? `
  <div class="section-title" style="margin-top:4px">🛠️ Your Custom Contests (this match)</div>
  ${myCustomContests.map(cc => `
  <div class="card mb10" style="background:rgba(168,85,247,0.06);border-color:rgba(168,85,247,0.25)">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px">
          ${cc.code}
          <button onclick="navigator.clipboard.writeText('${cc.code}').then(()=>showNotif('Code copied!'))" style="background:none;border:none;color:#c084fc;font-size:11px;cursor:pointer">📋</button>
        </div>
        <div style="font-size:11px;color:var(--dim);margin-top:2px">Entry Rs ${cc.entryFee} • ${cc.participants.length}/${CUSTOM_CONTEST_MAX_PLAYERS} joined • Pool Rs ${cc.pool}${cc.creatorEmail===currentUser.email?' • You created this':''}</div>
      </div>
      <span style="font-size:10px;font-weight:700;color:${cc.status==='completed'?'#4ade80':'var(--gold)'};text-transform:uppercase">${cc.status}</span>
    </div>
    ${cc.status==='completed' && cc.prizes?.[currentUser.email] ? `<div style="margin-top:8px;font-size:12px;color:#4ade80;font-weight:700">🏆 You won Rs ${cc.prizes[currentUser.email]}!</div>` : ''}
  </div>`).join('')}
  ` : ''}
  `;
}

function handleCreateCustomContest(matchId) {
  const el = document.getElementById('cc-entry-'+matchId);
  const amount = parseInt(el?.value) || 0;
  createCustomContest(matchId, amount);
}

function handleJoinCustomContest(matchId) {
  const el = document.getElementById('cc-code-'+matchId);
  joinCustomContestByCode(el?.value || '');
}

function questionCard(q, idx, match, canEdit, myPred) {
  const myAnswer = predictionAnswers[q.id] || '';
  const isScored = myPred?.scored;
  const correctAns = q.correctAnswer;

  let optionsHtml = '';
  if (q.type === 'options') {
    optionsHtml = `<div class="opt-grid">` + q.options.filter(o=>o).map((opt,oi) => {
      let cls = 'opt-btn';
      const isSelected = myAnswer === opt;
      const isCorrectOpt = isScored && correctAns && opt.toLowerCase() === correctAns.toLowerCase();
      const isWrongSelected = isScored && isSelected && !isCorrectOpt;
      if (isCorrectOpt) cls += ' correct';
      else if (isWrongSelected) cls += ' wrong';
      else if (isSelected) cls += ' selected';
      const disabledAttr = !canEdit ? 'disabled' : '';
      return `
      <button class="${cls}" ${disabledAttr}
        data-qid="${q.id}" data-opt="${opt.replace(/"/g,'&quot;').replace(/'/g,'&#39;')}"
        onclick="optSelect(this)">
        <span>${opt}</span>
        <span class="check-circle">${isSelected||isCorrectOpt ? '✓' : ''}</span>
      </button>`;
    }).join('') + `</div>`;
  } else {
    optionsHtml = canEdit ? `
    <input class="input" id="pq-text-${q.id}" placeholder="Type your answer..." value="${myAnswer.replace(/"/g,'&quot;')}" oninput="predictionAnswers['${q.id}']=this.value">` :
    `<div style="background:rgba(255,255,255,0.04);padding:12px 14px;border-radius:11px;font-size:13.5px">
      Your answer: <b>${myAnswer || '—'}</b>
      ${isScored ? `<br/>Correct answer: <b style="color:${isFuzzyAnswerMatch(myAnswer, correctAns)?'#4ade80':'#f87171'}">${correctAns||'—'}</b>` : ''}
    </div>`;
  }

  return `
  <div class="q-card">
    <div class="q-header">
      <div class="q-text">${idx+1}. ${q.text}</div>
      <div class="q-points">${q.points} pts</div>
    </div>
    ${optionsHtml}
  </div>`;
}
</script>

<script>
// ═══════════════════════════════════════════════════════════
// MEGA CONTEST (per-match leaderboard)
// ═══════════════════════════════════════════════════════════
function renderContest() {
  const joined = Object.values(matches).filter(m => (m.megaParticipants||[]).includes(currentUser.email)).sort((a,b)=>b.deadline-a.deadline);

  if (!activeMatchId_forContest && joined.length > 0) activeMatchId_forContest = joined[0].id;
  const selectedMatch = matches[activeMatchId_forContest];

  return `
  <div class="section-title">🎯 Mega Contest</div>

  <div class="empty-state"><div class="empty-icon">🎯</div>You haven't joined any Mega Contest yet.<br/>Open a match and join the Mega Contest!</div>` : `

  <div style="display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px">
    ${joined.map(m => `
    <button onclick="activeMatchId_forContest='${m.id}';render()"
      style="flex-shrink:0;padding:9px 14px;border-radius:11px;font-size:12px;font-weight:700;border:1px solid ${activeMatchId_forContest===m.id?'var(--blue)':'var(--card-b)'};background:${activeMatchId_forContest===m.id?'rgba(37,99,235,0.18)':'rgba(255,255,255,0.04)'};color:${activeMatchId_forContest===m.id?'#fff':'var(--dim)'}">

}

function renderContestLeaderboard(m) {
  const lb = getMatchLeaderboard(m.id);
  const myRank = lb.findIndex(x => x.email === currentUser.email) + 1;

  return `
  <div class="card mb14" style="text-align:center;background:linear-gradient(135deg,rgba(251,191,36,0.1),rgba(249,115,22,0.05));border-color:rgba(251,191,36,0.25)">
    <div style="font-size:12px;color:var(--dim);font-weight:600">${m.teamA} vs ${m.teamB}</div>
    <div style="display:flex;justify-content:center;gap:24px;margin-top:10px">
      <div><div class="display" style="font-size:22px;color:var(--gold)">#${myRank||'-'}</div><div style="font-size:10px;color:var(--dim)">Your Rank</div></div>
      <div><div class="display" style="font-size:22px;color:#4ade80">${lb.length}</div><div style="font-size:10px;color:var(--dim)">Participants</div></div>
      <div><div class="display" style="font-size:22px;color:var(--blue-l)">Rs ${distributable}</div><div style="font-size:10px;color:var(--dim)">Prize Pool</div></div>
    </div>
    ${m.status!=='completed' ? `<div style="font-size:11px;color:var(--orange);margin-top:8px">⏳ Results pending — match not scored yet</div>` :
      m.megaDistributed ? `<div style="font-size:11px;color:#4ade80;margin-top:8px">✅ Prizes distributed by admin</div>` :
      `<div style="font-size:11px;color:var(--orange);margin-top:8px">⏳ Match finished — admin will distribute prizes soon</div>`}
  </div>

  ${lb.map((p,i) => `
  <div class="lb-row" style="${p.email===currentUser.email?'border-color:var(--blue);background:rgba(37,99,235,0.08)':''}">
    <div class="lb-rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</div>
    <div class="lb-name">${p.name} ${p.email===currentUser.email?'(You)':''}</div>
    <div class="lb-pts">${p.scored ? p.points+' pts' : '—'}${p.prizeWon ? ` <span style="color:#4ade80">+Rs ${p.prizeWon}</span>` : ''}</div>
  </div>`).join('')}
  `;
}

// ═══════════════════════════════════════════════════════════
// H2H CONTEST
// ═══════════════════════════════════════════════════════════
function renderH2HContest() {
  const myMatchIds = currentUser.matchesJoined || [];
  const activeMatches = myMatchIds.map(id => matches[id]).filter(m => m && m.status !== 'completed');
  const allMatchesWithH2H = Object.values(matches).filter(m => m.status !== 'completed' && !m.predictionDisabled);

  return `
  <div class="section-title">🥊 H2H Contest</div>

  <div class="card mb14" style="background:linear-gradient(135deg,rgba(249,115,22,0.1),rgba(37,99,235,0.07));border-color:rgba(249,115,22,0.3)">
    <div style="font-size:13px;font-weight:700;color:var(--orange);margin-bottom:6px">Head to Head — How it Works</div>
    <div style="font-size:12px;color:var(--dim);line-height:1.7">
      🥊 Entry fee: <b style="color:var(--text)">Rs ${H2H_ENTRY_FEE}</b> per player<br/>
      🏆 Winner gets: <b style="color:#4ade80">Rs ${H2H_WINNER_PRIZE}</b> (Rs ${H2H_PRIZE_POOL - H2H_WINNER_PRIZE} goes to company)<br/>
      ⚡ Full contest auto-creates next slot<br/>
      🤝 Draw = both players refunded
    </div>
  </div>

  ${allMatchesWithH2H.length === 0 ? `
  <div class="empty-state"><div class="empty-icon">🥊</div>No active matches available for H2H contests yet.</div>` : `

  <div class="section-title" style="margin-top:4px">📋 Available Matches</div>
  ${allMatchesWithH2H.map(m => {
    const myH2H = Object.values(h2hContests).find(c => c.matchId === m.id && (c.player1?.email === currentUser.email || c.player2?.email === currentUser.email));
    const openSlots = Object.values(h2hContests).filter(c => c.matchId === m.id && c.status === 'open');
    const fullSlots = Object.values(h2hContests).filter(c => c.matchId === m.id && c.status === 'full');
    const hasPrediction = !!(currentUser.predictions?.[m.id]);
    const deadlinePassed = isDeadlinePassed(m);

    return `
    <div class="h2h-card">
      <div class="h2h-badge">🥊 H2H</div>
      <div style="font-weight:700;font-size:15px">${m.teamA} vs ${m.teamB}</div>
      <div style="font-size:11px;color:var(--dim);margin-top:3px">${m.sport==='cricket'?'🏏':'⚽'} • ${openSlots.length} open slot(s) • ${fullSlots.length} active match(es)</div>

      ${myH2H ? `
      <div style="margin-top:12px;background:rgba(22,163,74,0.1);border:1px solid rgba(22,163,74,0.25);border-radius:11px;padding:12px">
        <div style="font-size:12px;font-weight:700;color:#4ade80;margin-bottom:6px">✅ Your H2H</div>
        <div class="h2h-vs-row">
          <div class="h2h-player">
            <div class="h2h-player-name">${myH2H.player1?.name||'?'}</div>
            <div class="h2h-player-sub">${myH2H.player1?.email === currentUser.email ? '(You)' : ''}</div>
          </div>
          <div class="vs-badge">VS</div>
          <div class="h2h-player">
            ${myH2H.player2 ? `<div class="h2h-player-name">${myH2H.player2.name}</div><div class="h2h-player-sub">${myH2H.player2.email === currentUser.email ? '(You)' : ''}</div>` : `<div style="color:var(--dim);font-size:12px">⏳ Waiting...</div>`}
          </div>
        </div>
        <div style="font-size:11px;color:var(--dim);text-align:center">${myH2H.status==='open'?'Waiting for opponent':'Both players joined — contest is live!'}</div>
      </div>` : `
      ${!deadlinePassed ? `
      <div style="margin-top:10px">
        ${!hasPrediction ? `<div style="font-size:11.5px;color:var(--orange);margin-bottom:8px">⚠️ Submit your match prediction first to join H2H</div>` : ''}
        <button class="btn-primary btn-orange" style="font-size:13px;padding:12px" onclick="joinH2HContest('${m.id}')" ${!hasPrediction ? 'disabled style="opacity:0.45;pointer-events:none"' : ''}>
          🥊 Join H2H — Rs ${H2H_ENTRY_FEE}
        </button>
      </div>` : `<div style="font-size:11px;color:var(--dim);margin-top:8px">🔒 H2H joining closed (deadline passed)</div>`}
      `}
    </div>`;
  }).join('')}
  `}

  <div class="section-title" style="margin-top:10px">📜 Completed H2H Results</div>
  ${(() => {
    const myCompleted = Object.values(h2hContests).filter(c =>
      c.status === 'completed' &&
      (c.player1?.email === currentUser.email || c.player2?.email === currentUser.email)
    );
    if (myCompleted.length === 0) return `<div class="empty-state" style="padding:24px">No completed H2H contests yet.</div>`;
    return myCompleted.map(c => {
      const m = matches[c.matchId];
      const isWinner = c.winnerId === currentUser.email;
      const isDraw = c.winnerId === 'draw';
      return `
      <div class="card mb10" style="border-color:${isWinner?'rgba(22,163,74,0.4)':isDraw?'rgba(251,191,36,0.3)':'rgba(220,38,38,0.3)'}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-weight:700;font-size:13.5px">${m?.teamA||'?'} vs ${m?.teamB||'?'}</div>
          <div style="font-size:13px;font-weight:700;color:${isWinner?'#4ade80':isDraw?'var(--gold)':'#f87171'}">
            ${isWinner ? '🏆 Won +Rs '+(c.winnerPrize||H2H_WINNER_PRIZE) : isDraw ? '🤝 Draw (Refunded)' : '❌ Lost'}
          </div>

        <div style="display:flex;justify-content:space-around;text-align:center;font-size:12px;color:var(--dim)">

          <div><b style="color:var(--text)">${c.player2?.name}</b><br/>${c.p2Score||0} pts</div>
        </div>
      </div>`;
    }).join('');
  })()}
  `;
}

// ─── View Another User's Prediction ────────────────────────
function openViewPrediction(matchId, email) {
  // Only allowed if match is completed and the viewer also participated
  const m = matches[matchId];
  if (!m || m.status !== 'completed') return showNotif('Predictions visible after match ends', 'error');
  if (!(currentUser.matchesJoined||[]).includes(matchId)) return showNotif('You can only view predictions of matches you joined', 'error');
  viewingPredictionEmail = email;
  activeMatchId = matchId;
  tab = 'viewPrediction';
  render();
}

function renderViewPrediction() {
  const m = matches[activeMatchId];
  const targetEmail = viewingPredictionEmail;
  const targetUser = users[targetEmail];
  if (!m || !targetUser) return `<div class="empty-state">User not found.</div>`;

  const targetPred = targetUser.predictions?.[activeMatchId];
  if (!targetPred) return `<div class="empty-state">No prediction found for this user.</div>`;

  return `
  <button class="btn-secondary mb14" style="width:auto;padding:9px 16px" onclick="openMatch('${activeMatchId}')">← Back</button>

  <div class="card mb18" style="background:rgba(37,99,235,0.08);border-color:rgba(37,99,235,0.25);text-align:center">
    <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--orange));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;margin:0 auto 8px;font-family:Rajdhani,sans-serif">${(targetUser.name||'U').charAt(0)}</div>
    <div style="font-weight:700;font-size:15px">${targetUser.name}</div>
    <div style="font-size:11px;color:var(--dim);margin-top:2px">${m.teamA} vs ${m.teamB}</div>
    ${targetPred.scored ? `<div class="display" style="font-size:24px;color:var(--gold);margin-top:8px">${targetPred.pointsEarned} pts</div>` : ''}
  </div>

  <div class="section-title">📝 Their Predictions</div>
  ${m.questions.map((q, idx) => {
    const theirAns = targetPred.answers?.[q.id] || '—';
    const correctAns = q.correctAnswer;
    const isCorrect = q.type === 'text' ? isFuzzyAnswerMatch(theirAns, correctAns) : theirAns.toLowerCase() === (correctAns||'').toLowerCase();
    return `
    <div class="q-card">
      <div class="q-header">
        <div class="q-text">${idx+1}. ${q.text}</div>
        <div class="q-points" style="color:${isCorrect?'#4ade80':'#f87171'}">${isCorrect?'✓':'✗'} ${q.points}pts</div>
      </div>
      <div style="background:rgba(255,255,255,0.04);padding:11px 14px;border-radius:10px">
        <div style="font-size:12px;color:var(--dim);margin-bottom:4px">Their Answer:</div>
        <div style="font-weight:700;color:${isCorrect?'#4ade80':'#f87171'}">${theirAns}</div>
        ${correctAns ? `<div style="font-size:11px;color:var(--dim);margin-top:5px">Correct: <b style="color:#4ade80">${correctAns}</b></div>` : ''}
      </div>
    </div>`;
  }).join('')}
  `;
}

    <div class="lb-pts">${p.points} pts</div>

}

// ═══════════════════════════════════════════════════════════
// PROFILE
// ═══════════════════════════════════════════════════════════

      <input class="input" id="user-search-input" placeholder="Search by name or email..." style="flex:1" onkeydown="if(event.key==='Enter')searchUserProfile()" />

    <div class="profit-row"><span style="color:var(--dim);font-size:13px">Total Deposit</span><span style="font-weight:700;color:#4ade80">Rs ${(u.totalDeposit||0).toFixed(2)}</span></div>
    <div class="profit-row"><span style="color:var(--dim);font-size:13px">Total Withdrawn</span><span style="font-weight:700;color:#f87171">Rs ${(u.totalWithdrawn||0).toFixed(2)}</span></div>

async function uploadUserDp(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 1.5 * 1024 * 1024) { showNotif('Image 1.5MB se bari hai — chhoti image choose karein', 'error'); return; }
  const reader = new FileReader();
  reader.onload = async (e) => {
    // Resize to max 200x200 via canvas
    const img = new Image();
    img.onload = async () => {
      const canvas = document.createElement('canvas');
      const MAX = 200;
      let w = img.width, h = img.height;
      if (w > h) { h = Math.round(h * MAX / w); w = MAX; } else { w = Math.round(w * MAX / h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const base64 = canvas.toDataURL('image/jpeg', 0.82);
      const u = users[currentUser.email];
      if (!u) return;
      u.dpBase64 = base64;
      currentUser.dpBase64 = base64;
      await _saveUserToFirestore(currentUser.email, u);
      try { localStorage.setItem('pp_users_cache', JSON.stringify(users)); } catch(e){}
      render();
      showNotif('✅ Profile picture update ho gaya!');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Team master squad pool (persists across matches, keyed by team name) ──

// from the known squad instead of retyping everyone. Matches are unaffected —
// each match still keeps its own independent player list; this is just a
// reusable roster admin can select from.
function d11TeamSquadKey(teamName) {
  return (teamName || '').trim().toLowerCase();
}
function d11GetTeamSquad(teamName) {
  const key = d11TeamSquadKey(teamName);
  if (!key) return null;

// Call this whenever a player is added to a match's pool, to keep the team's
// master squad up to date. Dedupes by name (case-insensitive); if the player
// already exists in the squad, leaves their stored role as-is.
function d11SyncPlayerToTeamSquad(teamName, playerName, role) {
  const key = d11TeamSquadKey(teamName);
  const cleanName = (playerName || '').trim();
  if (!key || !cleanName) return;
  if (!teamSquads[key]) {
    teamSquads[key] = { teamName: (teamName || '').trim(), players: [] };
  }
  const squad = teamSquads[key];
  squad.teamName = (teamName || '').trim() || squad.teamName; // keep latest casing/spelling
  const exists = squad.players.some(p => p.name.toLowerCase() === cleanName.toLowerCase());
  if (!exists) {
    squad.players.push({ id: uid(), name: cleanName, role: role || 'BAT' });
  }
  _saveTeamSquadToFirestore(key, squad);
  try { localStorage.setItem('pp_team_squads_cache', JSON.stringify(teamSquads)); } catch(e){}
}

};

function getD11Scoring(matchId) {

function renderD11PointsTable(fmt) {

    ${s.srPenalty.below40 ? row('SR < 40', s.srPenalty.below40, true) : ''}
    ${s.srPenalty.below50 ? row('SR < 50', s.srPenalty.below50, true) : ''}
  ` : `${hdr('⚡ STRIKE RATE')}<div style="grid-column:1/-1;color:var(--dim);font-size:11px">No SR bonus/penalty in Test cricket</div>`;

  const erMinLabel = s.erMinOvers < 999 ? `min ${s.erMinOvers} overs` : '';

    ${s.erPenalty.above12 ? row('ER > 12', s.erPenalty.above12, true) : ''}

function calcDream11PlayerPoints(stats, matchId) {
  if (!stats) return 0;
  const s = getD11Scoring(matchId);
  let pts = 0;
  const runs = Number(stats.runs)||0;
  const fours = Number(stats.fours)||0;
  const sixes = Number(stats.sixes)||0;
  const wickets = Number(stats.wickets)||0;
  const maidens = Number(stats.maidens)||0;
  const catches = Number(stats.catches)||0;
  const stumpings = Number(stats.stumpings)||0;
  const runOuts = Number(stats.runOuts)||0;
  const isOut = !!stats.isOut;
  const ballsFaced = Number(stats.ballsFaced)||0;
  const oversBowled = Number(stats.oversBowled)||0;

  // Batting
  pts += runs * s.perRun;
  pts += fours * s.boundary4Bonus;
  pts += sixes * s.boundary6Bonus;
  if (runs >= 100) pts += s.century100Bonus;
  else if (runs >= 50) pts += s.half50Bonus;
  if (runs === 0 && isOut && ballsFaced > 0) pts += s.duckPenalty;

  // Strike Rate (only if enough balls faced)
  if (ballsFaced >= s.srMinBalls) {
    const sr = (runs / ballsFaced) * 100;
    if (s.srBonus.above170 && sr > 170) pts += s.srBonus.above170;
    else if (s.srBonus.above150 && sr > 150) pts += s.srBonus.above150;
    else if (s.srBonus.above130 && sr > 130) pts += s.srBonus.above130;
    else if (s.srBonus.above140 && sr > 140) pts += s.srBonus.above140;
    else if (s.srBonus.above120 && sr > 120) pts += s.srBonus.above120;
    else if (s.srBonus.above100 && sr > 100) pts += s.srBonus.above100;
    if (s.srPenalty.below60 && sr < 60) pts += s.srPenalty.below60;
    else if (s.srPenalty.below70 && sr < 70) pts += s.srPenalty.below70;
    else if (s.srPenalty.below80 && sr < 80) pts += s.srPenalty.below80;
    else if (s.srPenalty.below40 && sr < 40) pts += s.srPenalty.below40;
    else if (s.srPenalty.below50 && sr < 50) pts += s.srPenalty.below50;
  }

  // Bowling
  pts += wickets * s.perWicket;
  if (wickets >= 5) pts += s.fiveWicketBonus;
  else if (wickets >= 3) pts += s.threeWicketBonus;
  pts += maidens * s.maidenOverBonus;

  // Economy Rate (only if enough overs bowled)
  const overs = oversBowled;
  if (overs >= s.erMinOvers) {
    const runsGiven = Number(stats.runsGiven)||0;
    const er = runsGiven / overs;
    if (s.erBonus.below5 && er < 5) pts += s.erBonus.below5;
    else if (s.erBonus.below6 && er < 6) pts += s.erBonus.below6;
    else if (s.erBonus.below7 && er < 7) pts += s.erBonus.below7;
    else if (s.erBonus.below2_5 && er < 2.5) pts += s.erBonus.below2_5;
    else if (s.erBonus.below3_5 && er < 3.5) pts += s.erBonus.below3_5;
    else if (s.erBonus.below4_5 && er < 4.5) pts += s.erBonus.below4_5;
    if (s.erPenalty.above12 && er > 12) pts += s.erPenalty.above12;
    else if (s.erPenalty.above11 && er > 11) pts += s.erPenalty.above11;
    else if (s.erPenalty.above10 && er > 10) pts += s.erPenalty.above10;
    else if (s.erPenalty.above9 && er > 9) pts += s.erPenalty.above9;
    else if (s.erPenalty.above8 && er > 8) pts += s.erPenalty.above8;
    else if (s.erPenalty.above7 && er > 7) pts += s.erPenalty.above7;
  }

  // Fielding
  pts += catches * s.perCatch;
  pts += stumpings * s.perStumping;
  pts += runOuts * s.perRunOut;

  return Math.round(pts);
}

function recalcDream11MatchPoints(d11m) {
  (d11m.players||[]).forEach(p => { p.points = calcDream11PlayerPoints(p.stats, d11ActiveMatchId); });
}

function newDream11TeamTemplate(matchId, userEmail) {
  return {
    id: uid(), matchId, userEmail,
    picks: [],          // array of player ids (length 11)
    captain: null,       // player id
    viceCaptain: null,   // player id
    totalPoints: 0,
    submittedAt: getDateTime()
  };
}

function calcDream11TeamPoints(team, d11m) {
  if (!team || !d11m) return 0;
  let total = 0;
  team.picks.forEach(pid => {
    const p = (d11m.players||[]).find(x => x.id === pid);
    if (!p) return;
    let pts = p.points || 0;
    if (pid === team.captain) pts *= 2;
    else if (pid === team.viceCaptain) pts *= 1.5;
    total += pts;
  });
  return Math.round(total);
}

// ── Live score updates (mid-match) ──────────────────────────────
// Whenever the admin updates player stats — by any of the 4 entry methods
// (single row, grid entry, markdown paste, screenshot scan) — this recomputes
// every already-submitted user team's totalPoints from the latest player
// points and saves them, WITHOUT touching d11m.scored/locked and WITHOUT
// running prize distribution. This is what makes points visible to users
// live, while the match is still in progress. Finalizing (d11FinalizeScoring)
// remains the only action that closes the match and pays out contests.
async function d11RefreshLiveTeamPoints(matchId) {
  const d11m = dream11Matches[matchId];
  if (!d11m) return;
  d11m.lastLiveUpdateAt = getDateTime();
  await _saveDream11MatchToFirestore(matchId, d11m);
  const teams = Object.values(dream11Teams).filter(t => t.matchId === matchId);
  for (const team of teams) {
    team.totalPoints = calcDream11TeamPoints(team, d11m);
    await _saveDream11TeamToFirestore(team.id, team);
  }
}

function dream11TeamComposition(picks, d11m) {
  const counts = { WK:0, BAT:0, AR:0, BOWL:0 };
  const sideCounts = {};
  picks.forEach(pid => {
    const p = (d11m.players||[]).find(x => x.id === pid);
    if (!p) return;
    counts[p.role] = (counts[p.role]||0) + 1;
    sideCounts[p.side] = (sideCounts[p.side]||0) + 1;
  });
  return { counts, sideCounts };
}

function dream11ValidateTeam(picks, d11m) {
  const errors = [];
  if (picks.length !== D11_TEAM_SIZE) errors.push(`Exactly ${D11_TEAM_SIZE} players required (currently ${picks.length})`);
  const { counts, sideCounts } = dream11TeamComposition(picks, d11m);
  Object.keys(D11_ROLE_LIMITS).forEach(role => {
    const [min, max] = D11_ROLE_LIMITS[role];
    const c = counts[role]||0;
    if (c < min || c > max) errors.push(`${D11_ROLE_LABELS[role]}: ${min}-${max} required (currently ${c})`);
  });
  Object.keys(sideCounts).forEach(side => {
    if (sideCounts[side] > D11_MAX_PER_SIDE) errors.push(`Max ${D11_MAX_PER_SIDE} players allowed from one team (${side})`);
  });
  const creditsUsed = picks.reduce((sum, pid) => {
    const p = (d11m.players||[]).find(x => x.id === pid);
    return sum + (p ? d11PlayerCredit(p) : 0);
  }, 0);
  if (creditsUsed > D11_CREDIT_BUDGET + 1e-9) errors.push(`Over credit budget: ${creditsUsed.toFixed(1)}/${D11_CREDIT_BUDGET} Cr used`);
  return errors;
}

// Dream11 is considered locked if the admin manually locked it OR the match's
// prediction deadline (same matches[].deadline used by the Prediction module)
// has passed — whichever comes first. Manual lock lets admin close it early;
// the deadline is the automatic fallback so admin doesn't have to remember.
function isD11Locked(matchId) {
  const d11m = dream11Matches[matchId];
  const m = matches[matchId];
  if (!d11m) return false;
  if (d11m.locked) return true;
  if (m && isDeadlinePassed(m)) return true;
  return false;
}

async function d11DeleteMatch(matchId) {
  const m = matches[matchId];
  if (!m) return;
  const teamCount = Object.values(dream11Teams).filter(t => t.matchId === matchId).length;
  const confirmMsg = teamCount > 0
    ? `⚠️ Delete "${m.teamA} vs ${m.teamB}" from Dream11?\n\n${teamCount} user team(s) will be moved to the Recycle Bin along with it and can be restored later.\n\nEnter the delete password to confirm:`
    : `⚠️ Delete "${m.teamA} vs ${m.teamB}" from Dream11?\n\nIt will be moved to the Recycle Bin and can be restored later.\n\nEnter the delete password to confirm:`;
  const input = prompt(confirmMsg);
  if (input === null) return; // cancelled
  if (input !== MATCH_DELETE_PASSWORD) { showNotif('Wrong password — match not deleted', 'error'); return; }

  // Gather this match's Dream11 teams to store alongside it in the recycle bin
  const teamIds = Object.keys(dream11Teams).filter(tid => dream11Teams[tid].matchId === matchId);
  const teamsBackup = {};
  teamIds.forEach(tid => { teamsBackup[tid] = dream11Teams[tid]; });

  // Move match + Dream11 pool/teams into recycle bin
  deletedMatches[matchId] = { ...m, _deletedAt: getDateTime() };
  await _saveDeletedMatchToFirestore(matchId, deletedMatches[matchId]);

  deletedDream11Matches[matchId] = { ...dream11Matches[matchId], _deletedAt: getDateTime(), _teamsBackup: teamsBackup };
  await _saveDeletedD11MatchToFirestore(matchId, deletedDream11Matches[matchId]);

  // Remove live match
  delete matches[matchId];
  await _deleteMatchFromFirestore(matchId);

  // Remove live Dream11 match data
  delete dream11Matches[matchId];
  if (window._fbDb && window._fbFns) {
    const { doc, deleteDoc } = window._fbFns;
    try { await deleteDoc(doc(window._fbDb, 'pp_dream11_matches', matchId)); } catch(e){}
  }

  // Remove live user teams for this match
  for (const tid of teamIds) {
    delete dream11Teams[tid];
    if (window._fbDb && window._fbFns) {
      const { doc, deleteDoc } = window._fbFns;
      try { await deleteDoc(doc(window._fbDb, 'pp_dream11_teams', tid)); } catch(e){}
    }
  }

  try {
    localStorage.setItem('pp_matches_cache', JSON.stringify(matches));
    localStorage.setItem('pp_dream11_matches_cache', JSON.stringify(dream11Matches));
    localStorage.setItem('pp_dream11_teams_cache', JSON.stringify(dream11Teams));
    localStorage.setItem('pp_deleted_matches_cache', JSON.stringify(deletedMatches));
    localStorage.setItem('pp_deleted_dream11_matches_cache', JSON.stringify(deletedDream11Matches));
  } catch(e){}

  render();
  showNotif(`✅ Match moved to Recycle Bin${teamIds.length ? ` (+${teamIds.length} team(s))` : ''}`);
}

// ── Admin: Restore a Dream11 match (+teams) from the Recycle Bin ──
async function restoreD11Match(matchId) {
  const dm = deletedDream11Matches[matchId];
  const m = deletedMatches[matchId];
  if (!dm || !m) return;
  if (!confirm(`Restore "${m.teamA} vs ${m.teamB}" to Dream11? Its match listing and player pool will reappear.`)) return;

  const { _deletedAt: _a, ...restoredMatch } = m;
  const { _deletedAt: _b, _teamsBackup, ...restoredD11 } = dm;

  matches[matchId] = restoredMatch;
  await _saveMatchToFirestore(matchId, restoredMatch);

  dream11Matches[matchId] = restoredD11;
  await _saveDream11MatchToFirestore(matchId, restoredD11);

  // Restore any backed-up user teams
  const restoredTeamIds = Object.keys(_teamsBackup || {});
  for (const tid of restoredTeamIds) {
    dream11Teams[tid] = _teamsBackup[tid];
    await _saveDream11TeamToFirestore(tid, _teamsBackup[tid]);
  }

  delete deletedMatches[matchId];
  delete deletedDream11Matches[matchId];
  await _removeDeletedMatchFromFirestore(matchId);
  await _removeDeletedD11MatchFromFirestore(matchId);

  try {
    localStorage.setItem('pp_matches_cache', JSON.stringify(matches));
    localStorage.setItem('pp_dream11_matches_cache', JSON.stringify(dream11Matches));
    localStorage.setItem('pp_dream11_teams_cache', JSON.stringify(dream11Teams));
    localStorage.setItem('pp_deleted_matches_cache', JSON.stringify(deletedMatches));
    localStorage.setItem('pp_deleted_dream11_matches_cache', JSON.stringify(deletedDream11Matches));
  } catch(e){}

  showNotif(`✅ Match restored to Dream11${restoredTeamIds.length ? ` (+${restoredTeamIds.length} team(s))` : ''}`);
  render();
}

// ── Admin: Permanently erase a Dream11 match from the Recycle Bin ──

// players are in THIS match, instead of retyping the whole squad every time.
// Shows the team's master squad (built up automatically as players get added
// across past matches) with everything unchecked; admin ticks who's playing
// this match. New players typed in here are added to both this match AND the
// team's master squad for next time.
function d11OpenSquadPicker(side) {
  const m = matches[d11ActiveMatchId];
  if (!m) return;
  const teamName = side === 'A' ? m.teamA : m.teamB;
  const squad = d11GetTeamSquad(teamName);
  if (!squad || squad.players.length === 0) {
    showNotif(`No saved squad yet for ${teamName || 'this team'} — add players with Paste Squad, Add One, or Scan first`, 'error');
    return;
  }
  d11SquadPickerOpen = side;
  d11SquadPickerChecked = {};
  render();
}
function d11CloseSquadPicker() {
  d11SquadPickerOpen = null;
  d11SquadPickerChecked = {};
  render();
}
function d11ToggleSquadPick(nameLower) {
  d11SquadPickerChecked[nameLower] = !d11SquadPickerChecked[nameLower];
  render();
}
function d11ConfirmSquadPicker() {
  const side = d11SquadPickerOpen;
  const m = matches[d11ActiveMatchId];
  const d11m = dream11Matches[d11ActiveMatchId];
  if (!side || !m || !d11m) return;
  const teamName = side === 'A' ? m.teamA : m.teamB;
  const squad = d11GetTeamSquad(teamName);
  if (!squad) { d11CloseSquadPicker(); return; }
  const existingNames = new Set(d11m.players.map(p => p.name.toLowerCase()));
  let added = 0, skipped = 0;
  squad.players.forEach(sp => {
    const nameLower = sp.name.toLowerCase();
    if (!d11SquadPickerChecked[nameLower]) return; // not ticked — leave out of this match
    if (existingNames.has(nameLower)) { skipped++; return; }
    d11m.players.push(newDream11Player(sp.name, sp.role, side, { credit: sp.credit, photo: sp.photo }));
    existingNames.add(nameLower);
    added++;
  });
  if (added === 0) { showNotif('Tick at least one player first', 'error'); return; }
  _saveDream11MatchToFirestore(d11ActiveMatchId, d11m);
  d11CloseSquadPicker();
  showNotif(`✅ ${added} player${added===1?'':'s'} added from saved squad${skipped ? ', '+skipped+' already in pool' : ''}`);
}

// Known role keywords/aliases that may appear after a player's name, e.g.
// "Babar Azam - BAT", "Mohammad Rizwan (WK)", "Shaheen Afridi: Bowler", "Shadab Khan AR"
const D11_ROLE_ALIASES = {
  WK:   ['wk','wicket keeper','wicket-keeper','wicketkeeper','keeper','w/k','wk-batsman','wk batsman','wicketkeeper-batsman','wicket-keeper batsman','wicketkeeper batsman'],
  BAT:  ['bat','batsman','batter','batsmen','batters','batting'],
  AR:   ['ar','all rounder','all-rounder','allrounder','all round','batting allrounder','batting all-rounder','bowling allrounder','bowling all-rounder','all-round','allround'],
  BOWL: ['bowl','bowler','bowlers','bowling']
};

// Section headers in squad paste that should be treated as role markers (not player names)
const D11_SECTION_HEADERS = {
  WK:   ['wicket keepers','wicket-keepers','wicketkeepers','keepers','wk','wks'],
  BAT:  ['batters','batsmen','batting','batsman'],
  AR:   ['all rounders','all-rounders','allrounders','all round','ar'],
  BOWL: ['bowlers','bowling','bowler']
};
// Common keeper / bowler name fragments used as a last-resort guess when no
// explicit role tag is present in the pasted line. This is just a heuristic
// to reduce manual correction — admin should still glance over the result.
const D11_KNOWN_KEEPERS = ['rizwan','sarfaraz','sarfraz','azam khan','samson','pant','karthik','jaiswal','dhoni','de kock','dekock','bairstow','buttler','phillips','klaasen','livingstone','quinton','jos buttler','asalanka','mendis','litton','liton','jurel','rishabh'];
const D11_KNOWN_BOWLERS = ['shaheen','afridi','rauf','naseem','wasim jr','hasan ali','imad','nawaz','bumrah','shami','siraj','starc','cummins','hazlewood','boult','southee','rabada','ngidi','rashid khan','rashid','shadab','wanindu','hasaranga','mustafizur','akeal hosein','sodhi','santner','chahal','kuldeep','bhuvneshwar','arshdeep','mohammed siraj'];
const D11_KNOWN_ALLROUNDERS = ['shadab','imad wasim','iftikhar','glenn maxwell','maxwell','stoinis','jadeja','hardik','pandya','moeen','curran','sam curran','stokes','holder','russell','andre russell','nabi','mohammad nabi','mahmudullah','asif ali'];

// Tries to detect an explicit role tag at the end/inside of a pasted line,
// e.g. "Babar Azam - BAT" or "Rizwan (WK)". Returns {cleanName, role} where
// role is null if nothing matched.
function d11DetectExplicitRole(rawLine) {
  let line = rawLine;
  let foundRole = null;
  // Bracketed tag: "Name (WK)" / "Name [Bowler]"
  const bracketMatch = line.match(/^(.*?)[\(\[]\s*([a-zA-Z\- ]+?)\s*[\)\]]\s*$/);
  if (bracketMatch) {
    const tag = bracketMatch[2].trim().toLowerCase();
    for (const role in D11_ROLE_ALIASES) {
      if (D11_ROLE_ALIASES[role].includes(tag)) { foundRole = role; line = bracketMatch[1].trim(); break; }
    }
  }
  if (!foundRole) {
    // Separator tag: "Name - BAT" / "Name : Bowler" (comma is NOT used here — commas always
    // separate different players now, e.g. when a whole squad is pasted as one line)
    const sepMatch = line.match(/^(.*?)[\-:–]\s*([a-zA-Z\- ]+?)\s*$/);
    if (sepMatch) {
      const tag = sepMatch[2].trim().toLowerCase();
      for (const role in D11_ROLE_ALIASES) {
        if (D11_ROLE_ALIASES[role].includes(tag)) { foundRole = role; line = sepMatch[1].trim(); break; }
      }
    }
  }
  if (!foundRole) {
    // Trailing tag with no separator: "Mohammad Rizwan WK" / "Shadab Khan AR"
    const words = line.split(/\s+/);
    if (words.length > 1) {
      const lastWord = words[words.length - 1].toLowerCase();
      for (const role in D11_ROLE_ALIASES) {
        if (D11_ROLE_ALIASES[role].includes(lastWord)) { foundRole = role; line = words.slice(0, -1).join(' '); break; }
      }
    }
  }
  return { cleanName: line.trim(), role: foundRole };
}

// Best-effort guess when no explicit role tag was pasted — checks the name
// against common keeper/bowler/all-rounder name fragments. Falls back to BAT.
function d11GuessRoleFromName(name) {
  const low = name.toLowerCase();
  if (D11_KNOWN_KEEPERS.some(k => low.includes(k))) return 'WK';
  if (D11_KNOWN_ALLROUNDERS.some(k => low.includes(k))) return 'AR';
  if (D11_KNOWN_BOWLERS.some(k => low.includes(k))) return 'BOWL';
  return 'BAT';
}

// Parses pasted squad text into player rows. Lines matching team names (or "TEAM A"/"TEAM B"/
// "A"/"B" headings) switch the active side; every other non-empty line becomes one or more
// players. Handles two paste styles:
//  1) One player per line (the normal/expected format)
//  2) A whole squad copied as a single comma-separated line, e.g. when copy-pasting from a
//     website like ESPNcricinfo: "Rohit Sharma, Shubman Gill (c), Yashasvi Jaiswal, ..."
//     — such lines get split on commas into individual players.
// Role can be tagged explicitly per name (e.g. "Rizwan - WK"); otherwise it's guessed from a
// known-players list, defaulting to BAT. Captain/vice-captain markers like "(c)"/"(vc)" are
// stripped from the name (not treated as a role).
function d11ParseSquadText(text, teamAName, teamBName) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const normA = (teamAName||'').trim().toLowerCase();
  const normB = (teamBName||'').trim().toLowerCase();
  let side = 'A';
  let sideSeen = false;
  let sectionRole = null;
  const parsed = [];

  // ── Detect 3-line format: slug / proper name / role description ──
  // Pattern: line1 is a slug (lowercase-hyphenated), line2 is Title Case name,
  // line3 is a role label like "Batsman", "Bowler", "WK-Batsman", "Batting Allrounder"
  function isSlug(s) { return /^[a-z][a-z0-9]*(-[a-z0-9]+)+$/.test(s); }
  function isRoleLabel(s) {
    const low = s.toLowerCase().trim();
    for (const role in D11_ROLE_ALIASES) {
      if (D11_ROLE_ALIASES[role].includes(low)) return role;
    }
    return null;
  }
  function isTitleName(s) {
    // Proper name: starts with uppercase, has space(s), no hyphens-only slug pattern
    return /^[A-Z]/.test(s) && s.length > 2 && !isSlug(s);
  }

  // Pre-process: merge 3-line groups into single entries
  const processed = [];
  let i = 0;
  while (i < lines.length) {
    const l1 = lines[i];
    const l2 = lines[i+1] || '';
    const l3 = lines[i+2] || '';
    const roleFromL3 = isRoleLabel(l3);
    // Check 3-line group: slug + proper name + role label
    if (isSlug(l1) && isTitleName(l2) && roleFromL3) {
      // Use proper name (l2) with detected role
      processed.push(`${l2} - ${Object.keys(D11_ROLE_ALIASES).find(r => D11_ROLE_ALIASES[r].includes(l3.toLowerCase().trim())) || 'BAT'}`);
      i += 3;
      continue;
    }
    // Check 2-line group: slug + proper name (no role line)
    if (isSlug(l1) && isTitleName(l2) && !isRoleLabel(l2)) {
      processed.push(l2); // just the proper name
      i += 2;
      continue;
    }
    processed.push(l1);
    i++;
  }

  // Now parse processed lines (same logic as before)
  processed.forEach(line => {
    const low = line.toLowerCase().replace(/[:\-–]+$/,'').trim();
    // Strip markdown: ### **HEADING** or __HEADING__ etc. for header detection
    const lowClean = low.replace(/^[#\s]+/, '').replace(/\*+/g, '').replace(/_+/g, '').replace(/[:\-–]+$/, '').trim();

    // Team name switches side
    if (normA && (low === normA || lowClean === normA)) { side = 'A'; sideSeen = true; return; }
    if (normB && (low === normB || lowClean === normB)) { side = 'B'; sideSeen = true; return; }
    if (low === 'team a' || low === 'squad a' || lowClean === 'team a') { side = 'A'; sideSeen = true; return; }
    if (low === 'team b' || low === 'squad b' || lowClean === 'team b') { side = 'B'; sideSeen = true; return; }

    // Section header — check both raw and markdown-stripped versions
    let isHeader = false;
    for (const role in D11_SECTION_HEADERS) {
      if (D11_SECTION_HEADERS[role].includes(low) || D11_SECTION_HEADERS[role].includes(lowClean)) {
        sectionRole = role;
        isHeader = true;
        break;
      }
    }
    if (isHeader) return;

    const rawPieces = line.split(',').map(p => p.trim()).filter(p => p.length > 0);
    const pieces = [];
    rawPieces.forEach(p => {
      const bare = p.toLowerCase().trim();
      let isBareRole = false;
      for (const role in D11_ROLE_ALIASES) {
        if (D11_ROLE_ALIASES[role].includes(bare)) { isBareRole = true; break; }
      }
      if (isBareRole && pieces.length > 0) {
        pieces[pieces.length - 1] = pieces[pieces.length - 1] + ' - ' + p;
      } else {
        pieces.push(p);
      }
    });

    pieces.forEach(piece => {
      let cleaned = piece.replace(/^\s*[\d]+[\.]\s*/, '').replace(/^[-•*]\s*/, '').trim();
      if (!cleaned) return;
      cleaned = cleaned.replace(/\(\s*(c|vc|captain|vice[\s-]?captain)\s*\)\s*$/i, '').trim();
      if (!cleaned) return;

      // Convert slug → proper name
      if (isSlug(cleaned)) {
        cleaned = cleaned.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
      }
      if (!cleaned) return;

      const { cleanName, role: explicitRole } = d11DetectExplicitRole(cleaned);
      const finalName = cleanName || cleaned;
      if (!finalName) return;
      const role = explicitRole || sectionRole || d11GuessRoleFromName(finalName);
      parsed.push({ name: finalName, side, role, roleGuessed: !explicitRole && !sectionRole });
    });
  });

  return parsed;
}
function d11ConfirmPasteSquad() {
  const m = matches[d11ActiveMatchId];

  if (!d11m || !d11PasteText) return;

  const existingNames = new Set(d11m.players.map(p => p.name.toLowerCase()));

    d11m.players.push(newDream11Player(name, role, side)); // role auto-detected/guessed from pasted text
    existingNames.add(name.toLowerCase());

    added++;

  render();
  showNotif(`✅ ${added} players added (roles auto-set)${skipped ? ', '+skipped+' duplicate skipped' : ''} — tap a role chip below to fix any that are wrong`);
}

function d11BuildSquadScreenshotPrompt(teamAName, teamBName) {
  return `You are reading a cricket squad/team-sheet from one or more screenshots (could be a playing XI graphic, a squad list, or a roster image). Extract every player listed and return ONLY a JSON object — no markdown, no code fences, no explanation, nothing before or after the JSON.

The two teams in this match are: "${teamAName}" and "${teamBName}".

Return exactly this shape:
{
  "players": [
    { "name": "Player Name", "role": "WK", "team": "A" }
  ]
}

Rules for "role", pick the closest match from exactly these 4 codes: "WK" (wicket-keeper), "BAT" (batsman/batter), "AR" (all-rounder), "BOWL" (bowler).
- If the image shows a role/label near the name, use it to pick the closest of the 4 codes above.
- If no role is visible for a player, make your best guess from general cricket knowledge of that player, or default to "BAT".

Rules for "team", figure out which of the two teams above each player belongs to, using any team name, heading, logo text, jersey colour, or section divider visible in the screenshot(s):
- Use "A" if the player belongs to "${teamAName}".
- Use "B" if the player belongs to "${teamBName}".
- If a screenshot shows only one team's section/heading with no opposing team players in it, assign every player in that section to whichever of A/B that heading matches.
- If you genuinely cannot tell which team a specific player belongs to from anything visible, your best guess is still required — never omit the "team" field.

- Use the player's name as printed/visible (don't add team names into the name field).
- Include every player visible across all images, both teams if shown.
- Strip captain/vice-captain markers like "(c)" or "(vc)" from the name.
- Do not invent players who are not visibly present in the image.
- If the image contains no player list at all, return {"players": []}.`;
}

async function d11ScanSquadScreenshots() {
  if (d11SquadScreenshotImages.length === 0) { showNotif('Add at least one screenshot first', 'error'); return; }
  const m = matches[d11ActiveMatchId];
  const d11m = dream11Matches[d11ActiveMatchId];
  if (!m || !d11m) return;
  d11SquadScreenshotScanning = true;
  render();

  try {
    const prompt = d11BuildSquadScreenshotPrompt(m.teamA || 'Team A', m.teamB || 'Team B');
    const rawText = await d11CallScanFunction(prompt, d11SquadScreenshotImages);
    let cleaned = rawText.trim().replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '');
    const parsed = JSON.parse(cleaned);
    const detected = (parsed.players || []).filter(p => p && p.name && p.name.trim());

    if (detected.length === 0) {
      showNotif('No players detected in the screenshot — try a clearer image or use Paste Squad instead', 'error');
      d11SquadScreenshotScanning = false;
      render();
      return;
    }

    // Add players the same way Paste Squad does: skip duplicates by name. Side
    // (A/B) now comes from the AI's "team" detection (matched against the actual
    // team names/headings visible in the screenshot) instead of guessing by
    // balancing counts — admin can still fix a wrong side via Add One / remove+re-add.
    const existingNames = new Set(d11m.players.map(p => p.name.toLowerCase()));
    const validRoles = new Set(Object.keys(D11_ROLE_LIMITS));
    const newlyAdded = [];
    let skipped = 0;

    detected.forEach(({ name, role, team }) => {
      const cleanName = name.trim().replace(/\(\s*(c|vc|captain|vice[\s-]?captain)\s*\)\s*$/i, '').trim();
      if (!cleanName) return;
      if (existingNames.has(cleanName.toLowerCase())) { skipped++; return; }
      const finalRole = validRoles.has(role) ? role : d11GuessRoleFromName(cleanName);
      let side = (team === 'A' || team === 'B') ? team : null;
      if (!side) {
        // Fallback only if the AI didn't return a usable team for this player.
        const sideA = d11m.players.filter(p => p.side === 'A').length;
        const sideB = d11m.players.filter(p => p.side === 'B').length;
        side = sideA <= sideB ? 'A' : 'B';
      }
      const newPlayer = newDream11Player(cleanName, finalRole, side);
      d11m.players.push(newPlayer);
      existingNames.add(cleanName.toLowerCase());
      d11SyncPlayerToTeamSquad(side === 'A' ? m.teamA : m.teamB, cleanName, finalRole);
      newlyAdded.push(newPlayer);
    });

    _saveDream11MatchToFirestore(d11ActiveMatchId, d11m);
    d11SquadScreenshotOpen = false;
    d11SquadScreenshotImages = [];
    d11SquadScreenshotScanning = false;
    render();
    showNotif(`✅ ${newlyAdded.length} player${newlyAdded.length===1?'':'s'} added${skipped ? ', '+skipped+' duplicate skipped' : ''} — check team side & role chips below`);
  } catch (err) {
    d11SquadScreenshotScanning = false;
    render();
    showNotif('Scan error: ' + (err && err.message ? err.message : String(err)), 'error');
  }
}

// Drag-to-move / drag-handle-to-resize for the photo crop box. Coordinates are
// tracked as % of the stage element so the box position survives re-renders.
let _d11CropDragStart = null; // {mode, startX, startY, box} in client px + starting box %
function d11CropPointerDown(e) {
  const stage = document.getElementById('d11-crop-stage');
  const handle = document.getElementById('d11-crop-handle');
  if (!stage || !d11PhotoCropBox) return;
  const rect = stage.getBoundingClientRect();
  const handleRect = handle ? handle.getBoundingClientRect() : null;
  const onHandle = handleRect && e.clientX >= handleRect.left - 10 && e.clientX <= handleRect.right + 10 &&
                    e.clientY >= handleRect.top - 10 && e.clientY <= handleRect.bottom + 10;
  d11PhotoCropDragMode = onHandle ? 'resize' : 'move';
  _d11CropDragStart = { startX: e.clientX, startY: e.clientY, rect, box: { ...d11PhotoCropBox } };
  e.preventDefault();
}
function d11CropPointerMove(e) {
  if (!d11PhotoCropDragMode || !_d11CropDragStart || !d11PhotoCropBox) return;
  const { startX, startY, rect, box } = _d11CropDragStart;
  const dxPct = ((e.clientX - startX) / rect.width) * 100;
  const dyPct = ((e.clientY - startY) / rect.height) * 100;
  const el = document.getElementById('d11-crop-box');
  if (!el) return;

  if (d11PhotoCropDragMode === 'move') {
    let x = Math.max(0, Math.min(100 - box.size, box.x + dxPct));
    let y = Math.max(0, Math.min(100 - box.size, box.y + dyPct));
    d11PhotoCropBox = { ...box, x, y };
  } else {
    let size = Math.max(8, Math.min(100 - box.x, 100 - box.y, box.size + Math.max(dxPct, dyPct)));
    d11PhotoCropBox = { ...box, size };
  }
  el.style.left = d11PhotoCropBox.x + '%';
  el.style.top = d11PhotoCropBox.y + '%';
  el.style.width = d11PhotoCropBox.size + '%';
  el.style.height = d11PhotoCropBox.size + '%';
  e.preventDefault();
}
function d11CropPointerUp(e) {
  d11PhotoCropDragMode = null;
  _d11CropDragStart = null;
}

// ── Photo crop flow — runs right after squad screenshot scan, one player at a time ──
function d11SkipPhotoCrop() {
  d11PhotoCropQueue.shift();
  d11PhotoCropBox = d11PhotoCropQueue.length ? { x: 25, y: 10, size: 50 } : null;
  render();
}
function d11SkipAllPhotoCrops() {
  d11PhotoCropQueue = [];
  d11PhotoCropBox = null;

}
function d11SetCropBox(box) {
  d11PhotoCropBox = box;
}
// Crops the current crop box out of the source image, downsizes to a small
// square thumbnail, and saves it as a compressed base64 JPEG on the player —
// kept small so many player photos comfortably fit Firestore's 1MB doc limit.
function d11SavePhotoCrop() {
  const item = d11PhotoCropQueue[0];
  if (!item || !d11PhotoCropBox) return;
  const d11m = dream11Matches[d11ActiveMatchId];
  const player = d11m && d11m.players.find(p => p.id === item.playerId);
  if (!player) { d11SkipPhotoCrop(); return; }

  const img = new Image();
  img.onload = () => {
    const box = d11PhotoCropBox; // box.x/y/size are % of the (square) stage element

    // The image is shown with object-fit:contain inside a square stage, so it's
    // letterboxed on one axis. Work out the displayed image's rect within that
    // square stage (in % of stage), then map the crop box from stage% → that
    // displayed rect → actual source pixel coordinates.
    const iw = img.naturalWidth, ih = img.naturalHeight;
    let dispWPct, dispHPct, offXPct, offYPct;
    if (iw >= ih) {
      dispWPct = 100;
      dispHPct = 100 * (ih / iw);
      offXPct = 0;
      offYPct = (100 - dispHPct) / 2;
    } else {
      dispHPct = 100;
      dispWPct = 100 * (iw / ih);
      offYPct = 0;
      offXPct = (100 - dispWPct) / 2;
    }

    // Box position relative to the displayed image, as a fraction (0-1) of the displayed image.
    const relX = (box.x - offXPct) / dispWPct;
    const relY = (box.y - offYPct) / dispHPct;
    const relSizeX = box.size / dispWPct;
    const relSizeY = box.size / dispHPct;

    const sx = Math.max(0, relX * iw);
    const sy = Math.max(0, relY * ih);
    const sSizeW = Math.min(iw - sx, relSizeX * iw);
    const sSizeH = Math.min(ih - sy, relSizeY * ih);
    const sSize = Math.max(1, Math.min(sSizeW, sSizeH));

    const OUT = 160; // output thumbnail size in px — small enough for many players per Firestore doc
    const canvas = document.createElement('canvas');
    canvas.width = OUT;
    canvas.height = OUT;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, sx, sy, sSize, sSize, 0, 0, OUT, OUT);
    const photoDataUrl = canvas.toDataURL('image/jpeg', 0.7);

    player.photo = photoDataUrl;
    _saveDream11MatchToFirestore(d11ActiveMatchId, d11m);

    d11PhotoCropQueue.shift();
    d11PhotoCropBox = d11PhotoCropQueue.length ? { x: 25, y: 10, size: 50 } : null;
    render();
    showNotif(d11PhotoCropQueue.length ? '✅ Photo saved — next player' : '✅ Photo saved');
  };
  img.src = item.sourceDataUrl;
}

// ════════════════════════════════════════════════════════════════
// ── Admin: Master Teams (reusable squads with photos, flags, credits) ──
// Built on top of the existing `teamSquads` store (same Firestore
// collection `pp_team_squads` already used to remember players seen across
// matches). This adds a dedicated admin UI to manage teams directly —
// create teams, upload a flag, add/edit/remove players with role+credit+photo
// — independent of any specific match. When a new Dream11 match is created,
// admin picks teamA/teamB from this list and the saved squad pre-fills it.
// ════════════════════════════════════════════════════════════════

// Resizes+center-crops any uploaded image to a small square JPEG thumbnail,
// no manual drag step — used for both team flags and player photos here.
function _masterTeamsCenterCropToDataUrl(sourceDataUrl, outSize) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const iw = img.naturalWidth, ih = img.naturalHeight;
      const side = Math.min(iw, ih);
      const sx = (iw - side) / 2;
      const sy = (ih - side) / 2;
      const canvas = document.createElement('canvas');
      canvas.width = outSize;
      canvas.height = outSize;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, sx, sy, side, side, 0, 0, outSize, outSize);
      resolve(canvas.toDataURL('image/jpeg', 0.55));
    };
    img.src = sourceDataUrl;
  });
}

function masterTeamsCancelPaste() { masterTeamsPasteText = null; masterTeamsPasteMode = false; render(); }

function masterTeamsConfirmPaste(key) {
  const squad = teamSquads[key];
  if (!squad || !masterTeamsPasteText) return;
  // Parse using same logic as Dream11 paste (single team — no side switching needed)
  const lines = masterTeamsPasteText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const existingNames = new Set(squad.players.map(p => p.name.toLowerCase()));
  let added = 0;
  let masterSectionRole = null;
  lines.forEach(line => {
    // Skip markdown section headers like ### **BATSMEN** and set sectionRole
    const lowLine = line.toLowerCase().replace(/^[#\s]+/, '').replace(/\*+/g, '').replace(/_+/g, '').replace(/[:\-–]+$/, '').trim();
    let isHdr = false;
    for (const role in D11_SECTION_HEADERS) {
      if (D11_SECTION_HEADERS[role].includes(lowLine)) { masterSectionRole = role; isHdr = true; break; }
    }
    if (isHdr) return;
    // Handle comma-separated on single line
    const pieces = line.split(',').map(p => p.trim()).filter(p => p);
    pieces.forEach(piece => {
      let cleaned = piece.replace(/^\s*[\d]+\.\s*/, '').replace(/^[-•*]\s*/, '').trim();
      // Strip any leading markdown from individual piece
      cleaned = cleaned.replace(/^[#\s]+/, '').replace(/\*+/g, '').replace(/_+/g, '').trim();
      cleaned = cleaned.replace(/\(\s*(c|vc|captain|vice[\s-]?captain)\s*\)\s*$/i, '').trim();
      if (!cleaned || cleaned.length < 2) return;
      const { cleanName, role: explicitRole } = d11DetectExplicitRole(cleaned);
      const finalName = cleanName || cleaned;
      if (!finalName) return;
      const role = explicitRole || masterSectionRole || d11GuessRoleFromName(finalName);
      if (existingNames.has(finalName.toLowerCase())) return;
      squad.players.push({ id: uid(), name: finalName, role, credit: 9.0, photo: null });
      existingNames.add(finalName.toLowerCase());
      added++;
    });
  });
  if (added === 0) { showNotif('No new players detected — check the format', 'error'); return; }
  _saveTeamSquadToFirestore(key, squad);
  try { localStorage.setItem('pp_team_squads_cache', JSON.stringify(teamSquads)); } catch(e){}
  masterTeamsPasteText = null;
  masterTeamsPasteMode = false;
  render();
  showNotif('✅ ' + added + ' players add ho gaye!');
}

async function masterTeamsScanScreenshot(key, input) {
  const file = input && input.files && input.files[0];
  if (!file) return;
  const squad = teamSquads[key];
  if (!squad) return;
  showNotif('📷 Screenshot scan ho raha hai...', 'success');
  const reader = new FileReader();
  reader.onload = async function(e) {
    const base64 = e.target.result.split(',')[1];
    const prompt = `This is a cricket squad/team screenshot. Extract ALL player names and their roles.
Return ONLY a JSON array, no markdown, no explanation. Format:
[{"name":"Player Name","role":"BAT"},{"name":"Player2","role":"WK"}]
Role must be one of: BAT, WK, AR, BOWL
If role is unclear, guess from context. Team name: ${squad.teamName}`;
    try {
      const resp = await fetch('/.netlify/functions/scan-image', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompt,
          images: [{ data: base64, mediaType: 'image/jpeg' }]
        })
      });
      const data = await resp.json();
      if (data.error) { showNotif('Scan failed: ' + data.error, 'error'); return; }
      let players = [];
      try {
        const clean = (data.text || '').replace(/```json|```/g, '').trim();
        players = JSON.parse(clean);
      } catch(e) { showNotif('Could not parse scan result — try Paste Squad instead', 'error'); return; }
      if (!Array.isArray(players) || players.length === 0) { showNotif('No players detected — try a different screenshot', 'error'); return; }
      const existingNames = new Set(squad.players.map(p => p.name.toLowerCase()));
      let added = 0;
      players.forEach(p => {
        if (!p.name || existingNames.has(p.name.toLowerCase())) return;
        const validRoles = ['WK','BAT','AR','BOWL'];
        const role = validRoles.includes(p.role) ? p.role : 'BAT';
        squad.players.push({ id: uid(), name: p.name, role, credit: p.credit || 9.0, photo: null });
        existingNames.add(p.name.toLowerCase());
        added++;
      });
      _saveTeamSquadToFirestore(key, squad);
      try { localStorage.setItem('pp_team_squads_cache', JSON.stringify(teamSquads)); } catch(e){}
      masterTeamsScanMode = false;

      showNotif('✅ ' + added + ' players scan se add ho gaye!');

// ── Admin: paste a Markdown scorecard (batting + bowling tables, any
// number of innings in one paste) → points calculated instantly, no
// review/grid step. Designed for the table format ChatGPT/Claude produce
// when asked to format a match result, e.g.:
//   | Batter | Dismissal | R | B | 4s | 6s | SR |
//   |---|---|---|---|---|---|---|
//   | **Tanzid Hasan** | run out (Spencer Johnson) | **5** | 2 | 1 | 0 | 250.00 |
//   | Bowler | O | M | R | W | NB | WD | ECO |
//   |---|---|---|---|---|---|---|---|
//   | **Spencer Johnson** | 4 | 0 | 6 | **2** | 1 | 1 | 1.50 |
// Header row decides which column is which, so column order/spacing/extra
// columns don't break it. Stats from multiple tables for the same player
// (all-rounders) are merged, not overwritten.
function d11OpenMdPaste() {
  const d11m = dream11Matches[d11ActiveMatchId];
  if (!d11m || (d11m.players||[]).length === 0) { showNotif('Please add players first', 'error'); return; }
  d11GridEntryOpen = false;
  d11ScreenshotOpen = false;
  d11MdPasteOpen = true;
